<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>端到端加密聊天</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-E8QSvWZ0eCLGk4km3hxSsNmGWbLtSCSUcewDQPQWZF6pEU8GlT8a5fF32wOl1i8ftdMhssTrF/OhyGWwonTcXA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js" integrity="sha512-94ncgEEqkuZ4yNTFmu2dSn1TJ6Ij+ANQqpR7eLVU99kzvYzu6UjBxuVoNHtnd29R+T6nvK+ugCVI698pbyEkvQ==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js" integrity="sha512-rfX4p3RNnxdwLT3wWP1K0NR3ztTobn+sISlT9WhxDDK00zNYbQ6MCHA5OHm0hqKAzEMXYCgFrp8iY/ER5MkXqA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" crossorigin="anonymous"></script>
  <style>
    *{box-sizing:border-box}
    body{font-family:sans-serif;max-width:750px;margin:40px auto;padding:20px;color:#333}
    h2{margin:0 0 12px}
    a.back-link{font-size:14px;color:#666;text-decoration:none;border:1px solid #ccc;padding:3px 10px;border-radius:4px;margin-left:8px}
    .section{background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:14px}
    .section h3{margin:0 0 10px;font-size:15px;color:#555}
    .slot-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;padding:8px;border-radius:6px;border:1px solid transparent}
    .slot-0{border-color:#2196F3;background:#e3f2fd}
    .slot-1{border-color:#4CAF50;background:#e8f5e9}
    .slot-2{border-color:#FF9800;background:#fff3e0}
    .slot-3{border-color:#9C27B0;background:#f3e5f5}
    .slot-row input{flex:1;min-width:100px;padding:6px;border:1px solid #ccc;border-radius:4px;font-size:12px}
    .slot-row input[type="text"]{font-family:monospace;font-size:11px}
    .slot-row label{font-size:12px;font-weight:bold;white-space:nowrap;min-width:50px}
    .color-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px}
    .small-btn{padding:4px 10px;font-size:11px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap}
    .btn-blue{background:#2196F3;color:#fff}
    .btn-red{background:#f44336;color:#fff}
    .btn-gray{background:#ccc;color:#333}
    #chat-box{height:420px;overflow-y:auto;border:1px solid #ddd;padding:10px;background:#f9f9f9;border-radius:6px;margin-bottom:10px}
    .chat-msg{margin:4px 0;padding:6px 10px;border-radius:6px;border-left:3px solid #999;background:#fff;font-size:13px}
    .chat-msg.sent{margin-left:60px;border-left:none;border-right:3px solid #999;background:#f1f8e9}
    .chat-msg.received{background:#f0f8ff}
    .chat-msg .c-nick{font-weight:bold;font-size:12px}
    .chat-msg .c-time{font-size:10px;color:#999;margin:0 4px}
    .chat-msg .c-body{font-size:13px;margin-top:2px;word-break:break-all;line-height:1.5}
    .chat-msg .c-body p{margin:2px 0}
    .chat-msg .c-body img{max-width:100%;border-radius:4px}
    #send-area{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
    #send-area select,#send-area input,#send-area textarea{padding:6px;border:1px solid #ccc;border-radius:4px;font-size:13px}
    #send-area textarea{flex:2;min-height:38px;resize:vertical}
    #send-area select{flex:0 0 80px}
    #recv-pub-input{flex:1;min-width:150px;font-family:monospace;font-size:11px}
    button{padding:8px 16px;cursor:pointer;border:none;border-radius:4px;color:#fff;font-size:13px;white-space:nowrap}
    .btn-primary{background:#673AB7}
    .rand-btn{background:#f5f5f5;color:#333;border:1px solid #ccc}
    .link-btn{background:#FF9800;font-size:12px;height:35px;padding:0 12px}
    .hint{font-size:11px;color:#888;margin:2px 0}
    footer{margin-top:20px;text-align:center;color:#888;font-size:12px;border-top:1px solid #eee;padding:10px 0}
    #poll-status{font-size:11px;color:#aaa;text-align:right;margin-bottom:4px}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:999}
    .modal-box{background:#fff;padding:24px 20px;border-radius:8px;max-width:450px;width:90%;position:relative;max-height:85vh;overflow-y:auto;text-align:center}
    .close-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;background:#f44336;color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
    .contact-row{display:flex;gap:6px;align-items:center;margin:6px 0;padding:6px;background:#f0f0f0;border-radius:4px}
    .contact-row span{flex:1;font-family:monospace;font-size:11px;word-break:break-all;text-align:left}
.copy-msg-btn{background:#eee;border:1px solid #ddd;border-radius:3px;padding:1px 7px;font-size:10px;cursor:pointer;color:#666;margin-left:6px;vertical-align:middle;line-height:1.4}
.copy-msg-btn:hover{background:#ddd}
.copy-msg-btn.copied{background:#4CAF50;color:#fff;border-color:#4CAF50}
  </style>
</head>
<body>

<h2>💬 端到端加密聊天
  <a href="/" style="color:#666;text-decoration:none;font-size:inherit;margin-right:8px">← 返回主界面</a>
  <a href="/vote" style="font-size:14px;margin-left:8px;color:#673AB7;text-decoration:none;border:1px solid #673AB7;padding:3px 10px;border-radius:4px">🗳️ 投票</a>
  <a href="/notice">📢 公告板</a>
  <a href="/qun" class="back-link">👥 讨论群</a>
</h2>

<!-- 身份槽位 -->
<div class="section">
  <h3>🔑 我的身份（最多4个，各自独立的 RSA + AES）</h3>
  <div id="slots"></div>
  <button class="small-btn btn-blue" onclick="addSlot()" id="add-slot-btn" style="margin-top:6px">+ 添加身份</button>
  <p class="hint">⚠️ 重新生成 RSA 密钥将无法解密旧消息。请先下载备份旧密钥。</p>
</div>

<!-- 联系人 -->
<div class="section">
  <h3>📇 联系人（保存接收方公钥，最多4个）</h3>
  <div id="contacts"></div>
  <button class="small-btn btn-blue" onclick="addContact()" id="add-contact-btn">+ 添加联系人</button>
</div>

<!-- 聊天框 -->
<div id="poll-status">🔄 等待轮询...</div>
<div id="chat-box"></div>

<!-- 发送区 -->
<div id="send-area">
  <select id="send-slot" title="选择发送身份"></select>
  <select id="send-contact" title="选择接收方">
    <option value="">-- 选择联系人 --</option>
  </select>
  <input type="text" id="recv-pub-input" placeholder="或粘贴接收方公钥（优先）" title="直接粘贴公钥则忽略上方联系人选择">
  <textarea id="chat-msg" placeholder="消息（≤2048字，支持 Markdown）" maxlength="2048"></textarea>
  <button type="button" class="link-btn" onclick="insertFileLink()">🔗 外链</button>
  <button class="btn-primary rate-limited-btn" onclick="sendChatMsg()">发送</button>
</div>

<!-- 确认弹窗 -->
<div class="modal" id="confirm-modal">
  <div class="modal-box">
    <p id="confirm-text"></p>
    <button id="confirm-yes" class="btn-red" style="margin-right:8px">确认</button>
    <button onclick="closeConfirm()" class="btn-gray">取消</button>
  </div>
</div>

<footer id="footer"></footer>

<script>
// ═══════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════
function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function deriveAESKey(str){ return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString()); }
function sha256hex(str){ return CryptoJS.SHA256(str).toString(); }
// ★ 注意：pubKeyHash 里用 /[\r\n\s]+/g 是没问题的——这里是对公钥做 SHA256 取指纹，
//    空格不影响哈希结果的一致性
function pubKeyHash(pub){ return sha256hex((pub||'').replace(/[\r\n\s]+/g,'')).substring(0,16); }

var SLOT_COLORS = ['#2196F3','#4CAF50','#FF9800','#9C27B0'];
var SLOT_NAMES = ['蓝色','绿色','橙色','紫色'];

// ═══════════════════════════════════════════
// 持久化存储 (localStorage)
// ═══════════════════════════════════════════
var STORAGE_KEY   = 'chat_identities_v1';
var CONTACTS_KEY  = 'chat_contacts_v1';
var SENT_KEY      = 'chat_sent_v1';
var RECEIVED_KEY  = 'chat_received_v1';  // ★ 新增：持久化收到的消息
var LAST_POLL_KEY = 'chat_last_poll_v1';

function loadIdentities(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }catch(e){ return []; }
}
function saveIdentities(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function loadContacts(){
  try{ return JSON.parse(localStorage.getItem(CONTACTS_KEY) || '[]'); }catch(e){ return []; }
}
function saveContacts(data){ localStorage.setItem(CONTACTS_KEY, JSON.stringify(data)); }

function loadSent(){
  try{ return JSON.parse(localStorage.getItem(SENT_KEY) || '[]'); }catch(e){ return []; }
}
function saveSent(data){
  if(data.length > 500) data = data.slice(-500);
  localStorage.setItem(SENT_KEY, JSON.stringify(data));
}

// ★ 新增
function loadReceived(){
  try{ return JSON.parse(localStorage.getItem(RECEIVED_KEY) || '[]'); }catch(e){ return []; }
}
function saveReceived(data){
  if(data.length > 500) data = data.slice(-500);
  localStorage.setItem(RECEIVED_KEY, JSON.stringify(data));
}

function getLastPoll(){ return localStorage.getItem(LAST_POLL_KEY) || ''; }
function setLastPoll(v){ localStorage.setItem(LAST_POLL_KEY, v); }

// ═══════════════════════════════════════════
// RSA 密钥生成
// ═══════════════════════════════════════════
function generateRSAKeypair(){
  var crypt = new JSEncrypt({default_key_size: 2048});
  var priv = crypt.getPrivateKey();
  var pub = crypt.getPublicKey();
  return {pub: pub, priv: priv};
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
var identities = loadIdentities();
var contacts = loadContacts();
var sentMessages = loadSent();
var receivedMessages = loadReceived();   // ★ 新增
var displayedMsgKeys = {};

function renderSlots(){
  var container = document.getElementById('slots');
  var html = '';
  identities.forEach(function(id, i){
    var color = SLOT_COLORS[i] || '#999';
    var name = SLOT_NAMES[i] || ('身份'+(i+1));
    html += '<div class="slot-row slot-'+i+'">';
    html += '<label><span class="color-dot" style="background:'+color+'"></span>'+name+'</label>';
    html += '<input type="text" placeholder="昵称" value="'+esc(id.nick||'')+'" onchange="updateSlot('+i+',\'nick\',this.value)" maxlength="32">';
    html += '<input type="password" placeholder="AES密钥" value="'+esc(id.aes||'')+'" onchange="updateSlot('+i+',\'aes\',this.value)" maxlength="64">';
    html += '<button class="small-btn rand-btn" onclick="genAESKey('+i+')">🎲</button>';
    html += '<textarea placeholder="RSA公钥" rows="2" style="flex:2;font-family:monospace;font-size:10px;resize:vertical" onchange="updateSlot('+i+',\'pub\',this.value)">'+esc(id.pub||'')+'</textarea>';
    html += '<textarea placeholder="RSA私钥（仅存本地）" rows="2" style="flex:2;font-family:monospace;font-size:10px;resize:vertical" onchange="updateSlot('+i+',\'priv\',this.value)">'+esc(id.priv||'')+'</textarea>';
    html += '<button class="small-btn btn-blue" onclick="genRSAKeypair('+i+')">生成RSA</button>';
    html += '<button class="small-btn btn-blue" onclick="downloadSlot('+i+')">⬇下载</button>';
    html += '<button class="small-btn btn-red" onclick="deleteSlot('+i+')">✕</button>';
    html += '</div>';
  });
  container.innerHTML = html || '<p style="color:#888">暂无身份，请添加</p>';
  document.getElementById('add-slot-btn').style.display = identities.length >= 4 ? 'none' : '';
  updateSendSelects();
}

function updateSlot(i, field, value){
  identities[i][field] = value;
  saveIdentities(identities);
  updateSendSelects();
}

function addSlot(){
  if(identities.length >= 4){ alert('最多4个身份'); return; }
  identities.push({nick:'', aes:'', pub:'', priv:''});
  saveIdentities(identities);
  renderSlots();
}

function genAESKey(i){
  var chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ,./?;:><|]}[{=-+_!@#$%^&*()~';
  var key = '';
  for(var j=0;j<32;j++) key += chars[Math.floor(Math.random()*chars.length)];
  identities[i].aes = key;
  saveIdentities(identities);
  renderSlots();
}

function genRSAKeypair(i){
  showConfirm('生成新RSA密钥将无法解密用旧密钥加密的历史消息。确定继续？<br><small>建议先下载备份旧密钥。</small>', function(){
    var kp = generateRSAKeypair();
    identities[i].pub = kp.pub;
    identities[i].priv = kp.priv;
    saveIdentities(identities);
    renderSlots();
  });
}

function downloadSlot(i){
  var id = identities[i];
  var blob = new Blob(['昵称: '+id.nick+'\nAES密钥: '+id.aes+'\n\n--- RSA 公钥 ---\n'+id.pub+'\n\n--- RSA 私钥 ---\n'+id.priv], {type:'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chat_identity_'+(i+1)+'.txt';
  a.click();
}

function deleteSlot(i){
  showConfirm('删除此身份将无法查看用它收发过的消息。确定删除？', function(){
    identities.splice(i,1);
    saveIdentities(identities);
    renderSlots();
    renderChat();
  });
}

// ═══════════════════════════════════════════
// 联系人
// ═══════════════════════════════════════════
function renderContacts(){
  var container = document.getElementById('contacts');
  var html = '';
  contacts.forEach(function(c, i){
    html += '<div class="contact-row">';
    html += '<span title="'+esc(c.pub)+'">'+esc(c.name)+' ('+esc(pubKeyHash(c.pub))+')</span>';
    html += '<button class="small-btn btn-red" onclick="deleteContact('+i+')">✕</button>';
    html += '</div>';
  });
  container.innerHTML = html || '<p style="color:#888">暂无联系人，请添加</p>';
  document.getElementById('add-contact-btn').style.display = contacts.length >= 4 ? 'none' : '';
  updateSendSelects();
}

function addContact(){
  if(contacts.length >= 4){ alert('最多4个联系人'); return; }
  var name = prompt('联系人名称:') || '联系人'+(contacts.length+1);
  var pub = prompt('粘贴联系人RSA公钥:');
  if(!pub) return;
  contacts.push({name: name.substring(0,20), pub: pub});
  saveContacts(contacts);
  renderContacts();
}

function deleteContact(i){
  contacts.splice(i,1);
  saveContacts(contacts);
  renderContacts();
}

// ═══════════════════════════════════════════
// 发送选择框
// ═══════════════════════════════════════════
function updateSendSelects(){
  var selSlot = document.getElementById('send-slot');
  selSlot.innerHTML = '';
  identities.forEach(function(id, i){
    var color = SLOT_COLORS[i] || '#999';
    var label = (id.nick || '身份'+(i+1));
    selSlot.innerHTML += '<option value="'+i+'" style="color:'+color+'">'+esc(label)+'</option>';
  });

  var selContact = document.getElementById('send-contact');
  var currentVal = selContact.value;
  selContact.innerHTML = '<option value="">-- 选择联系人 --</option>';
  contacts.forEach(function(c, i){
    var sel = (currentVal === 'contact_'+i) ? ' selected' : '';
    selContact.innerHTML += '<option value="contact_'+i+'"'+sel+'>'+esc(c.name)+'</option>';
  });
  if(currentVal === 'custom') selContact.innerHTML += '<option value="custom" selected>自定义公钥</option>';
  else selContact.innerHTML += '<option value="custom">自定义公钥</option>';
}

// ═══════════════════════════════════════════
// 确认弹窗
// ═══════════════════════════════════════════
var confirmCallback = null;
function showConfirm(text, cb){
  document.getElementById('confirm-text').innerHTML = text;
  document.getElementById('confirm-modal').style.display = 'flex';
  confirmCallback = cb;
}
function closeConfirm(){
  document.getElementById('confirm-modal').style.display = 'none';
  confirmCallback = null;
}
document.getElementById('confirm-yes').addEventListener('click', function(){
  if(confirmCallback) confirmCallback();
  closeConfirm();
});

// ═══════════════════════════════════════════
// 发送消息
// ═══════════════════════════════════════════
function sendChatMsg(){
  var slotIdx = parseInt(document.getElementById('send-slot').value) || 0;
  var id = identities[slotIdx];
  if(!id || !id.nick || !id.aes || !id.pub || !id.priv){
    alert('请先完善发送身份的昵称、AES密钥和RSA密钥'); return;
  }

  var msg = document.getElementById('chat-msg').value.trim();
  if(!msg){ alert('请输入消息'); return; }

  // 确定接收方公钥
  var recvPub = document.getElementById('recv-pub-input').value.trim();
  var contactSel = document.getElementById('send-contact').value;

  if(!recvPub && contactSel && contactSel.startsWith('contact_')){
    var ci = parseInt(contactSel.replace('contact_',''));
    if(contacts[ci]) recvPub = contacts[ci].pub;
  }

  if(!recvPub){ alert('请选择联系人或粘贴接收方公钥'); return; }

  // 生成 per-message IV
  var iv = CryptoJS.lib.WordArray.random(16);
  var ivB64 = CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g,'');
  var key32 = deriveAESKey(id.aes);

  var now = new Date();
  var timeStr = now.getFullYear()+'-'+
    String(now.getMonth()+1).padStart(2,'0')+'-'+
    String(now.getDate()).padStart(2,'0')+' '+
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
  var nonce = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');

  var payload = id.nick + '|' + timeStr + '|' + msg + '|' + nonce;
  var aesContent = CryptoJS.AES.encrypt(payload, key32, {iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7}).toString().replace(/[\r\n\s]+/g,'');

  // RSA 包裹 AES 密钥
  var jse = new JSEncrypt();
  jse.setPublicKey(recvPub);
  var wrappedKey = jse.encrypt(id.aes);
  if(!wrappedKey){ alert('RSA加密失败（接收方公钥无效）'); return; }
  wrappedKey = wrappedKey.replace(/[\r\n\s]+/g,'');

  var recvHash = pubKeyHash(recvPub);

  // ★ FIX: sender_pub 只去掉换行，保留 PEM 头中的空格
  fetch('/api/chat/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      sender_pub: id.pub.replace(/[\r\n]+/g,''),   // ← 只去换行，保留 "-----BEGIN PUBLIC KEY-----" 中的空格
      receiver_hash: recvHash,
      iv: ivB64,
      wrapped_key: wrappedKey,
      aes_content: aesContent
    })
  }).then(function(r){
    window.handleRateLimitResponse(r);
    if(r.ok) return r.json();
    else return r.text().then(function(t){ throw new Error(t); });
  }).then(function(data){
    // 存入本地已发送
    sentMessages.push({
      nick: id.nick,
      time: timeStr,
      content: msg,
      recvHash: recvHash,
      slotIdx: slotIdx,
      seq: data.seq,
      filename: data.filename
    });
    saveSent(sentMessages);
    document.getElementById('chat-msg').value = '';
    renderChat();
  }).catch(function(err){
    alert('发送失败: ' + err.message);
  });
}

// ═══════════════════════════════════════════
// 轮询接收消息
// ═══════════════════════════════════════════
var pollTimer = null;

function startPolling(){
  if(pollTimer) return;
  doPoll();
  pollTimer = setInterval(doPoll, 2000);
}

function doPoll(){
  // 收集所有身份的公钥哈希
  var hashes = [];
  identities.forEach(function(id){
    if(id.pub){
      var h = pubKeyHash(id.pub);
      if(hashes.indexOf(h) === -1) hashes.push(h);
    }
  });

  if(hashes.length === 0){
    document.getElementById('poll-status').textContent = '⚠️ 请先设置至少一个身份的RSA公钥';
    return;
  }

  var since = getLastPoll();

  fetch('/api/chat/poll', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({hashes: hashes, since: since})
  }).then(function(r){ return r.json(); }).then(function(data){
    var newTime = data.server_time || '';
    if(newTime) setLastPoll(newTime);

    var statusEl = document.getElementById('poll-status');
    statusEl.textContent = '🔄 上次轮询: ' + (newTime || '--') + ' | 收到: ' + (data.messages||[]).length + ' 条';

    if(data.messages && data.messages.length > 0){
      decryptAndDisplay(data.messages);
    }
  }).catch(function(e){
    document.getElementById('poll-status').textContent = '⚠️ 轮询失败: ' + e.message;
  });
}

function decryptAndDisplay(messages){
  // ★ 限制内存去重表大小
  var keys = Object.keys(displayedMsgKeys);
  if(keys.length > 2000){
    keys.slice(0, 1000).forEach(function(k){ delete displayedMsgKeys[k]; });
  }

  var newMsgs = [];
  messages.forEach(function(m){
    var key = m.filename;
    if(displayedMsgKeys[key]) return;
    displayedMsgKeys[key] = true;

    // ★ 跳过已持久化过的消息（页面刷新后 displayedMsgKeys 为空，但 receivedMessages 还在）
    var alreadyHave = receivedMessages.some(function(rm){
      return rm.timeSort === m.time && rm.content && rm.nick;
    });
    if(alreadyHave) return;

    // 尝试用每个身份的私钥解密
    var decrypted = null;
    var slotIdx = -1;
    for(var i = 0; i < identities.length; i++){
      var id = identities[i];
      if(!id.priv) continue;
      try {
        var jse = new JSEncrypt();
        jse.setPrivateKey(id.priv);
        var aesKey = jse.decrypt(m.wrapped_key);
        if(aesKey){
          var key32 = deriveAESKey(aesKey);
          var plain = CryptoJS.AES.decrypt(m.aes_content, key32, {
            iv: CryptoJS.enc.Base64.parse(m.iv),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);
          if(plain){
            var parts = plain.split('|');
            if(parts.length >= 3){
              decrypted = {
                nick: parts[0],
                time: parts[1],
                content: parts.slice(2, parts.length - 1).join('|'),
                nonce: parts[parts.length - 1]
              };
              slotIdx = i;
              break;
            }
          }
        }
      }catch(e){}
    }

    if(decrypted){
      newMsgs.push({
        nick: decrypted.nick,
        time: decrypted.time,
        content: decrypted.content,
        slotIdx: slotIdx,
        timeSort: m.time,
        senderPub: m.sender_pub || ''
      });
    }
  });

  if(newMsgs.length > 0){
    // ★ 持久化到 receivedMessages
// ✅ 修复
    newMsgs.forEach(function(nm){
      var dup = receivedMessages.some(function(rm){
        return rm.timeSort === nm.timeSort && rm.content === nm.content;
      });
      if(!dup){
        receivedMessages.push({
          nick: nm.nick,
          time: nm.time,
          content: nm.content,
          slotIdx: nm.slotIdx,
          isReceived: true,
          timeSort: nm.timeSort,         // ← 加逗号
          senderPub: nm.senderPub || ''
        });
      }
    });
    saveReceived(receivedMessages);
    renderChat();
  }
}

// ═══════════════════════════════════════════

// ★ 无参版本：合并已发送 + 已收到
function renderChat(){
  var all = sentMessages.concat(receivedMessages);
  renderChatWithData(all);
}

function renderChatWithData(allMsgs){
  var box = document.getElementById('chat-box');
  var wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 30;
  var prevScrollTop = box.scrollTop;

  // 去重排序
  var seen = {};
  var uniq = [];
  allMsgs.forEach(function(m){
    var k = m.nick + '|' + m.time + '|' + m.content;
    if(!seen[k]){ seen[k] = true; uniq.push(m); }
  });
  uniq.sort(function(a,b){
    var ta = a.timeSort || a.time;
    var tb = b.timeSort || b.time;
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });

  // 一次性构建 HTML
  var html = '';
  uniq.forEach(function(m){
    var color = SLOT_COLORS[m.slotIdx] || '#999';
    var isSent = !m.isReceived;
    var cls = isSent ? ' sent' : ' received';
    var border = isSent
      ? 'border-right-color:' + color + ';border-left:none'
      : 'border-left-color:' + color;

    html += '<div class="chat-msg' + cls + '" style="' + border + '">';

    // 自己发的：时间在左、昵称在右
    // 收到的：昵称在左、时间在右
    var header;
    if(isSent){
      header = '<span class="c-time">' + esc(m.time) + '</span>'
             + '<span class="c-nick" style="color:' + color + '">' + esc(m.nick) + ' ●</span>';
    }else{
      header = '<span class="c-nick" style="color:' + color + '">● ' + esc(m.nick) + '</span>'
             + '<span class="c-time">' + esc(m.time) + '</span>';
    }
    html += '<div>' + header
         + '<button class="copy-msg-btn" data-copy="' + esc(m.content) + '">📋复制</button>'
         + '</div>';

    html += '<div class="c-body">';
    try {
      html += DOMPurify.sanitize(marked.parse(m.content));
    }catch(e){
      html += esc(m.content);
    }
    html += '</div>';

    // ★ 收到的消息显示发送方公钥指纹
    if (!isSent && m.senderPub) {
      var fp = pubKeyHash(m.senderPub);
      var preview = m.senderPub.substring(0, 40) + '...';
      html += '<div style="font-size:10px;color:#aaa;margin-top:4px;word-break:break-all" title="' + esc(m.senderPub) + '">';
      html += '🔑 发送方公钥指纹: <span style="font-family:monospace;color:#888">' + esc(fp) + '</span>';
      html += ' <span style="cursor:pointer;text-decoration:underline" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==\'none\'?\'block\':\'none\'">展开</span>';
      html += '<span style="display:none;font-family:monospace;font-size:9px">' + esc(m.senderPub) + '</span>';
      html += '</div>';
    }

    html += '</div>';
  });

  box.innerHTML = html;

  // 滚动位置恢复
  if(wasAtBottom){
    box.scrollTop = box.scrollHeight;
  }else{
    box.scrollTop = Math.min(prevScrollTop, box.scrollHeight - box.clientHeight);
  }
}

  if(!url) return;
  var name = prompt('请输入显示名称:', url.split('/').pop() || '文件') || '文件';
  var ext = url.split('.').pop().toLowerCase();
  var md = ['jpg','jpeg','png','gif','webp','svg'].indexOf(ext) !== -1 ? '!['+name+']('+url+')' : '[📎 '+name+']('+url+')';
  var ta = document.getElementById('chat-msg');
  ta.value += (ta.value ? '\n' : '') + md;
  ta.focus();
}

// 7秒缓冲模块
// ═══════════════════════════════════════════
(function(){
  var STORAGE_KEY_RL = 'rate_limit_state_v1';
  var state = JSON.parse(localStorage.getItem(STORAGE_KEY_RL) || '{"blockUntil":0,"whitelisted":false}');
  var timer = null;

  function save(){ localStorage.setItem(STORAGE_KEY_RL, JSON.stringify(state)); }

  function updateUI(){
    var now = Date.now() / 1000;
    var remaining = Math.ceil(state.blockUntil - now);
    var disabled = !state.whitelisted && remaining > 0;
    document.querySelectorAll('.rate-limited-btn').forEach(function(btn){
      btn.disabled = disabled;
      if(disabled){
        if(!btn.dataset.origText) btn.dataset.origText = btn.textContent;
        btn.textContent = btn.dataset.origText + ' (' + remaining + 's)';
      }else{
        if(btn.dataset.origText) btn.textContent = btn.dataset.origText;
      }
    });
  }

  function start(){
    if(timer) clearInterval(timer);
    updateUI();
    timer = setInterval(function(){
      var remaining = Math.ceil(state.blockUntil - Date.now()/1000);
      if(remaining <= 0){ clearInterval(timer); timer = null; state.blockUntil = 0; }
      updateUI(); save();
    }, 200);
  }

  window.handleRateLimitResponse = function(response){
    var wl = response.headers.get('X-RateLimit-Whitelisted') === '1';
    var bu = parseFloat(response.headers.get('X-RateLimit-BlockUntil') || '0');
    state.whitelisted = wl;
    state.blockUntil = bu || 0;
    save();
    if(!wl && state.blockUntil > Date.now()/1000) start();
    else updateUI();
  };

  if(!state.whitelisted && state.blockUntil > Date.now()/1000) start();
  else updateUI();
})();
// 消息内容一键复制
document.addEventListener('click', function(e){
  var btn = e.target.closest('.copy-msg-btn');
  if (!btn) return;
  var text = btn.dataset.copy;
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent = '✅已复制';
    btn.classList.add('copied');
    setTimeout(function(){
      btn.textContent = '📋复制';
      btn.classList.remove('copied');
    }, 1500);
  }).catch(function(){ alert('复制失败，请手动选择'); });
});
