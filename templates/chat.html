function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function deriveAESKey(str){ return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString()); }
function sha256hex(str){ return CryptoJS.SHA256(str).toString(); }
function pubKeyHash(pub){ return sha256hex((pub||'').replace(/[\r\n]+/g,'')).substring(0,16); }
/**
 * 规范化 PEM 格式：将单行 Base64 自动换成每 64 字符一行的标准格式
 * 如果已经是多行或是非 PEM 字符串，则原样返回（去首尾空白）
 */
// ═══════════════════════════════════════════
// PQC 工具函数
// ═══════════════════════════════════════════
function bytesToBase64(bytes) {
  var binary = '';
  for (var i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}
function base64ToBytes(b64) {
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}
function bytesToHex(bytes) {
  return Array.from(bytes).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}
function hexToBytes(hex) {
  var bytes = new Uint8Array(hex.length / 2);
  for (var i = 0; i < hex.length; i += 2) {
    bytes[i/2] = parseInt(hex.substring(i, i+2), 16);
  }
  return bytes;
}

function normalizePem(pemStr){
  if(!pemStr || typeof pemStr !== 'string') return pemStr || '';
  pemStr = pemStr.trim();
  if(!/^-----BEGIN /.test(pemStr)) return pemStr;
  var match = pemStr.match(/^(-----BEGIN [^-]+-----)\s*([\s\S]*?)\s*(-----END [^-]+-----)$/);
  if(!match) return pemStr;
  var header = match[1], body = match[2].replace(/[\r\n\s]+/g, ''), footer = match[3];
  var lines = [];
  for(var i = 0; i < body.length; i += 64) lines.push(body.substring(i, i + 64));
  return header + '\n' + lines.join('\n') + '\n' + footer;
}var SLOT_COLORS = ['#2196F3','#4CAF50','#FF9800','#9C27B0'];
var SLOT_NAMES = ['蓝色','绿色','橙色','紫色'];

function loadPqcSentKeys() {

}
function savePqcSentKeys(data) {
  var keys = Object.keys(data);
  if (keys.length > 200) {
    keys.sort();
    for (var i = 0; i < keys.length - 200; i++) delete data[keys[i]];
  }
  localStorage.setItem(PQC_SENT_KEYS_KEY, JSON.stringify(data));
}
var pqcSentKeys = loadPqcSentKeys();

function loadIdentities(){
  try{ var data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }catch(e){ return []; }
  // ★ 追加：v1→v2 迁移
  var migrated = false;
  data.forEach(function(id){
    if (!id.hasOwnProperty('pqcPub')) { id.pqcPub = ''; migrated = true; }
    if (!id.hasOwnProperty('pqcPriv')) { id.pqcPriv = ''; migrated = true; }
  });
  if (migrated) {
    var old = localStorage.getItem('chat_identities_v1');
    if (old) { try { var oldData = JSON.parse(old); oldData.forEach(function(oi,i){if(data[i]){data[i].pqcPub=oi.pqcPub||data[i].pqcPub||'';data[i].pqcPriv=oi.pqcPriv||data[i].pqcPriv||'';}}); }catch(e){} }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  return data;
}

function saveIdentities(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function loadContacts(){
  try{ var data = JSON.parse(localStorage.getItem(CONTACTS_KEY) || '[]'); }catch(e){ return []; }
  var migrated = false;
  data.forEach(function(c){ if (!c.hasOwnProperty('pqcPub')) { c.pqcPub = ''; migrated = true; } });
  if (migrated) {
    var old = localStorage.getItem('chat_contacts_v1');
    if (old) {
      try {
        var oldData = JSON.parse(old);
        oldData.forEach(function(oc, i){
          if (data[i]) { data[i].pqcPub = oc.pqcPub || data[i].pqcPub || ''; }
        });
      } catch(e) {}
    }
    localStorage.setItem(CONTACTS_KEY, JSON.stringify(data));
  }
  return data;
}
function saveContacts(data){ localStorage.setItem(CONTACTS_KEY, JSON.stringify(data)); }

// ═══════════════════════════════════════════
// RSA 密钥生成
// ═══════════════════════════════════════════
function generateRSAKeypair(){
  var crypt = new JSEncrypt({default_key_size: 2048});
  var priv = crypt.getPrivateKey();
  var pub = crypt.getPublicKey();
  return {pub: pub, priv: priv};
}

function renderSlots(){
  var container = document.getElementById('slots');
  var html = '';
  identities.forEach(function(id, i){
    var color = i < 4 ? (SLOT_COLORS[i] || '#999') : '#555';

    html += '<textarea placeholder="PQC私钥(Base64)" rows="2" style="flex:2;font-family:monospace;font-size:10px;resize:vertical" onchange="updateSlot('+i+',\'pqcPriv\',this.value)">'+esc(id.pqcPriv||'')+'</textarea>';

function updateSlot(i, field, value){
  // ★ pub / priv 字段自动规范化 PEM 格式
  if(field === 'pub' || field === 'priv'){
    value = normalizePem(value);
  }
  identities[i][field] = value;
  saveIdentities(identities);
  updateSendSelects();
}

function addSlot(){
  identities.push({nick:'', aes:'', pub:'', priv:'', pqcPub:'', pqcPriv:''});
  saveIdentities(identities);
  renderSlots();
}

function genAESKey(i){
  var chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ,./?;:><|]}[{=-+_!@#$%^&*()~';
  var key = '';
  for(var j=0;j<32;j++) key += chars[Math.floor(Math.random()*chars.length)];
  identities[i].aes = key;
  saveIdentities(identities);
  renderSlots();
}

function genRSAKeypair(i){
  showConfirm('生成新RSA密钥将无法解密用旧密钥加密的历史消息。确定继续？<br><small>建议先下载备份旧密钥。</small>', function(){
    var kp = generateRSAKeypair();
    identities[i].pub = kp.pub;
    identities[i].priv = kp.priv;
    saveIdentities(identities);
    renderSlots();
  });

function sendChatMsg(){
  var slotIdx = parseInt(document.getElementById('send-slot').value) || 0;
  var id = identities[slotIdx];
  if(!id || !id.nick || !id.aes){ alert('请先完善发送身份（昵称+AES密钥必填）'); return; }
  var msg = document.getElementById('chat-msg').value.trim();
  if(!msg){ alert('请输入消息'); return; }

  var recvPub = normalizePem(document.getElementById('recv-pub-input').value.trim());
  var contactSel = document.getElementById('send-contact').value;
  var recvPqcPub = '';

  // ★ 如果粘贴的内容不含 PEM 头尾，可能是 PQC Base64 公钥
  var directInput = document.getElementById('recv-pub-input').value.trim();
  if (directInput && !directInput.startsWith('-----BEGIN')) {
      recvPqcPub = directInput.replace(/[\r\n\s]+/g, '');
      recvPub = '';  // 不是 PEM，不能当 RSA 用
  }

  if (contactSel && contactSel.startsWith('contact_')) {
    var ci = parseInt(contactSel.replace('contact_',''));
    if (contacts[ci]) {
      recvPub = recvPub || contacts[ci].pub;
      recvPqcPub = contacts[ci].pqcPub || '';
    }
  }
  if (!recvPub && !recvPqcPub) { alert('请选择有密钥的联系人或粘贴接收方公钥'); return; }

  // ★ PQC 优先
  var encMode = document.getElementById('encrypt-mode').value;
  if (encMode === 'pqc' || (encMode === 'auto' && recvPqcPub)) {
    if (!recvPqcPub) { alert('接收方未设置PQC公钥，无法使用PQC加密'); return; }
    sendChatMsgPqc(slotIdx, recvPqcPub, recvPub, msg);
    return;
  }
  // ★ 回退 RSA
  if (!id.pub || !id.priv) { alert('发送方RSA密钥未设置'); return; }
  if (!recvPub) { alert('接收方未设置RSA公钥'); return; }
  sendChatMsgRsa(slotIdx, recvPub, msg);
}

async function sendChatMsgPqc(slotIdx, recvPqcPubB64, recvPub, msg) {
  var id = identities[slotIdx];
  var recvHash = recvPub ? pubKeyHash(recvPub) : sha256hex(recvPqcPubB64).substring(0,16);
  try {
    var { ml_kem1024 } = await import('@noble/post-quantum/ml-kem');
    var msgKey = crypto.getRandomValues(new Uint8Array(32));
    var ivContent = CryptoJS.lib.WordArray.random(16);
    var now = new Date();
    var timeStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    var nonce = bytesToHex(crypto.getRandomValues(new Uint8Array(8)));
    var payload = id.nick + '|' + timeStr + '|' + msg + '|' + nonce;
    var keyHex = CryptoJS.enc.Hex.parse(bytesToHex(msgKey));
    var encContent = CryptoJS.AES.encrypt(payload, keyHex, {iv:ivContent,mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7}).toString().replace(/[\r\n\s]+/g,'');
    var encapsResult = ml_kem1024.encapsulate(base64ToBytes(recvPqcPubB64));
    var ivShared = CryptoJS.lib.WordArray.random(16);
    var sharedKeyHex = CryptoJS.enc.Hex.parse(bytesToHex(encapsResult.sharedSecret));
    var encAESKey = CryptoJS.AES.encrypt(bytesToBase64(msgKey), sharedKeyHex, {iv:ivShared,mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7}).toString().replace(/[\r\n\s]+/g,'');
    var body = {
        version:'v3',
        sender_pub: id.pub ? id.pub.replace(/[\r\n]+/g,'') : ('PQC:' + sha256hex(id.pqcPub||'').substring(0,32)),
        sender_pqc_pub:(id.pqcPub||'').replace(/[\r\n\s]+/g,''),
        receiver_hash:recvHash,
        pqc_ciphertext:bytesToBase64(encapsResult.cipherText),
        iv_shared: CryptoJS.enc.Base64.stringify(ivShared).replace(/[\r\n\s]+/g,''),
        iv_content: CryptoJS.enc.Base64.stringify(ivContent).replace(/[\r\n\s]+/g,''),
        encAESKey:encAESKey,
        encContent:encContent,
        aes_content: encContent,
        iv: CryptoJS.enc.Base64.stringify(ivContent).replace(/[\r\n\s]+/g,''),
        wrapped_key: 'PQC_V3',
        nonce:nonce,
        signature: ''
    };
    // ★ RSA 签名
    if (id.priv) {
      try {
        var privKeyObj = forge.pki.privateKeyFromPem(id.priv);
        var md = forge.md.sha256.create();
        md.update(payload, 'utf8');
        var pss = forge.pss.create({
          md: forge.md.sha256.create(),
          mgf: forge.mgf.mgf1.create(forge.md.sha256.create()),
          saltLength: 32
        });
        var sigBytes = privKeyObj.sign(md, pss);
        body.signature = forge.util.encode64(sigBytes);
      } catch(e) { console.warn('PQC签名失败', e); }
    }
    var res = await fetch('/api/chat/send', {method:'POST',headers:{'Content-Type':'application/json','X-CSRF-Token':csrfToken},body:JSON.stringify(body)});
    if (res.status===418) { sessionStorage.setItem('pending_chat_msg',msg);sessionStorage.setItem('pending_chat_slot',slotIdx);sessionStorage.setItem('pending_chat_recv',recvPub);sessionStorage.setItem('pending_chat_pqc',recvPqcPubB64);window.location.href='/captcha?redirect='+encodeURIComponent(window.location.href);return; }
    window.handleRateLimitResponse(res);
    if(!res.ok){var t=await res.text();throw new Error(t);}
    var data=await res.json();
        sentMessages.push({nick:id.nick,time:timeStr,content:msg,recvHash:recvHash,slotIdx:slotIdx,seq:data.seq,filename:data.filename,version:'v3',pqcCiphertext:bytesToBase64(encapsResult.cipherText),ivShared:CryptoJS.enc.Base64.stringify(ivShared).replace(/[\r\n\s]+/g,''),encAESKey:encAESKey,iv:CryptoJS.enc.Base64.stringify(ivContent).replace(/[\r\n\s]+/g,''),msgKeyB64:bytesToBase64(msgKey),signature: body.signature,senderPub: id.pub});
    saveSent(sentMessages);
    // ★ 独立持久化 PQC msgKey，清除缓存后仍可解密自己发送的消息
    pqcSentKeys[data.filename] = bytesToBase64(msgKey);
    savePqcSentKeys(pqcSentKeys);
    document.getElementById('chat-msg').value='';
    renderChat();
  } catch(e) { alert('PQC发送失败: '+e.message); }
}

function sendChatMsgRsa(slotIdx, recvPub, msg) {
  var id = identities[slotIdx];
  var iv = CryptoJS.lib.WordArray.random(16);
  var ivB64 = CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g,'');
  var key32 = deriveAESKey(id.aes);
  var now = new Date();
  var timeStr = now.getFullYear()+'-'+
    String(now.getMonth()+1).padStart(2,'0')+'-'+
    String(now.getDate()).padStart(2,'0')+' '+
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
  var nonce = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  var payload = id.nick + '|' + timeStr + '|' + msg + '|' + nonce;
  var aesContent = CryptoJS.AES.encrypt(payload, key32, {iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7}).toString().replace(/[\r\n\s]+/g,'');
  var jse = new JSEncrypt();
  jse.setPublicKey(recvPub);
  var wrappedKey = jse.encrypt(id.aes);
  if(!wrappedKey){ alert('RSA加密失败（接收方公钥无效）'); return; }
  wrappedKey = wrappedKey.replace(/[\r\n\s]+/g,'');
  // ★ RSA 签名
  var signature = '';
  if (id.priv) {
    try {
      var privKeyObj = forge.pki.privateKeyFromPem(id.priv);
      var md = forge.md.sha256.create();
      md.update(payload, 'utf8');
      var pss = forge.pss.create({
        md: forge.md.sha256.create(),
        mgf: forge.mgf.mgf1.create(forge.md.sha256.create()),
        saltLength: 32
      });
      var sigBytes = privKeyObj.sign(md, pss);
      signature = forge.util.encode64(sigBytes);
    } catch(e) { console.warn('签名失败', e); }
  }
  var recvHash = pubKeyHash(recvPub);
  fetch('/api/chat/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json','X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      sender_pub: id.pub.replace(/[\r\n]+/g,''),
      receiver_hash: recvHash,
      iv: ivB64,
      wrapped_key: wrappedKey,
      aes_content: aesContent,
      nonce: nonce,
      signature: signature
    })
  }).then(function(r){
    if (r.status === 418) {
      sessionStorage.setItem('pending_chat_msg', msg);
      sessionStorage.setItem('pending_chat_slot', slotIdx);
      sessionStorage.setItem('pending_chat_recv', recvPub);
      window.location.href = '/captcha?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    window.handleRateLimitResponse(r);
    if(r.ok) return r.json();
    else return r.text().then(function(t){ throw new Error(t); });
  }).then(function(data){
    if (!data) return;
    sentMessages.push({
      nick: id.nick,
      time: timeStr,
      content: msg,
      recvHash: recvHash,
      slotIdx: slotIdx,
      seq: data.seq,
      filename: data.filename,
      wrappedKey: wrappedKey,
      iv: ivB64,
      signature: signature,
      senderPub: id.pub
    });
    saveSent(sentMessages);
    document.getElementById('chat-msg').value = '';
    renderChat();
  }).catch(function(err){
    alert('发送失败: ' + err.message);
  });
}

// 轮询接收消息
// ═══════════════════════════════════════════
var pollTimer = null;

function startPolling(){
  if(pollTimer) return;
  doPoll();
  pollTimer = setInterval(doPoll, 3000);
}

async function doPoll(){
  var hashes = [];
  identities.forEach(function(id){
    if(id.pub){
      var h = pubKeyHash(id.pub);
      if(hashes.indexOf(h) === -1) hashes.push(h);
    }
    // ★ PQC-only 身份也加入轮询
    if(id.pqcPub){
        var pqcClean = id.pqcPub.replace(/[\r\n\s]+/g,'');
        var ph = sha256hex(pqcClean).substring(0,16);
        if(hashes.indexOf(ph) === -1) hashes.push(ph);
    }
  });

  if(hashes.length === 0){
    document.getElementById('poll-status').textContent = '⚠️ 请先设置至少一个身份的RSA公钥';
    return;
  }

  var since = getLastPoll();

  try {
    var r = await fetch('/api/chat/poll', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
      body: JSON.stringify({ hashes: hashes, sender_hashes: hashes, since: since })
    });
    var data = await r.json();
    var newTime = data.server_time || '';
    if(newTime) setLastPoll(newTime);
    document.getElementById('poll-status').textContent = '🔄 上次轮询: ' + (newTime || '--') + ' | 收到: ' + (data.messages||[]).length + ' 条';
    if(data.messages && data.messages.length > 0){
      await decryptAndDisplay(data.messages);
    }
  } catch(e) {
    document.getElementById('poll-status').textContent = '⚠️ 轮询失败: ' + e.message;
  }
}

async function decryptAndDisplay(messages){
  var keys = Object.keys(displayedMsgKeys);
  if(keys.length > 2000){
    keys.slice(0, 1000).forEach(function(k){ delete displayedMsgKeys[k]; });
  }

  var newSent = [];    // 待加入 sentMessages 的消息
  var newRecv = [];    // 待加入 receivedMessages 的消息

  for (var mi = 0; mi < messages.length; mi++) {
    var m = messages[mi];
    var key = m.filename;
    if(displayedMsgKeys[key]) continue;
    displayedMsgKeys[key] = true;

    // 去重：避免同一消息重复存入
    var alreadyHave = sentMessages.some(function(sm){ return sm.filename === m.filename; }) ||
                      receivedMessages.some(function(rm){ return rm.filename === m.filename; });
    if(alreadyHave) continue;

    var decrypted = null;
    var slotIdx = -1;
    var isSentFlag = false;
    var msgVersion = m.version || '';

    // ★ 第一步：使用本地 RSA 私钥解密 wrapped_key 得到 AES 密钥
    for(var i = 0; i < identities.length; i++){
      var id = identities[i];
      if(!id.priv) continue;
      try {
        var jse = new JSEncrypt();
        jse.setPrivateKey(id.priv);
        var aesKey = jse.decrypt(m.wrapped_key);
        if(aesKey){
          var key32 = deriveAESKey(aesKey);
          var plain = CryptoJS.AES.decrypt(m.aes_content, key32, {
            iv: CryptoJS.enc.Base64.parse(m.iv),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);
          if(plain){
            var parts = plain.split('|');
            if(parts.length >= 3){
              decrypted = {
                nick: parts[0],
                time: parts[1],
                content: parts.slice(2, parts.length - 1).join('|'),
                nonce: parts[parts.length - 1]
              };
              slotIdx = i;
              var senderPubNormalized = normalizePem(m.sender_pub || '');
              var myPubNormalized = normalizePem(id.pub);
              if(senderPubNormalized === myPubNormalized){
                isSentFlag = true;
              }
              break;
            }
          }
        }
      }catch(e){}
    }

    // ★ 第二步：回退使用本地 AES 对称密钥解密（适用于共享密钥场景）
    if(!decrypted){
      for(var j = 0; j < identities.length; j++){
        var id2 = identities[j];
        if(!id2.aes) continue;
        try {
          var key32b = deriveAESKey(id2.aes);
          var plain2 = CryptoJS.AES.decrypt(m.aes_content, key32b, {
            iv: CryptoJS.enc.Base64.parse(m.iv),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);
          if(plain2){
            var parts2 = plain2.split('|');
            if(parts2.length >= 3){
              decrypted = {
                nick: parts2[0],
                time: parts2[1],
                content: parts2.slice(2, parts2.length - 1).join('|'),
                nonce: parts2[parts2.length - 1]
              };
              slotIdx = j;
              var senderPubNorm = normalizePem(m.sender_pub || '');
              var myPubNorm = normalizePem(id2.pub);
              if(senderPubNorm === myPubNorm){
                isSentFlag = true;
              }
              break;
            }
          }
        }catch(e){}
      }
    }

    // ★ 第三步：PQC 解密（v3 消息）
    var v3MsgKey = null;  // ★ 捕获 PQC 解密出的 msgKey

    // ★ 回退：发送方用 pqcSentKeys 中的 msgKey 解密自己发的 PQC 消息
    if (!decrypted && m.wrapped_key === 'PQC_V3' && pqcSentKeys[m.filename]) {
      var v3MsgKey2 = pqcSentKeys[m.filename];
      try {
        var msgKeyHex3 = CryptoJS.enc.Hex.parse(bytesToHex(base64ToBytes(v3MsgKey2)));
        var plain3b = CryptoJS.AES.decrypt(m.encContent || m.aes_content, msgKeyHex3, {
          iv: CryptoJS.enc.Base64.parse(m.iv_content || m.iv),
          mode: CryptoJS.mode.CBC,
          padding: CryptoJS.pad.Pkcs7
        }).toString(CryptoJS.enc.Utf8);
        if (plain3b) {
          var parts3b = plain3b.split('|');
          if (parts3b.length >= 3) {
            decrypted = {
              nick: parts3b[0],
              time: parts3b[1],
              content: parts3b.slice(2, parts3b.length - 1).join('|'),
              nonce: parts3b[parts3b.length - 1]
            };
            slotIdx = 0;
            for (var si = 0; si < identities.length; si++) {
              var sp = (m.sender_pqc_pub||'').replace(/[\r\n\s]+/g,'');
              var mp = (identities[si].pqcPub||'').replace(/[\r\n\s]+/g,'');
              if (mp && sp === mp) { slotIdx = si; break; }
            }
            msgVersion = 'v3';
            isSentFlag = true;
            v3MsgKey = v3MsgKey2;
          }
        }
      } catch(ex) {}
    }

    if (!decrypted && (m.pqc_ciphertext || m.wrapped_key === 'PQC_V3') && m.encAESKey) {
      for (var k = 0; k < identities.length; k++) {
        var id3 = identities[k];
        if (!id3.pqcPriv) continue;
        try {
          var { ml_kem1024 } = await import('@noble/post-quantum/ml-kem');
          if (!m.pqc_ciphertext) continue;
          var shared = ml_kem1024.decapsulate(base64ToBytes(m.pqc_ciphertext), base64ToBytes(id3.pqcPriv));
          var sharedHex = CryptoJS.enc.Hex.parse(bytesToHex(shared));
          var msgKeyB64 = CryptoJS.AES.decrypt(m.encAESKey, sharedHex, {
            iv: CryptoJS.enc.Base64.parse(m.iv_shared),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);
          if (msgKeyB64) {
            var msgKeyHex = CryptoJS.enc.Hex.parse(bytesToHex(base64ToBytes(msgKeyB64)));
            var plain3 = CryptoJS.AES.decrypt(m.encContent || m.aes_content, msgKeyHex, {
              iv: CryptoJS.enc.Base64.parse(m.iv_content || m.iv),
              mode: CryptoJS.mode.CBC,
              padding: CryptoJS.pad.Pkcs7
            }).toString(CryptoJS.enc.Utf8);
            if (plain3) {
              var parts3 = plain3.split('|');
              if (parts3.length >= 3) {
                decrypted = {
                  nick: parts3[0],
                  time: parts3[1],
                  content: parts3.slice(2, parts3.length - 1).join('|'),
                  nonce: parts3[parts3.length - 1]
                };
                slotIdx = k;
                msgVersion = 'v3';
                // 比对发送方PQC公钥判断是否是自己发的
                var myPqcPubNorm = (id3.pqcPub||'').replace(/[\r\n\s]+/g,'');
                var senderPqcPubNorm = (m.sender_pqc_pub||'').replace(/[\r\n\s]+/g,'');
                isSentFlag = (myPqcPubNorm && senderPqcPubNorm && myPqcPubNorm === senderPqcPubNorm);
                v3MsgKey = msgKeyB64;
                break;
              }
            }
          }
        } catch(ex) {}
      }
    }

    if (decrypted) {
      var msgObj = {
        nick: decrypted.nick,
        time: decrypted.time,
        content: decrypted.content,
        slotIdx: slotIdx,
        timeSort: m.time,
        senderPub: m.sender_pub || '',
        senderPqcPub: m.sender_pqc_pub || '',
        filename: m.filename || '',
        wrappedKey: m.wrapped_key || '',
        iv: m.iv || '',
        version: msgVersion,
        msgKeyB64: v3MsgKey || '',
        signature: m.signature || '',
        sigValid: null
      };
      // ★ 验证签名
      if (msgObj.signature) {
        var sigPayload = decrypted.nick + '|' + decrypted.time + '|' + decrypted.content + '|' + decrypted.nonce;
        try {
          var pubKeyObj = forge.pki.publicKeyFromPem(msgObj.senderPub);
          var vMd = forge.md.sha256.create();
          vMd.update(sigPayload, 'utf8');
          var vPss = forge.pss.create({
            md: forge.md.sha256.create(),
            mgf: forge.mgf.mgf1.create(forge.md.sha256.create()),
            saltLength: 32
          });
          msgObj.sigValid = pubKeyObj.verify(vMd.digest().bytes(), forge.util.decode64(msgObj.signature), vPss);
        } catch(e) { msgObj.sigValid = false; }
      }
      if (isSentFlag) {
        newSent.push(msgObj);
      } else {
        msgObj.isReceived = true;
        newRecv.push(msgObj);
      }
    }
  }

  // 合并到全局数组并去重存储
  if(newSent.length > 0){
    newSent.forEach(function(nm){
      var dup = sentMessages.some(function(sm){ return sm.filename === nm.filename; });
      if(!dup) sentMessages.push(nm);
    });
    saveSent(sentMessages);
  }
  if(newRecv.length > 0){
    newRecv.forEach(function(nm){
      var dup = receivedMessages.some(function(rm){ return rm.filename === nm.filename; });
      if(!dup) receivedMessages.push(nm);
    });
    saveReceived(receivedMessages);
  }
  renderChat();
}

function renderChatWithData(allMsgs){
  var box = document.getElementById('chat-box');
  var wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 30;
  var prevScrollTop = box.scrollTop;

  var seen = {};
  var uniq = [];
  allMsgs.forEach(function(m){
    var k = m.nick + '|' + m.time + '|' + m.content;
    if(!seen[k]){ seen[k] = true; uniq.push(m); }
  });
  uniq.sort(function(a,b){
    var ta = a.timeSort || a.time;
    var tb = b.timeSort || b.time;
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });

  var html = '';
  uniq.forEach(function(m){
    var color = SLOT_COLORS[m.slotIdx] || '#999';
    var isSent = !m.isReceived;
    var cls = isSent ? ' sent' : ' received';
    var border = isSent
      ? 'border-right-color:' + color + ';border-left:none'
      : 'border-left-color:' + color;

    html += '<div class="chat-msg' + cls + '" style="' + border + '">';

    var header;
    if(isSent){
      header = '<span class="c-time">' + esc(m.time) + '</span>'
             + '<span class="c-nick" style="color:' + color + '">' + esc(m.nick) + ' ●</span>';
    }else{
      header = '<span class="c-nick" style="color:' + color + '">● ' + esc(m.nick) + '</span>'
             + '<span class="c-time">' + esc(m.time) + '</span>';
    }
    var encLabel = (m.version==='v3') ? ' 🔮' : ' 🔐';
    if (m.signature) {
      var sigIcon = m.sigValid === true ? '✅' : (m.sigValid === false ? '❌' : '❓');
      var sigTitle = m.sigValid === true ? 'RSA签名验证通过' : (m.sigValid === false ? 'RSA签名验证失败！消息可能被篡改' : '无法验证签名（无发送方公钥）');
      header += '<span style="font-size:9px;margin-left:4px;cursor:help" title="'+sigTitle+'">'+sigIcon+'</span>';
    }
    html += '<div>' + header
         + '<button class="copy-msg-btn" data-copy="' + esc(m.content) + '">📋复制</button>';

    // 收到的消息：举报按钮
    if (!isSent && m.filename) {
      html += '<button class="copy-msg-btn" style="background:#fff3e0;color:#e65100;border-color:#ffcc80;margin-left:4px" '
           + 'onclick="reportMessage(\'' + esc(m.filename) + '\',\'' + esc(m.wrappedKey||'') + '\',\'' + esc(m.iv||'') + '\',\'' + esc(m.slotIdx) + '\')">🚨举报</button>';
    }

    // 自己发的消息：撤回按钮
    if (isSent && m.filename) {
      html += '<button class="copy-msg-btn" style="background:#ffebee;color:#c62828;border-color:#ef9a9a;margin-left:4px" '
           + 'onclick="revokeMessage(\'' + esc(m.filename) + '\',\'' + esc(m.slotIdx) + '\')">↩撤回</button>';
    }

    html += '</div>';  // ← 关闭 header div
    html += '<div class="c-body">';
    try {
      html += DOMPurify.sanitize(marked.parse(m.content));
    }catch(e){
      html += esc(m.content);
    }
    html += '</div>';

    if (!isSent && m.filename && adminReplies[m.filename]) {
      html += '<div style="margin-top:8px;padding:8px 10px;background:#e8f5e9;border-left:3px solid #4CAF50;border-radius:4px;font-size:12px">';
      html += '<div style="font-weight:bold;color:#2e7d32;margin-bottom:4px">👮 管理员回复：</div>';
      html += '<div style="white-space:pre-wrap;line-height:1.5">' + esc(adminReplies[m.filename]) + '</div>';
      html += '</div>';
    }
    // ★ 已举报等待中
    if (!isSent && m.filename && reportedFiles.has(m.filename) && !adminReplies[m.filename]) {
      html += '<div style="margin-top:6px;font-size:11px;color:#e65100">⚠️ 已举报，等待管理员处理...</div>';
    }
    if (!isSent && m.senderPub) {
      var fp = pubKeyHash(m.senderPub);
      html += '<div style="font-size:10px;color:#aaa;margin-top:4px;word-break:break-all" title="' + esc(m.senderPub) + '">';
      html += '🔑 发送方公钥指纹: <span style="font-family:monospace;color:#888">' + esc(fp) + '</span>';
      html += ' <span style="cursor:pointer;text-decoration:underline" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==\'none\'?\'block\':\'none\'">展开</span>';
      html += '<span style="display:none;font-family:monospace;font-size:9px">' + esc(m.senderPub) + '</span>';
      html += '</div>';
    }
    // ★ 显示发送方PQC指纹
    if (!isSent && m.senderPqcPub) {
        var pqcFp = sha256hex(m.senderPqcPub).substring(0, 16);
        html += '<div style="font-size:10px;color:#9C27B0;margin-top:2px;word-break:break-all">';
        html += '🔮 发送方PQC指纹: <span style="font-family:monospace">' + esc(pqcFp) + '</span>';
        html += ' <span style="cursor:pointer;text-decoration:underline" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==\'none\'?\'block\':\'none\'">展开</span>';
        html += '<span style="display:none;font-family:monospace;font-size:9px">' + esc(m.senderPqcPub) + '</span>';
        html += '</div>';
    }

    html += '</div>';
  });

  box.innerHTML = html;

  if(wasAtBottom){
    box.scrollTop = box.scrollHeight;
  }else{
    box.scrollTop = Math.min(prevScrollTop, box.scrollHeight - box.clientHeight);
  }
}

// 7秒缓冲模块
// ═══════════════════════════════════════════
(function(){
  var STORAGE_KEY_RL = 'rate_limit_state_v1';
  var state = JSON.parse(localStorage.getItem(STORAGE_KEY_RL) || '{"blockUntil":0,"whitelisted":false}');
  var timer = null;

  function save(){ localStorage.setItem(STORAGE_KEY_RL, JSON.stringify(state)); }

  function updateUI(){
    var now = Date.now() / 1000;
    var remaining = Math.ceil(state.blockUntil - now);
    var disabled = !state.whitelisted && remaining > 0;
    document.querySelectorAll('.rate-limited-btn').forEach(function(btn){
      btn.disabled = disabled;
      if(disabled){
        if(!btn.dataset.origText) btn.dataset.origText = btn.textContent;
        btn.textContent = btn.dataset.origText + ' (' + remaining + 's)';
      }else{
        if(btn.dataset.origText) btn.textContent = btn.dataset.origText;
      }
    });
  }

  function start(){
    if(timer) clearInterval(timer);
    updateUI();
    timer = setInterval(function(){
      var remaining = Math.ceil(state.blockUntil - Date.now()/1000);
      if(remaining <= 0){ clearInterval(timer); timer = null; state.blockUntil = 0; }
      updateUI(); save();
    }, 200);
  }

  window.handleRateLimitResponse = function(response){
    var wl = response.headers.get('X-RateLimit-Whitelisted') === '1';
    var bu = parseFloat(response.headers.get('X-RateLimit-BlockUntil') || '0');
    state.whitelisted = wl;
    state.blockUntil = bu || 0;
    save();
    if(!wl && state.blockUntil > Date.now()/1000) start();
    else updateUI();
  };

  if(!state.whitelisted && state.blockUntil > Date.now()/1000) start();
  else updateUI();
})();

var ADMIN_PUB_KEY = '';
fetch('/gongyao.txt').then(function(r){ return r.text(); }).then(function(pub){
  ADMIN_PUB_KEY = pub.trim();
}).catch(function(){
  console.warn('无法加载管理员公钥，举报功能不可用');
});

function reportMessage(filename, wrappedKeyB64, ivB64, slotIdxStr){
  var slotIdx = parseInt(slotIdxStr) || 0;
  var id = identities[slotIdx];

  // ★ PQC (v3) 消息：使用本地存储的 msgKey 上报
  if (wrappedKeyB64 === 'PQC_V3') {
    reportPqcMessage(filename, slotIdx);
    return;
  }

  if(!id || !id.priv){
    alert('该身份的RSA私钥未设置，无法解密AES密钥进行举报');
    return;
  }

  if(!ADMIN_PUB_KEY){
    alert('管理员公钥尚未加载，请刷新页面后重试');
    return;
  }

  var aesKey = '';
  try {
    var jsePriv = new JSEncrypt();
    jsePriv.setPrivateKey(id.priv);
    aesKey = jsePriv.decrypt(wrappedKeyB64);
  } catch(e){}
  if(!aesKey){
    alert('无法解密该消息的AES密钥（可能不是发给你的）');
    return;
  }

  var reason = prompt('请输入举报理由（会被加密传输）：');
  if(!reason || !reason.trim()) return;
  reason = reason.trim().substring(0, 500);

  var jsePub = new JSEncrypt();
  jsePub.setPublicKey(ADMIN_PUB_KEY);
  var aesKeyEnc = jsePub.encrypt(aesKey);
  var reasonEnc = jsePub.encrypt(reason);

  if(!aesKeyEnc || !reasonEnc){
    alert('加密失败，请检查管理员公钥');
    return;
  }

  fetch('/api/chat/report', {
    method: 'POST',
    headers: {'Content-Type': 'application/json','X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      filename: filename,
      reporter_pub: id.pub.replace(/[\r\n]+/g,''),
      aes_key_enc: aesKeyEnc.replace(/[\r\n\s]+/g,''),
      reason_enc: reasonEnc.replace(/[\r\n\s]+/g,'')
    })
  }).then(function(r){
    // ★ 验证码拦截：418 → 跳转
    if (r.status === 418) {
      window.location.href = '/captcha?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    return r.json();
  }).then(function(d){
    if (!d) return; // 已跳转
    if(d.status === 'ok'){
      alert('✅ 举报已提交。\n编号: ' + d.report_id);
      reportMap[d.report_id] = {filename: filename, slotIdx: slotIdx};
      reportedFiles.add(filename);
      saveReportMap(reportMap);
      saveReportedFiles(Array.from(reportedFiles));
      renderChat();
    } else {
      alert('❌ ' + (d.error||'举报失败'));
    }
  }).catch(function(e){
    alert('请求失败: ' + e.message);
  });
}

function reportPqcMessage(filename, slotIdx) {
  if(!ADMIN_PUB_KEY){
    alert('管理员公钥尚未加载，请刷新页面后重试');
    return;
  }

  // 从本地缓存找到该消息的 msgKey
  var msgKeyB64 = null;
  var allMsgs = sentMessages.concat(receivedMessages);
  for (var i = 0; i < allMsgs.length; i++) {
    if (allMsgs[i].filename === filename && allMsgs[i].msgKeyB64) {
      msgKeyB64 = allMsgs[i].msgKeyB64;
      break;
    }
  }

  if (!msgKeyB64) {
    alert('无法找到该PQC消息的AES密钥（本地缓存可能已清除，请先让接收方刷新聊天）');
    return;
  }

  var reason = prompt('请输入举报理由（会被加密传输）：');
  if(!reason || !reason.trim()) return;
  reason = reason.trim().substring(0, 500);

  var jsePub = new JSEncrypt();
  jsePub.setPublicKey(ADMIN_PUB_KEY);
  var aesKeyEnc = jsePub.encrypt(msgKeyB64);
  var reasonEnc = jsePub.encrypt(reason);

  if(!aesKeyEnc || !reasonEnc){
    alert('加密失败，请检查管理员公钥');
    return;
  }

  var id = identities[slotIdx];
  fetch('/api/chat/report', {
    method: 'POST',
    headers: {'Content-Type': 'application/json','X-CSRF-Token': csrfToken},
    body: JSON.stringify({
      filename: filename,
      reporter_pub: 'PQC:' + sha256hex((id.pqcPub||'').replace(/[\r\n\s]+/g,'')).substring(0,32),
      aes_key_enc: aesKeyEnc.replace(/[\r\n\s]+/g,''),
      reason_enc: reasonEnc.replace(/[\r\n\s]+/g,'')
    })
  }).then(function(r){
    if (r.status === 418) {
      window.location.href = '/captcha?redirect=' + encodeURIComponent(window.location.href);
      return;
    }
    return r.json();
  }).then(function(d){
    if (!d) return;
    if(d.status === 'ok'){
      alert('✅ 举报已提交。\n编号: ' + d.report_id);
      reportMap[d.report_id] = {filename: filename, slotIdx: slotIdx};
      reportedFiles.add(filename);
      saveReportMap(reportMap);
      saveReportedFiles(Array.from(reportedFiles));
      renderChat();
    } else {
      alert('❌ ' + (d.error||'举报失败'));
    }
  }).catch(function(e){
    alert('请求失败: ' + e.message);
  });
}

async function revokeMessage(filename, slotIdxStr){
  var slotIdx = parseInt(slotIdxStr) || 0;
  var id = identities[slotIdx];

  // ★ 判断消息版本：从本地缓存查找
  var allMsgs = sentMessages.concat(receivedMessages);
  var msgObj = null;
  for (var i = 0; i < allMsgs.length; i++) {
    if (allMsgs[i].filename === filename) { msgObj = allMsgs[i]; break; }
  }
  var isV3 = msgObj && msgObj.version === 'v3';

  if (!isV3) {
    if(!id || !id.pub || !id.priv){
      alert('该身份的RSA密钥未设置，无法撤回');
      return;
    }
  } else {
    if(!id || !id.pqcPub || !id.pqcPriv){
      alert('该身份的PQC密钥未设置，无法撤回');
      return;
    }
  }

  showConfirm('确定撤回此消息？服务器上的文件将被真正删除。', async function(){
    try {
      // ★ 第一步：请求挑战（POST /api/chat/revoke/challenge）
      var challBody = {
        filename: filename,
        sender_pub: isV3 ? ('PQC:' + sha256hex((id.pqcPub||'').replace(/[\r\n\s]+/g,'')).substring(0,32)) : normalizePem(id.pub),
        version: isV3 ? 'v3' : 'v2'
      };
      var challRes = await fetch('/api/chat/revoke/challenge', {
        method: 'POST',
        headers: {'Content-Type': 'application/json','X-CSRF-Token': csrfToken},
        body: JSON.stringify(challBody)
      });

      // ★ 验证码拦截（第一步）
      if (challRes.status === 418) {
        window.location.href = '/captcha?redirect=' + encodeURIComponent(window.location.href);
        return;
      }

      window.handleRateLimitResponse(challRes);
      var challData = await challRes.json();

      if(!challRes.ok){
        alert('❌ ' + (challData.error || '请求挑战失败'));
        return;
      }

      // ★ 第二步：用私钥解密挑战
      var answer;
      if (isV3) {
        // PQC 解封装挑战
        var challData2 = JSON.parse(atob(challData.challenge));
        var { ml_kem1024 } = await import('@noble/post-quantum/ml-kem');
        var shared2 = ml_kem1024.decapsulate(
          base64ToBytes(challData2.ct),
          base64ToBytes(id.pqcPriv)
        );
        var sharedWa2 = CryptoJS.lib.WordArray.create(shared2);
        var key2 = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(sharedWa2).toString().substring(0, 64));
        var decrypted2 = CryptoJS.AES.decrypt(
          challData2.enc,
          key2,
          {iv: CryptoJS.enc.Base64.parse(challData2.iv), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7}
        );
        answer = decrypted2.toString(CryptoJS.enc.Utf8);
      } else {
        var jse = new JSEncrypt();
        jse.setPrivateKey(id.priv);
        answer = jse.decrypt(challData.challenge);
      }
      if(!answer){
        alert('❌ 解密挑战失败');
        return;
      }

      // ★ 第三步：提交答案 + token，完成撤回（POST /api/chat/revoke）
      var revokeRes = await fetch('/api/chat/revoke', {
        method: 'POST',
        headers: {'Content-Type': 'application/json','X-CSRF-Token': csrfToken},
        body: JSON.stringify({
          filename: filename,
          answer: answer,
          token: challData.token
        })
      });

      // ★ 验证码拦截（第三步）
      if (revokeRes.status === 418) {
        window.location.href = '/captcha?redirect=' + encodeURIComponent(window.location.href);
        return;
      }

      window.handleRateLimitResponse(revokeRes);
      var revokeData = await revokeRes.json();

      if(revokeData.status === 'ok'){
        alert('✅ 已撤回');
        sentMessages = sentMessages.filter(function(m){ return m.filename !== filename; });
        saveSent(sentMessages);
        receivedMessages = receivedMessages.filter(function(m){ return m.filename !== filename; });
        saveReceived(receivedMessages);
        renderChat();
      } else {
        alert('❌ ' + (revokeData.error || '撤回失败'));
      }
    } catch(e){
      alert('请求失败: ' + e.message);
    }
  });
}

// 每3秒查询举报回复
setInterval(function(){
  identities.forEach(function(id){
    if(!id.pub) return;
    var h = pubKeyHash(id.pub);
    fetch('/api/chat/report/status?reporter_hash=' + h)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var changed = false;
        (data.reports||[]).forEach(function(r){
          if(r.filename && !reportedFiles.has(r.filename)){
            reportedFiles.add(r.filename);
            saveReportedFiles(Array.from(reportedFiles));
            changed = true;
          }
          if(r.admin_reply && r.filename){
            var old = adminReplies[r.filename] || '';
            if(r.admin_reply !== old){
              adminReplies[r.filename] = r.admin_reply;
              saveAdminReplies(adminReplies);
              changed = true;
              if(!sessionStorage.getItem('rpt_alert_'+r.report_id)){
                sessionStorage.setItem('rpt_alert_'+r.report_id,'1');
              }
            }
          }
        });
        if(changed) renderChat();
      }).catch(function(){});
  });
}, 3000);
