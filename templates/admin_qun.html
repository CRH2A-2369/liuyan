<script>
var esc = function(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
};
var csrfToken = '';

// ═══════ AI 模块（管理员端） ═══════
// ═══════ 限流状态共享（与用户端共用 localStorage）═══════
var RATE_LS_KEY = 'rate_limit_state_v1';
function isRateLimited() {
  try {
    var state = JSON.parse(localStorage.getItem(RATE_LS_KEY) || '{"blockUntil":0,"whitelisted":false}');
    if (state.whitelisted) return false;
    return state.blockUntil > Date.now() / 1000;
  } catch(e) { return false; }
}
function handleRateLimitResponse(response) {
  var wl = response.headers.get('X-RateLimit-Whitelisted') === '1';
  var bu = parseFloat(response.headers.get('X-RateLimit-BlockUntil') || '0');
  try {
    var state = JSON.parse(localStorage.getItem(RATE_LS_KEY) || '{"blockUntil":0,"whitelisted":false}');
    state.whitelisted = wl;
    state.blockUntil = bu || 0;
    localStorage.setItem(RATE_LS_KEY, JSON.stringify(state));
  } catch(e) {}
}
var LS_ADMIN_AI = 'qun_admin_ai_config_v1';
var adminAiConfig = null;
var adminAiLastCheckedIndex = -1;
var adminAiPending = false;

function loadAdminAiConfig() {
  try {
    var raw = localStorage.getItem(LS_ADMIN_AI);
    adminAiConfig = raw ? JSON.parse(raw) : null;
  } catch(e) { adminAiConfig = null; }
  if (!adminAiConfig || !adminAiConfig.url || !adminAiConfig.key || !adminAiConfig.model) {
    adminAiConfig = null;
  }
  var panel = document.getElementById('admin-ai-panel');
  if (!panel) return;
  document.getElementById('ai-url').value = (adminAiConfig && adminAiConfig.url) || '';
  document.getElementById('ai-key').value = (adminAiConfig && adminAiConfig.key) || '';
  document.getElementById('ai-model').value = (adminAiConfig && adminAiConfig.model) || '';
  document.getElementById('ai-nick').value = (adminAiConfig && adminAiConfig.nick) || '';
  document.getElementById('ai-prompt').value = (adminAiConfig && adminAiConfig.prompt) || '';
  document.getElementById('ai-aes-key').value = (adminAiConfig && adminAiConfig.aes_key) || '';
  document.getElementById('ai-enable').checked = !!(adminAiConfig && adminAiConfig.enabled);
  toggleAiPanel();
  adminAiLastCheckedIndex = -1;
}

function saveAdminAiConfig() {
  var cfg = {
    url: document.getElementById('ai-url').value.trim(),
    key: document.getElementById('ai-key').value.trim(),
    model: document.getElementById('ai-model').value.trim(),
    nick: document.getElementById('ai-nick').value.trim() || '助手',
    prompt: document.getElementById('ai-prompt').value.trim(),
    enabled: document.getElementById('ai-enable').checked,
    aes_key: document.getElementById('ai-aes-key').value.trim()
  };
  if (!cfg.url || !cfg.key || !cfg.model || !cfg.aes_key) {
    alert('请填写 API 网址、Key、模型名称和 AES 密钥');
    return false;
  }
  adminAiConfig = cfg;
  localStorage.setItem(LS_ADMIN_AI, JSON.stringify(adminAiConfig));
  adminAiLastCheckedIndex = -1;
  alert('✅ AI 配置已保存');
  return true;
}

function toggleAiPanel() {
  var panel = document.getElementById('ai-settings');
  if (!panel) return;
  panel.style.display = document.getElementById('ai-enable').checked ? 'block' : 'none';
}

function exportAdminAiConfig() {
  if (!adminAiConfig) { alert('请先保存配置'); return; }
  var blob = new Blob([JSON.stringify(adminAiConfig, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'qun-admin-ai-config.json';
  a.click();
}

function importAdminAiConfig() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function() {
    var f = input.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function() {
      try {
        var cfg = JSON.parse(r.result);
        if (!cfg.url || !cfg.key || !cfg.model) { alert('配置文件不完整'); return; }
        adminAiConfig = cfg;
        localStorage.setItem(LS_ADMIN_AI, JSON.stringify(adminAiConfig));
        document.getElementById('ai-url').value = cfg.url || '';
        document.getElementById('ai-key').value = cfg.key || '';
        document.getElementById('ai-model').value = cfg.model || '';
        document.getElementById('ai-nick').value = cfg.nick || '';
        document.getElementById('ai-prompt').value = cfg.prompt || '';
        document.getElementById('ai-enable').checked = !!cfg.enabled;
        toggleAiPanel();
        adminAiLastCheckedIndex = -1;
        alert('✅ 配置已导入');
      } catch(e) { alert('导入失败：格式错误'); }
    };
    r.readAsText(f);
  };
  input.click();
}

async function adminCallAI(recentMessages) {
  if (!adminAiConfig || !adminAiConfig.enabled) return null;
  if (adminAiPending) return null;

  var msgs = [];
  if (adminAiConfig.prompt) msgs.push({ role: 'system', content: adminAiConfig.prompt });
  msgs.push({ role: 'system', content: '你正在一个群聊中。以成员身份自然简短回复。如果不需要回复，输出一个字"无"。' });
  for (var i = 0; i < recentMessages.length; i++) {
    var m = recentMessages[i];
    var role = (m.nick === ('AI:' + adminAiConfig.nick)) ? 'assistant' : 'user';
    msgs.push({ role: role, content: '[' + m.nick + ']: ' + m.content });
  }
  adminAiPending = true;
  try {
    var resp = await fetch(adminAiConfig.url.replace(/\/+$/, '') + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminAiConfig.key },
      body: JSON.stringify({ model: adminAiConfig.model, messages: msgs, max_tokens: 512, temperature: 0.7 })
    });
    if (!resp.ok) { console.error('Admin AI error:', resp.status); return null; }
    var data = await resp.json();
    var reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || '').trim();
    if (!reply || reply === '无' || reply === '无。') return null;
    return reply;
  } catch(e) { console.error('Admin AI failed:', e); return null; }
  finally { adminAiPending = false; }
}

function adminAiCheckAndReply(data) {
  if (!adminAiConfig || !adminAiConfig.enabled) return;
  if (adminAiPending) return;
  if (!adminAiConfig.aes_key) return;              // 未配置密钥不触发
  if (isRateLimited()) return;                     // 被限流时不触发
  if (!data || data.length === 0) return;

  var maxIdx = -1;
  for (var i = 0; i < data.length; i++) { if (data[i].index > maxIdx) maxIdx = data[i].index; }
  if (adminAiLastCheckedIndex === -1) { adminAiLastCheckedIndex = maxIdx; return; }
  if (maxIdx <= adminAiLastCheckedIndex) return;
  adminAiLastCheckedIndex = maxIdx;

  var aiNick = 'AI:' + (adminAiConfig.nick || '助手');
  for (var j = data.length - 1; j >= 0; j--) {
    if (data[j].state === 'disabled') continue;
    if (data[j].nick === aiNick) return;            // 最新消息是自己，不回复
    break;
  }

  var ctx = [];
  for (var k = Math.max(0, data.length - 20); k < data.length; k++) {
    if (data[k].state !== 'disabled') ctx.push(data[k]);
  }

  adminCallAI(ctx).then(function(reply) {
    if (!reply || !adminAiConfig || !adminAiConfig.enabled) return;
    if (isRateLimited()) return;                   // API 调用完成后再次检查
    var nick = 'AI:' + (adminAiConfig.nick || '助手');
    authFetch('/api/qun', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nick: nick, content: reply, key: adminAiConfig.aes_key })
    }).then(function(r) {
      handleRateLimitResponse(r);                  // 把后端限流头写进 localStorage
      if (r.ok) loadMsgs();
    });
  });
}

var authFetch = function(url, opts) {
  opts = opts || {};
  var headers = opts.headers || {};
  if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
  return fetch(url, Object.assign({credentials: 'same-origin'}, opts, {headers: headers}));
};

var stateLabels = {enabled:'✅ 启用', disabled:'🚫 禁用', forced:'📢 强制'};
var stateClasses = {enabled:'state-enabled', disabled:'state-disabled', forced:'state-forced'};
var stateOptions = {
  enabled:  ['disabled', 'forced'],
  disabled: ['enabled',  'forced'],
  forced:   ['enabled',  'disabled']
};
// ── 消息缓存（增量更新） ──
var messagesCache = [];
var msgElements = {};

// ── 管理员 RSA 私钥（用于解密举报身份） ──
var adminJse = null;
var adminPqcPrivBytes = null;

async function loadAdminKeys() {
    // 1. 优先尝试 KeyManager（SharedWorker）
    if (typeof KeyManager !== 'undefined') {
        try {
            const keys = await KeyManager.init();
            if (keys) {
                adminJse = new JSEncrypt();
                adminJse.setPrivateKey(keys.rsaKey);
                const binary = atob(keys.pqcKey);
                adminPqcPrivBytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    adminPqcPrivBytes[i] = binary.charCodeAt(i);
                }
                // 存入 sessionStorage 备用
                sessionStorage.setItem('admin_priv_key', keys.rsaKey);
                sessionStorage.setItem('admin_pqc_priv_key', keys.pqcKey);
                if (keys.dataKey) {
                    sessionStorage.setItem('admin_data_key', keys.dataKey);
                    adminDataJse = new JSEncrypt();
                    adminDataJse.setPrivateKey(keys.dataKey);
                }
                return true;
            }
        } catch (e) {
            console.warn('KeyManager.init() 失败，尝试从 sessionStorage 恢复', e);
        }
    }

    // 2. 回退：从 sessionStorage 读取明文私钥
    const rsaKey = sessionStorage.getItem('admin_priv_key');
    const pqcKey = sessionStorage.getItem('admin_pqc_priv_key');
    if (rsaKey && pqcKey) {
        try {
            adminJse = new JSEncrypt();
            adminJse.setPrivateKey(rsaKey);
            const binary = atob(pqcKey);
            adminPqcPrivBytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                adminPqcPrivBytes[i] = binary.charCodeAt(i);
            }
            const dataKey = sessionStorage.getItem('admin_data_key');
            if (dataKey) {
                adminDataJse = new JSEncrypt();
                adminDataJse.setPrivateKey(dataKey);
            }
            return true;
        } catch (e) {
            console.error('从 sessionStorage 恢复私钥失败', e);
        }
    }
    return false;
}

function decryptIdentity(cipherText) {
  if (!cipherText) return '（空）';
  if (!adminJse) return '（私钥未加载）';
  try {
    var plain = adminJse.decrypt(cipherText);
    return plain || '（解密失败，密文或密钥不匹配）';
  } catch(e) {
    return '（解密出错）';
  }
}

// ── IP 解密（RSA / PQC / PLAIN） ──
async function decryptIp(raw) {
  if (!raw) return '—';

  // PQC 解密
  if (raw.startsWith('PQC_IP:') || raw.startsWith('PQC:')) {
    if (!adminPqcPrivBytes) return '(PQC私钥未加载)';
    try {
      var b64 = raw.startsWith('PQC_IP:') ? raw.slice(7) : raw.slice(4);
      var pqcData = JSON.parse(atob(b64));
      var pqcPriv = Uint8Array.from(atob(savedPQC), function(c) { return c.charCodeAt(0); });
      var ct = Uint8Array.from(atob(pqcData.ct), function(c) { return c.charCodeAt(0); });
      var ml_kem_mod = await import('@noble/post-quantum/ml-kem');
      var ml_kem = ml_kem_mod.ml_kem1024;
      var shared = ml_kem.decapsulate(ct, pqcPriv);
      var key = await crypto.subtle.digest('SHA-256', shared);
      var aesKey = new Uint8Array(key);
      var iv = Uint8Array.from(atob(pqcData.iv), function(c) { return c.charCodeAt(0); });
      var enc = Uint8Array.from(atob(pqcData.enc), function(c) { return c.charCodeAt(0); });
      var dec = await crypto.subtle.decrypt(
        { name: 'AES-CBC', iv: iv },
        await crypto.subtle.importKey('raw', aesKey, { name: 'AES-CBC' }, false, ['decrypt']),
        enc
      );
      var decArr = new Uint8Array(dec);
      var padLen = decArr[decArr.length - 1];
      if (padLen > 0 && padLen <= 16) {
        return new TextDecoder().decode(decArr.slice(0, decArr.length - padLen));
      }
      return new TextDecoder().decode(decArr);
    } catch(e) {
      return '(PQC解密失败)';
    }
  }

  // RSA 解密
  if (raw.startsWith('RSA:')) {
    if (!adminJse) return '(私钥未加载)';
    try {
      var plain = adminJse.decrypt(raw.slice(4));
      return plain || '(解密失败)';
    } catch(e) {
      return '(解密出错)';
    }
  }

  // PLAIN 降级
  if (raw.startsWith('PLAIN:')) {
    return raw.slice(6);
  }

  // 纯明文兜底
  return raw;
}

async function init() {
  try {
    var csrfRes = await fetch('/api/csrf', {credentials:'same-origin'});
    csrfToken = (await csrfRes.json()).token;
    var statusRes = await fetch('/api/admin/status', {credentials:'same-origin'});
    var status = await statusRes.json();
    if (status.logged_in) {
      var keysLoaded = await loadAdminKeys();
      if (!keysLoaded) {
        await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}});
        sessionStorage.clear();
        window.location.href = '/admin';
        return;
      }
      document.getElementById('login-wall').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      loadPerm(); loadMsgs(); loadRule(); loadThreshold();loadAdminAiConfig();
      fetch('/api/footer').then(function(r){return r.text();}).then(function(t){document.getElementById('footer').textContent=t;});
    } else {
      document.getElementById('login-wall').style.display = 'block';
    }
  } catch(e) { console.error('Init:', e); }
}
init();

async function saveRule() {
  var rule = document.getElementById('rule-input').value.trim();
  try {
    var resp = await authFetch('/api/admin/qun/rule', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rule:rule, force:false})
    });

    if (resp.ok) {
      alert('✅ 规则已保存');
      return;
    }

    var data = await resp.json();
    if (data.dangerous) {
      var confirmed = confirm(
        '⚠️ 该正则包含危险模式（如嵌套量词），可能导致服务卡死。\n\n' +
        '• 强烈建议修改为更安全的正则\n' +
        '• 超时保护（1秒）仍然生效，但可能影响性能\n\n' +
        '确认要强制保存吗？'
      );
      if (!confirmed) return;

      resp = await authFetch('/api/admin/qun/rule', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({rule:rule, force:true})
      });

      if (resp.ok) {
        alert('✅ 规则已保存');
      } else {
        var errText = await resp.text();
        alert('保存失败：' + errText);
      }
    } else {
      alert('保存失败：' + (data.error || '未知错误'));
    }
  } catch(e) {
    alert('保存失败：' + e.message);
  }
}

// ── 单条消息渲染（管理员版） ──
async function renderAdminMsg(m) {
  var safeHtml = DOMPurify.sanitize(marked.parse(m.content));
  var state = m.state || 'enabled';
  var pinnedClass = m.pinned ? ' pinned' : '';
  var stateClass = ' ' + state;
  var pinBtnText = m.pinned ? '取消置底' : '📌 置底';
  var pinBtnClass = m.pinned ? 'pin-btn is-pinned' : 'pin-btn';

  var div = document.createElement('div');
  div.className = 'msg' + pinnedClass + stateClass;

  // 按钮行
  var btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  var delBtn = document.createElement('button');
  delBtn.className = 'del-btn'; delBtn.textContent = '删除';
  delBtn.onclick = (function(idx){return function(){deleteMsg(idx);};})(m.index);
  btnRow.appendChild(delBtn);

  var pinBtn = document.createElement('button');
  pinBtn.className = pinBtnClass; pinBtn.textContent = pinBtnText;
  pinBtn.onclick = (function(idx){return function(){togglePin(idx);};})(m.index);
  btnRow.appendChild(pinBtn);

  var targets = stateOptions[state] || ['enabled','disabled'];
  targets.forEach(function(target){
    var sBtn = document.createElement('button');
    sBtn.className = 'state-btn';
    sBtn.textContent = stateLabels[target];
    sBtn.onclick = (function(idx, t){return function(){setStateDirect(idx, t);};})(m.index, target);
    btnRow.appendChild(sBtn);
  });

  div.appendChild(btnRow);

  // 元数据
  var metaDiv = document.createElement('div');
  metaDiv.className = 'meta';
  var stateBadge = document.createElement('span');
  stateBadge.className = 'state-badge ' + (stateClasses[state] || '');
  stateBadge.textContent = stateLabels[state] || state;
  metaDiv.appendChild(stateBadge);

  var pinLabel = document.createElement('span');
  pinLabel.className = 'pin-label'; pinLabel.textContent = '📌 已置底';
  metaDiv.appendChild(pinLabel);

  metaDiv.appendChild(document.createTextNode('👤 ' + m.nick + ' | 🌐 ' + (await decryptIp(m.ip)) + ' | 🕒 ' + m.time));
  if (m.key_hash) {
    metaDiv.appendChild(document.createTextNode(' | 🔑 ' + m.key_hash.substring(0, 12) + '…'));
  }

  var copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn'; copyBtn.textContent = '复制'; copyBtn.dataset.copy = m.content;
  if (m.nick && m.nick.indexOf('AI:') === 0) {
    var aiBadge = document.createElement('span');
    aiBadge.style.cssText = 'display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#f3e5f5;color:#7B1FA2;margin-left:6px;font-weight:bold';
    aiBadge.textContent = '🤖AI';
    metaDiv.appendChild(aiBadge);
  }
  metaDiv.appendChild(copyBtn);
  div.appendChild(metaDiv);

  // 举报详情
  if (m.reports && m.reports.length > 0) {
    var reportDiv = document.createElement('div');
    reportDiv.style.cssText = 'margin:6px 0;padding:8px;background:#fff5f5;border-radius:4px;font-size:11px';
    reportDiv.innerHTML = '<strong style="color:#E91E63">⚠️ 举报记录（' + m.reports.length + ' 次）：</strong>';
    m.reports.forEach(function(r, ri){
      var decryptedId = decryptIdentity(r.encrypted || '');
      var shortCipher = esc((r.encrypted || '').slice(-12));
      reportDiv.innerHTML +=
        '<div class="report-detail">' +
        '#' + (ri+1) + ' 🕒 ' + esc(r.time) +
        ' | IP-SHA512: <code>' + esc((r.ip_hash || '').substring(0,16)) + '…</code>' +
        ' | 👤 身份: <span class="decrypted-id">' + esc(decryptedId) + '</span>' +
        ' <span style="color:#aaa">(密文尾:' + shortCipher + ')</span>' +
        '</div>';
    });
    div.appendChild(reportDiv);
  }

  // 内容
  var contentDiv = document.createElement('div');
  contentDiv.className = 'md-content';
  contentDiv.innerHTML = safeHtml;
  div.appendChild(contentDiv);

  return div;
}
function loadMsgs() {
  authFetch('/api/admin/qun').then(function(r){return r.json();}).then(async function(data){
    var c = document.getElementById('chat');

    var oldIdx = {};
    messagesCache.forEach(function(m){ oldIdx[m.index] = m; });
    var newIdx = {};
    data.forEach(function(m){ newIdx[m.index] = m; });

    // ① 删除
    messagesCache.forEach(function(oldMsg){
      if (!newIdx[oldMsg.index]) {
        var el = msgElements[oldMsg.index];
        if (el && el.parentNode) {
          el.parentNode.removeChild(el);
        }
        delete msgElements[oldMsg.index];
      }
    });

    // ② 新增 & 更新
    for (var idx = 0; idx < data.length; idx++) {
      var m = data[idx];
      var oldMsg = oldIdx[m.index];
      var existingEl = msgElements[m.index];

      if (!oldMsg) {
        // 全新
        var div = await renderAdminMsg(m);
        msgElements[m.index] = div;
        var refNode = c.children[idx];
        if (refNode) {
          c.insertBefore(div, refNode);
        } else {
          c.appendChild(div);
        }
      } else if (
        oldMsg.state !== m.state ||
        oldMsg.pinned !== m.pinned ||
        oldMsg.content !== m.content ||
        oldMsg.nick !== m.nick ||
        oldMsg.time !== m.time ||
        oldMsg.ip !== m.ip ||
        JSON.stringify(oldMsg.reports) !== JSON.stringify(m.reports)
      ) {
        // 变更 → 替换
        var newDiv = await renderAdminMsg(m);
        msgElements[m.index] = newDiv;
        if (existingEl && existingEl.parentNode) {
          existingEl.parentNode.replaceChild(newDiv, existingEl);
        } else {
          c.appendChild(newDiv);
        }
      } else if (existingEl && c.children[idx] !== existingEl) {
        // 顺序变化
        var refNode = c.children[idx];
        if (refNode && refNode !== existingEl) {
          c.insertBefore(existingEl, refNode);
        }
      }
    }

    // ③ 更新缓存
    messagesCache = data;
    window.__checkUnread(data);
    adminAiCheckAndReply(data);
  }).catch(function(e){console.error('加载群聊失败:', e);});
}
function deleteMsg(index) {
  if (!confirm('确定删除此消息？')) return;
  authFetch('/api/admin/qun/delete/' + index, {method:'POST'}).then(function(){loadMsgs();});
}

// ═══════ 未读消息计数（管理员版）═══════
(function(){
  var LS_KEY = 'qun_admin_last_seen_v3';
  var badge = null;
  var dismissed = false;
  var firstUnreadIdx = -1;

  function getLastSeen() {
    var v = localStorage.getItem(LS_KEY);
    return v ? parseInt(v, 10) : 0;
  }

  function saveLastSeen() {
    localStorage.setItem(LS_KEY, String(Date.now()));
  }

  // 刚打开页面时记录
  saveLastSeen();

  // 每5秒更新
  setInterval(saveLastSeen, 5000);

  // 关闭/刷新时保存
  window.addEventListener('beforeunload', saveLastSeen);

  function parseMsgTime(s) {
    if (!s) return 0;
    var t = Date.parse(s);
    if (!isNaN(t)) return t;
    t = Date.parse(s.replace(' ', 'T'));
    if (!isNaN(t)) return t;
    return 0;
  }

  function computeUnread(data) {
    var lastSeen = getLastSeen();
    if (!lastSeen) return { count: 0, idx: -1 };

    var count = 0, firstIdx = -1;
    for (var i = 0; i < data.length; i++) {
      var msgTs = parseMsgTime(data[i].time);
      if (msgTs > lastSeen) {
        if (firstIdx === -1) firstIdx = i;
        count++;
      }
    }
    return { count: count, idx: firstIdx };
  }

  function showBadge(info) {
    if (!badge) {
      badge = document.createElement('div');
      badge.id = 'qun-admin-unread-badge';
      badge.style.cssText = [
        'position:fixed;bottom:80px;right:20px;',
        'background:#FF5722;color:#fff;',
        'padding:12px 22px;border-radius:24px;',
        'font-size:15px;font-weight:bold;cursor:pointer;',
        'z-index:9999;display:none;',
        'box-shadow:0 4px 16px rgba(255,87,34,0.5);',
        'border:none;transition:all 0.2s;',
        'font-family:sans-serif;'
      ].join('');
      badge.onmouseover = function(){ this.style.transform = 'scale(1.05)'; };
      badge.onmouseout  = function(){ this.style.transform = 'scale(1)'; };
      badge.onclick = function() {
        var chat = document.getElementById('chat');
        if (firstUnreadIdx >= 0 && chat && chat.children[firstUnreadIdx]) {
          chat.children[firstUnreadIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        badge.style.display = 'none';
        dismissed = true;
      };
      document.body.appendChild(badge);
    }

    if (info.count >= 5 && !dismissed) {
      badge.textContent = '📬 ' + info.count + ' 条未读消息 ↓';
      badge.style.display = 'block';
      firstUnreadIdx = info.idx;
    } else {
      badge.style.display = 'none';
    }
  }

  window.__checkUnread = function(data) {
    if (!dismissed) {
      showBadge(computeUnread(data));
    }
  };
})();
