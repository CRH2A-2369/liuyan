<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>电子信箱</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-E8QSvWZ0eCLGk4km3hxSsNmGWbLtSCSUcewDQPQWZF6pEU8GlT8a5fF32wOl1i8ftdMhssTrF/OhyGWwonTcXA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js" integrity="sha512-94ncgEEqkuZ4yNTFmu2dSn1TJ6Ij+ANQqpR7eLVU99kzvYzu6UjBxuVoNHtnd29R+T6nvK+ugCVI698pbyEkvQ==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js" integrity="sha512-rfX4p3RNnxdwLT3wWP1K0NR3ztTobn+sISlT9WhxDDK00zNYbQ6MCHA5OHm0hqKAzEMXYCgFrp8iY/ER5MkXqA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" crossorigin="anonymous"></script>
  <style>
    body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;min-height:100vh;display:flex;flex-direction:column}
    .box{display:flex;flex-direction:column;gap:12px}
    .row{display:flex;gap:10px;align-items:flex-start}
    textarea{flex:1;min-height:80px;resize:vertical;padding:8px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
    button{padding:8px 16px;cursor:pointer;height:36px;border:none;border-radius:4px;background:#2196F3;color:#fff}
    input{padding:8px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
    #modal,#reply-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:999}
    .modal-box{background:#fff;padding:24px 20px 20px;border-radius:8px;text-align:center;max-width:420px;width:90%;position:relative;max-height:90vh;overflow-y:auto}
    .close-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;background:#f44336;color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
    .close-btn:hover{background:#d32f2f}
    footer{margin-top:auto;padding:20px 0;text-align:center;color:#888;font-size:12px;border-top:1px solid #eee}
    #reply-box{margin-top:15px;text-align:left;background:#f5f5f5;padding:10px;border-radius:6px;display:none;max-height:300px;overflow-y:auto}
    .rand-btn{background:#f5f5f5;color:#333;border:1px solid #ccc;height:36px;white-space:nowrap}
    .link-btn{background:#FF9800;font-size:12px;height:30px;padding:0 12px}
    .hint{font-size:12px;color:#888;margin:4px 0 0}
    a.qun-link{font-size:14px;margin-left:12px;color:#2196F3;text-decoration:none;border:1px solid #2196F3;padding:3px 10px;border-radius:4px}
    .copy-btn{background:#eee;border:1px solid #ddd;border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;color:#555;margin-left:8px;vertical-align:middle}
    .copy-btn:hover{background:#ddd}
    .copy-btn.copied{background:#4CAF50;color:#fff;border-color:#4CAF50}
    .md-content{line-height:1.6;font-size:14px;word-break:break-all}
    .md-content img{max-width:100%;border-radius:4px;margin:4px 0;cursor:pointer}
    .md-content a{color:#2196F3;text-decoration:none;word-break:break-all}
    .md-content pre{background:#f5f5f5;padding:8px;border-radius:4px;overflow-x:auto;font-size:12px;margin:4px 0}
    .md-content code{background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:13px}

    /* 🔑 查询标签页 */
    #query-tabs{display:flex;gap:0;margin:10px 0;border-radius:6px;overflow:hidden;border:1px solid #673AB7}
    .query-tab{flex:1;padding:8px 0;cursor:pointer;border:none;background:#f5f5f5;color:#666;font-size:13px;border-radius:0;height:auto;transition:background 0.2s}
    .query-tab.active{background:#673AB7;color:#fff}
    .query-tab:not(.active):hover{background:#e0e0e0}
  </style>
</head>
<body>
  <h2>电子信箱
  <a href="/vote" class="qun-link" style="background:#673AB7;border-color:#673AB7;color:#fff">🗳️ 投票</a>
  <a href="/qun" class="qun-link">👥 讨论群</a>
</h2>
  <p style="color:#666;margin:0 0 15px">本网站需要使用cookie来保存您的昵称和密钥，继续使用本网站代表允许本网站使用cookie</p>

  <form id="form" class="box">
    <input id="nick" placeholder="昵称（≤32字）" maxlength="32" required>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="aesKey" placeholder="本地AES密钥（≤64字符）" maxlength="64" required style="flex:1;padding:8px">
      <button type="button" class="rand-btn" onclick="genRandomKey()">🎲 随机32位</button>
    </div>
    <button type="button" class="link-btn" onclick="insertFileLink()">🔗 插入文件外链</button>
    <p class="hint">外链功能支持图片预览与文件下载及排版，由于服务器原因，无法存储大文件，请用户将文件上传到网盘并获得外链</p>
    <div class="row">
      <textarea id="msg" placeholder="留言（≤2048字，支持 Markdown）" maxlength="2048" required></textarea>
      <button type="button" onclick="showModal()">发送</button>
    </div>
    <button type="button" onclick="showReplyModal()" style="background:#673AB7;width:100%;margin-top:5px">📩 查询我的消息</button>
  </form>

  <div id="modal">
    <div class="modal-box">
      <p>提交信件代表您同意我们使用该信件进行处理，确认提交此信件吗？</p>
      <button onclick="submit()">确认</button>
      <button onclick="closeModal()" style="margin-left:10px;background:#ccc">取消</button>
    </div>
  </div>

  <!-- 🔑 查询弹窗：双标签页 -->
  <div id="reply-modal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeReplyModal()" title="关闭">✕</button>
      <h3 style="margin:0 0 4px">查询消息</h3>

      <!-- 标签页切换 -->
      <div id="query-tabs">
        <button id="tab-reply" class="query-tab active" onclick="switchQueryTab('reply')">📩 管理员回复</button>
        <button id="tab-msg" class="query-tab" onclick="switchQueryTab('msg')">📝 我的留言</button>
      </div>

      <input id="check-nick" placeholder="输入你的昵称" style="margin:10px 0;width:100%">
      <input id="check-key" placeholder="输入你的AES密钥" style="margin:10px 0;width:100%">
      <button id="query-btn" onclick="doQuery()" style="background:#673AB7;width:100%">查询</button>
      <div id="reply-box"></div>
    </div>
  </div>

  <footer id="footer"></footer>

<script>
  var currentQueryTab = 'reply';  // 'reply' | 'msg'

  function deriveAESKey(str) {
    return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString());
  }

  var setCookie = function(n, v) {
    document.cookie = n + '=' + encodeURIComponent(v) + ';max-age=2592000;path=/';
  };

  var getCookie = function(n) {
    var m = document.cookie.match('(^|;)\\s*' + n + '=([^;]*)');
    return m ? decodeURIComponent(m[2]) : '';
  };

  var esc = function(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  };

  document.getElementById('nick').value = getCookie('msg_nick');
  document.getElementById('aesKey').value = getCookie('msg_aes');
  fetch('/api/footer').then(function(r){return r.text();}).then(function(t){
    document.getElementById('footer').textContent = t;
  });

  function showModal() { document.getElementById('modal').style.display = 'flex'; }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function showReplyModal() {
    document.getElementById('reply-modal').style.display = 'flex';
    document.getElementById('check-nick').value = getCookie('msg_nick');
    document.getElementById('check-key').value = getCookie('msg_aes');
    document.getElementById('reply-box').style.display = 'none';
    document.getElementById('reply-box').innerHTML = '';
  }

  function closeReplyModal() {
    document.getElementById('reply-modal').style.display = 'none';
  }

  // 🔑 切换标签页
  function switchQueryTab(tab) {
    currentQueryTab = tab;
    document.getElementById('tab-reply').classList.toggle('active', tab === 'reply');
    document.getElementById('tab-msg').classList.toggle('active', tab === 'msg');
    // 切换时清空结果
    document.getElementById('reply-box').style.display = 'none';
    document.getElementById('reply-box').innerHTML = '';
  }

  // 🔑 根据当前标签执行对应查询
  function doQuery() {
    if (currentQueryTab === 'reply') {
      checkReply();
    } else {
      checkMyMessages();
    }
  }

  function genRandomKey() {
    var chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ,./?;:><|]}[{=-+_!@#$%^&*()~';
    var key = '';
    for (var i = 0; i < 32; i++) {
      key += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById('aesKey').value = key;
  }

  function insertFileLink() {
    var url = prompt('请输入文件URL（支持图片/文档/视频等）:');
    if (!url) return;
    var name = prompt('请输入显示名称:', url.split('/').pop() || '文件') || '文件';
    var ext = url.split('.').pop().toLowerCase();
    var md = '';
    if (['jpg','jpeg','png','gif','webp','svg'].indexOf(ext) !== -1) {
      md = '![' + name + '](' + url + ')';
    } else {
      md = '[📎 ' + name + '](' + url + ')';
    }
    var ta = document.getElementById('msg');
    ta.value += (ta.value ? '\n' : '') + md;
    ta.focus();
  }

  function submit() {
    var nick = document.getElementById('nick').value.trim();
    var keyIn = document.getElementById('aesKey').value.trim();
    var msg = document.getElementById('msg').value;
    if (!nick || !keyIn || !msg) { alert('请填写完整'); return; }

    setCookie('msg_nick', nick);
    setCookie('msg_aes', keyIn);
    var iv = CryptoJS.lib.WordArray.random(16);
    var key32 = deriveAESKey(keyIn);

    fetch('/api/myip').then(function(r){return r.text();}).then(function(ip){
      var metaStr = ip + ' | ' + new Date().toLocaleString() + ' | ' + nick;
      var metaEnc = CryptoJS.AES.encrypt(metaStr, key32, {iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7}).toString();
      var msgEnc = CryptoJS.AES.encrypt(msg, key32, {iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7}).toString();

      fetch('/gongyao.txt').then(function(r){return r.text();}).then(function(pub){
        var jse = new JSEncrypt();
        jse.setPublicKey(pub);
        var cleanRsaKey = jse.encrypt(keyIn).replace(/[\r\n\s]+/g, '');
        if (!cleanRsaKey) { alert('RSA加密失败'); return; }

        fetch('/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            rsa_key: cleanRsaKey,
            iv: CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g, ''),
            meta_msg: metaEnc.replace(/[\r\n\s]+/g, ''),
            aes_msg: msgEnc.replace(/[\r\n\s]+/g, '')
          })
        }).then(function(res){
          if (res.ok) { alert('✅ 已加密提交'); }
          else { alert('❌ 提交失败'); }
        }).finally(function(){
          closeModal();
          document.getElementById('msg').value = '';
        });
      });
    });
  }

  // ── 查询：管理员回复（原有逻辑） ──
  function checkReply() {
    var nick = document.getElementById('check-nick').value.trim();
    var keyIn = document.getElementById('check-key').value.trim();
    if (!nick || !keyIn) { alert('请填写完整'); return; }

    var box = document.getElementById('reply-box');
    box.innerHTML = '<p style="text-align:center;color:#888">查询中...</p>';
    box.style.display = 'block';

    fetch('/api/replies').then(function(r){return r.json();}).then(function(reps){
      var found = [];
      var key32 = deriveAESKey(keyIn);

      reps.forEach(function(r){
        try {
          var d = CryptoJS.AES.decrypt(r.aes_msg, key32, {
            iv: CryptoJS.enc.Base64.parse(r.iv),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);
          if (d && d.indexOf(nick + ' | ') === 0) {
            var parts = d.split(' | ');
            found.push({time: parts[1] || '未知时间', content: parts.slice(2).join(' | '), seq: r.seq});
          }
        } catch(e) {}
      });

      renderResults(box, found, '暂无管理员回复');
    }).catch(function(){
      box.innerHTML = '<p style="color:red;text-align:center">获取失败</p>';
    });
  }

  // 🔑 新增：查询用户自己发送的留言
  function checkMyMessages() {
    var nick = document.getElementById('check-nick').value.trim();
    var keyIn = document.getElementById('check-key').value.trim();
    if (!nick || !keyIn) { alert('请填写完整'); return; }

    var box = document.getElementById('reply-box');
    box.innerHTML = '<p style="text-align:center;color:#888">查询中...</p>';
    box.style.display = 'block';

    fetch('/api/messages').then(function(r){return r.json();}).then(function(msgs){
      var found = [];
      var key32 = deriveAESKey(keyIn);

      msgs.forEach(function(m){
        try {
          // 解密 meta_msg → "ip | date | nick"
          var meta = CryptoJS.AES.decrypt(m.meta_msg, key32, {
            iv: CryptoJS.enc.Base64.parse(m.iv),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);

          if (!meta) return;
          // meta 格式: "ip | date | nick"，检查末尾是否匹配
          var metaParts = meta.split(' | ');
          if (metaParts.length < 3) return;
          var metaNick = metaParts[metaParts.length - 1];
          if (metaNick !== nick) return;

          // 再解密 aes_msg → 正文
          var content = CryptoJS.AES.decrypt(m.aes_msg, key32, {
            iv: CryptoJS.enc.Base64.parse(m.iv),
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);

          if (!content) return;

          found.push({
            time: metaParts[1] || '未知时间',
            content: content,
            seq: m.seq
          });
        } catch(e) {}
      });

      renderResults(box, found, '未找到匹配的留言（请检查昵称和密钥）');
    }).catch(function(){
      box.innerHTML = '<p style="color:red;text-align:center">获取失败</p>';
    });
  }

  // 🔑 公用渲染函数
  function renderResults(box, found, emptyText) {
    box.innerHTML = '';
    if (!found.length) {
      box.innerHTML = '<p style="color:#888;margin-top:10px;text-align:center">' + emptyText + '</p>';
      return;
    }

    found.forEach(function(r){
      var item = document.createElement('div');
      item.style.cssText = 'margin-top:12px;border-top:1px solid #eee;padding-top:8px;';

      var timeEl = document.createElement('small');
      timeEl.style.color = '#888';
      timeEl.textContent = '🕒 ' + r.time;
      item.appendChild(timeEl);

      var copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = '复制';
      copyBtn.dataset.copy = r.content;
      item.appendChild(copyBtn);

      var contentDiv = document.createElement('div');
      contentDiv.className = 'md-content';
      contentDiv.style.margin = '4px 0 0';
      contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(r.content));
      item.appendChild(contentDiv);

      box.appendChild(item);
    });
  }

  document.addEventListener('click', function(e){
    if (!e.target.matches('.copy-btn')) return;
    var text = e.target.dataset.copy;
    navigator.clipboard.writeText(text).then(function(){
      e.target.textContent = '已复制';
      e.target.classList.add('copied');
      setTimeout(function(){
        e.target.textContent = '复制';
        e.target.classList.remove('copied');
      }, 1500);
    }).catch(function(){ alert('复制失败，请手动选择'); });
  });
</script>
</body>
</html>
