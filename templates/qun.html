<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>讨论群</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js" integrity="sha512-rfX4p3RNnxdwLT3wWP1K0NR3ztTobn+sISlT9WhxDDK00zNYbQ6MCHA5OHm0hqKAzEMXYCgFrp8iY/ER5MkXqA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" crossorigin="anonymous"></script>
  <style>
    body{font-family:sans-serif;max-width:700px;margin:40px auto;padding:20px}
    #chat{height:450px;overflow-y:auto;border:1px solid #ddd;padding:12px;background:#f9f9f9;margin-bottom:10px;border-radius:6px}
    .msg{margin:6px 0;padding:8px 12px;background:#fff;border-radius:4px;border-left:3px solid #2196F3}
    .msg.pinned{background:#fff8e1;border-left-color:#FF9800;border:1px solid #FFE0B2;border-left:3px solid #FF9800}
    .msg.pinned::before{content:'📌 置底';font-size:11px;color:#E65100;font-weight:bold;display:block;margin-bottom:2px}
    .meta{font-size:12px;color:#888;margin-bottom:3px}
    .md-content{line-height:1.6;font-size:14px;word-break:break-all}
    .md-content img{max-width:100%;border-radius:4px;margin:4px 0;cursor:pointer}
    .md-content a{color:#2196F3;text-decoration:none;word-break:break-all}
    .md-content pre{background:#f5f5f5;padding:8px;border-radius:4px;overflow-x:auto;font-size:12px;margin:4px 0}
    .md-content code{background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:13px}
    #input-area{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
    input,textarea{padding:8px;flex:1;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
    button{padding:8px 16px;cursor:pointer;border:none;border-radius:4px;background:#2196F3;color:#fff;white-space:nowrap}
    .link-btn{background:#FF9800;font-size:12px;height:36px;padding:0 12px}
    #status{font-size:13px;margin-bottom:8px;color:#666}
    footer{margin-top:20px;text-align:center;color:#888;font-size:12px;border-top:1px solid #eee;padding:10px 0}

    /* 🤖 AI 面板 */
    #ai-toggle-btn{background:none;border:1px solid #ccc;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;padding:0;color:#666;line-height:1;vertical-align:middle;margin-left:8px}
    #ai-toggle-btn.active{background:#e3f2fd;border-color:#2196F3;color:#2196F3}
    #ai-panel{display:none;background:#e3f2fd;padding:12px;border-radius:8px;margin-bottom:12px;border:1px solid #90caf9}
    #ai-panel h4{margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
    #ai-panel label{display:block;margin:6px 0;font-size:13px}
    #ai-panel input[type="text"],#ai-panel input[type="password"],#ai-panel textarea{width:100%;margin:4px 0;font-size:13px;box-sizing:border-box}
    #ai-panel textarea{min-height:60px;resize:vertical}
    #ai-status{font-size:12px;color:#666;margin-top:4px}
    #cooldown-bar{display:none;height:3px;background:#ff9800;border-radius:2px;margin-top:4px;transition:width 0.1s linear}
    #ai-close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#888;padding:0 4px;line-height:1}
    #ai-close-btn:hover{color:#333}
  </style>
</head>
<body>
  <h2><a href="/" style="color:#666;text-decoration:none;font-size:inherit;margin-right:8px">← 返回主界面</a><a href="/vote" style="font-size:14px;margin-left:8px;color:#673AB7;text-decoration:none;border:1px solid #673AB7;padding:3px 10px;border-radius:4px">🗳️ 投票</a> | 💬 讨论群<
    <button id="ai-toggle-btn" onclick="toggleAiPanel()" title="AI设置">🤖</button>
  </h2>

  <!-- 🤖 AI 设置面板 -->
  <div id="ai-panel">
    <h4>🤖 AI 自动回复 <button id="ai-close-btn" onclick="toggleAiPanel()" title="关闭">✕</button></h4>
    <span id="ai-status"></span>
    <label><input type="checkbox" id="ai-enabled" onchange="saveAiConfig()"> 启用AI自动回复</label>
    <input type="text" id="ai-url" placeholder="API地址 (如 https://api.deepseek.com)" onchange="saveAiConfig()">
    <input type="password" id="ai-key" placeholder="API Key (仅存本地，不上传)" onchange="saveAiConfig()">
    <input type="text" id="ai-model" placeholder="模型名 (默认 gpt-3.5-turbo)" onchange="saveAiConfig()">
    <input type="text" id="ai-nick" placeholder="AI显示昵称 (≤32字)" maxlength="32" onchange="saveAiConfig()">
    <textarea id="ai-prompt" placeholder="系统提示词，例如：你是一个友善的群聊成员，在有人提问或讨论有趣话题时适当发言…" onchange="saveAiConfig()"></textarea>
    <div id="cooldown-bar"></div>
  </div>

  <div id="status">加载中...</div>
  <div id="chat"></div>
  <div id="input-area">
    <input id="nick" placeholder="昵称" maxlength="32" style="flex:0 0 120px">
    <textarea id="msg" placeholder="支持 Markdown 语法" maxlength="2048" style="min-height:40px"></textarea>
    <button type="button" class="link-btn" onclick="insertFileLink()">🔗 外链</button>
    <button id="send-btn" onclick="send()">发送</button>
  </div>
  <footer id="footer"></footer>

<script>
var esc = function(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
};
var getCookie = function(n) { var m = document.cookie.match('(^|;)\\s*' + n + '=([^;]*)'); return m ? decodeURIComponent(m[2]) : ''; };
document.getElementById('nick').value = getCookie('msg_nick') || '';
var muted = false;

// ── 🤖 AI ──
var aiConfig = {};
var aiCooldown = false;
var aiCheckTimer = null;
var lastKnownMsgCount = 0;

function loadAiConfig() {
  try { aiConfig = JSON.parse(localStorage.getItem('qun_ai_config') || '{}'); } catch(e) { aiConfig = {}; }
  document.getElementById('ai-enabled').checked = !!aiConfig.enabled;
  document.getElementById('ai-url').value = aiConfig.apiUrl || '';
  document.getElementById('ai-key').value = aiConfig.apiKey || '';
  document.getElementById('ai-model').value = aiConfig.model || '';
  document.getElementById('ai-nick').value = aiConfig.nickname || '';
  document.getElementById('ai-prompt').value = aiConfig.systemPrompt || '';
  updateAiStatus();
}

function saveAiConfig() {
  aiConfig = {
    enabled: document.getElementById('ai-enabled').checked,
    apiUrl: document.getElementById('ai-url').value.trim(),
    apiKey: document.getElementById('ai-key').value.trim(),
    model: document.getElementById('ai-model').value.trim() || 'gpt-3.5-turbo',
    nickname: document.getElementById('ai-nick').value.trim(),
    systemPrompt: document.getElementById('ai-prompt').value.trim()
  };
  localStorage.setItem('qun_ai_config', JSON.stringify(aiConfig));
  updateAiStatus();
}

function updateAiStatus() {
  var s = document.getElementById('ai-status');
  var btn = document.getElementById('ai-toggle-btn');
  if (aiConfig.enabled && aiConfig.apiUrl && aiConfig.apiKey && aiConfig.nickname) {
    s.textContent = aiCooldown ? '⏳ 冷却中…' : '🟢 已就绪';
    s.style.color = aiCooldown ? '#ff9800' : '#4CAF50';
    btn.classList.add('active');
  } else if (aiConfig.enabled) {
    s.textContent = '⚠️ 配置不完整（需填写API地址、Key、昵称）';
    s.style.color = '#f44336';
    btn.classList.add('active');
  } else {
    s.textContent = '已关闭';
    s.style.color = '#888';
    btn.classList.remove('active');
  }
}

function toggleAiPanel() {
  var p = document.getElementById('ai-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

// 构建 API 端点 URL：去掉末尾斜杠，智能处理 /v1 路径
function buildApiEndpoint(baseUrl) {
  var u = baseUrl.replace(/\/+$/, '');
  // 如果用户已经填了 /v1，不重复加
  if (/\/v1$/.test(u)) return u + '/chat/completions';
  return u + '/v1/chat/completions';
}

function scheduleAiCheck(data) {
  if (!aiConfig.enabled || aiCooldown) return;
  if (!aiConfig.apiUrl || !aiConfig.apiKey || !aiConfig.nickname) return;
  if (data.length && data[data.length-1].nick === aiConfig.nickname) return; // 不响应自己
  clearTimeout(aiCheckTimer);
  aiCheckTimer = setTimeout(function(){ doAiCheck(data); }, 3000);
}

async function doAiCheck(data) {
  if (aiCooldown || !aiConfig.enabled) return;
  try {
    var messages = [{
      role: 'system',
      content: (aiConfig.systemPrompt || '你是一个群聊成员。请判断是否该发言。如果应该，直接回复内容；如果不该，只回复 NO_RESPONSE。')
        + '\n\n重要规则：如果决定不发言，必须只回复 NO_RESPONSE，不要有任何其他文字。'
    }];
    var recent = data.slice(-30);
    for (var i = 0; i < recent.length; i++) {
      var m = recent[i];
      messages.push({
        role: (m.nick === aiConfig.nickname) ? 'assistant' : 'user',
        content: '[' + m.nick + '] ' + m.time + ': ' + m.content
      });
    }

    var endpoint = buildApiEndpoint(aiConfig.apiUrl);
    var resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + aiConfig.apiKey },
      body: JSON.stringify({ model: aiConfig.model || 'gpt-3.5-turbo', messages: messages, max_tokens: 600, temperature: 0.7 })
    });
    if (!resp.ok) { console.error('AI API error:', resp.status, await resp.text()); return; }
    var j = await resp.json();
    var reply = (j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content || '').trim();
    if (!reply || reply.toUpperCase() === 'NO_RESPONSE') return;

    startCooldown();
    await fetch('/api/qun', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nick: aiConfig.nickname, content: reply })
    });
    loadMsgs();
  } catch(e) { console.error('AI check error:', e); }
}

function startCooldown() {
  aiCooldown = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('send-btn').style.background = '#ccc';
  updateAiStatus();
  var bar = document.getElementById('cooldown-bar');
  bar.style.display = 'block';
  bar.style.width = '100%';
  var start = Date.now(), duration = 7000;
  var tick = setInterval(function() {
    var pct = Math.max(0, 100 - ((Date.now() - start) / duration * 100));
    bar.style.width = pct + '%';
    if (Date.now() - start >= duration) {
      clearInterval(tick);
      aiCooldown = false;
      bar.style.display = 'none';
      document.getElementById('send-btn').disabled = muted;
      document.getElementById('send-btn').style.background = muted ? '#ccc' : '#2196F3';
      updateAiStatus();
    }
  }, 100);
}
// ── 🤖 END ──

function insertFileLink() {
  var url = prompt('请输入文件URL:');
  if (!url) return;
  var name = prompt('请输入显示名称:', url.split('/').pop() || '文件') || '文件';
  var ext = url.split('.').pop().toLowerCase();
  var md = ['jpg','jpeg','png','gif','webp','svg'].indexOf(ext) !== -1 ? '![' + name + '](' + url + ')' : '[📎 ' + name + '](' + url + ')';
  var ta = document.getElementById('msg'); ta.value += (ta.value ? '\n' : '') + md; ta.focus();
}

function loadStatus() {
  fetch('/api/qun/status').then(function(r){return r.text();}).then(function(v){
    muted = v === '1';
    document.getElementById('status').textContent = muted ? '🔒 管理员已开启全体禁言' : '🔓 发言已开放（支持 Markdown）';
    if (!aiCooldown) {
      document.getElementById('send-btn').disabled = muted;
      document.getElementById('send-btn').style.background = muted ? '#ccc' : '#2196F3';
    }
  }).catch(function(){});
}

function loadMsgs() {
  fetch('/api/qun').then(function(r){return r.json();}).then(function(data){
    var c = document.getElementById('chat');
    var wasAtBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 30;
    c.innerHTML = '';
    data.forEach(function(m) {
      var safeHtml = DOMPurify.sanitize(marked.parse(m.content));
      c.innerHTML += '<div class="msg' + (m.pinned ? ' pinned' : '') + '"><div class="meta">' + esc(m.nick) + ' | ' + esc(m.time) + '</div><div class="md-content">' + safeHtml + '</div></div>';
    });
    if (wasAtBottom) c.scrollTop = c.scrollHeight;
    if (data.length > lastKnownMsgCount) scheduleAiCheck(data);
    lastKnownMsgCount = data.length;
  }).catch(function(){});
}

function send() {
  var n = document.getElementById('nick').value.trim();
  var m = document.getElementById('msg').value.trim();
  if (!n || !m) { alert('请填写完整'); return; }
  if (muted) { alert('已禁言'); return; }
  if (aiCooldown) { alert('AI 刚发言，请等待冷却结束'); return; }
  if (n.toLowerCase() === 'admin') { alert('系统保留昵称'); return; }
  document.cookie = 'msg_nick=' + encodeURIComponent(n) + ';max-age=2592000;path=/';
  fetch('/api/qun', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nick:n,content:m})})
    .then(function(r){ if(r.ok){ document.getElementById('msg').value=''; loadMsgs(); } else r.text().then(alert); });
}

setInterval(loadMsgs, 2000);
setInterval(loadStatus, 5000);
loadStatus(); loadMsgs(); loadAiConfig();
fetch('/api/footer').then(function(r){return r.text();}).then(function(t){document.getElementById('footer').textContent=t;});
</script>
</body>
</html>
