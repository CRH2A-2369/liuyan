<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人机验证</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .captcha-box {
      background: #fff; border-radius: 12px; padding: 32px 28px 28px;
      max-width: 420px; width: 90%; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .captcha-box h2 { font-size: 18px; color: #333; margin-bottom: 8px; }
    .captcha-box p.hint { font-size: 13px; color: #888; margin-bottom: 16px; }
    #captcha-image {
      width: 100%; max-width: 320px; height: auto;
      border: 2px solid #e0e0e0; border-radius: 8px;
      margin-bottom: 16px;
      background: #f5f5f5;
    }
    input {
      width: 100%; padding: 12px 14px; font-size: 18px;
      border: 2px solid #ddd; border-radius: 8px;
      text-align: center; outline: none;
      letter-spacing: 4px; margin-bottom: 12px;
    }
    input:focus { border-color: #673AB7; }
    input.error { border-color: #f44336; }
    button {
      width: 100%; padding: 12px; margin-top: 4px;
      font-size: 16px; font-weight: 600;
      background: #673AB7; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error-msg { color: #f44336; font-size: 13px; margin-top: 8px; display: none; }
    .success-msg { color: #4CAF50; font-size: 13px; margin-top: 8px; display: none; }
    .refresh-link {
      display: block; margin-top: 8px; font-size: 13px;
      color: #2196F3; cursor: pointer; text-decoration: underline;
    }
    .countdown {
      font-size: 12px; color: #aaa; margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="captcha-box">
    <h2>🤖 人机验证</h2>
    <p class="hint">请输入图片中显示的字符</p>
    <img id="captcha-image" src="" alt="验证码">
    <input type="text" id="answerInput" placeholder="输入验证码" autocomplete="off" inputmode="text" maxlength="10">
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">✅ 验证通过！</div>
    <button id="submitBtn" onclick="verifyCaptcha()">确认</button>
    <div class="countdown" id="countdown"></div>
    <a class="refresh-link" onclick="loadChallenge()">🔄 换一张</a>
  </div>

  <script>
    var challengeId = null;
    var expiresAt = 0;
    var timer = null;
    var imageEl = document.getElementById('captcha-image');

    function updateCountdown() {
      var remaining = Math.max(0, Math.ceil(expiresAt - Date.now() / 1000));
      var el = document.getElementById('countdown');
      if (remaining <= 0) {
        el.textContent = '⏰ 已过期，请刷新';
        document.getElementById('submitBtn').disabled = true;
        loadChallenge();
      } else {
        el.textContent = '⏱ ' + remaining + ' 秒后过期';
      }
    }

    async function loadChallenge() {
      var btn = document.getElementById('submitBtn');
      var input = document.getElementById('answerInput');
      var errEl = document.getElementById('errorMsg');
      var sucEl = document.getElementById('successMsg');

      btn.disabled = true;
      input.value = '';
      input.className = '';
      errEl.style.display = 'none';
      sucEl.style.display = 'none';
      imageEl.src = '';

      if (timer) clearInterval(timer);

      try {
        var res = await fetch('/api/captcha/challenge');
        var data = await res.json();

        if (!data.captcha_needed) {
          var urlParams = new URLSearchParams(window.location.search);
          var redirectUrl = urlParams.get('redirect');
          if (redirectUrl) {
            window.location.href = decodeURIComponent(redirectUrl);
            return;
          }
          window.parent.postMessage({ type: 'captchaCompleted', success: true }, '*');
          return;
        }

        challengeId = data.challenge_id;
        expiresAt = Date.now() / 1000 + data.expires_in;

        imageEl.src = '/api/captcha.gif?id=' + challengeId + '&t=' + Date.now();
        btn.disabled = false;
        input.focus();

        timer = setInterval(updateCountdown, 1000);
        updateCountdown();

      } catch(e) {
        errEl.textContent = '加载失败，请刷新';
        errEl.style.display = 'block';
      }
    }

    async function verifyCaptcha() {
      var answer = document.getElementById('answerInput').value.trim();
      var btn = document.getElementById('submitBtn');
      var errEl = document.getElementById('errorMsg');
      var sucEl = document.getElementById('successMsg');
      var input = document.getElementById('answerInput');

      if (!answer) {
        errEl.textContent = '请输入验证码';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '验证中...';
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      try {
        var res = await fetch('/api/captcha/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challenge_id: challengeId, answer: answer })
        });
        var data = await res.json();

        if (data.success) {
          sucEl.style.display = 'block';
          btn.textContent = '✅ 验证通过';
          if (timer) clearInterval(timer);

          var urlParams = new URLSearchParams(window.location.search);
          var redirectUrl = urlParams.get('redirect');
          if (redirectUrl) {
            setTimeout(function() {
              window.location.href = decodeURIComponent(redirectUrl);
            }, 800);
          } else {
            setTimeout(function() {
              window.parent.postMessage({ type: 'captchaCompleted', success: true }, '*');
            }, 500);
          }
        } else {
          errEl.textContent = data.error || '验证失败';
          errEl.style.display = 'block';
          input.value = '';
          input.className = 'error';
          input.focus();
          btn.disabled = false;
          btn.textContent = '确认';
          setTimeout(loadChallenge, 1500);
        }
      } catch(e) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '确认';
      }
    }

    document.getElementById('answerInput').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') verifyCaptcha();
    });

    loadChallenge();
  </script>
</body>
</html>
