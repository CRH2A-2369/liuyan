<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人机验证</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .captcha-box {
      background: #fff; border-radius: 12px; padding: 32px 28px 28px;
      max-width: 380px; width: 90%; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .captcha-box h2 { font-size: 18px; color: #333; margin-bottom: 6px; }
    .captcha-box p.hint { font-size: 13px; color: #888; margin-bottom: 16px; }

    .question-box {
      background: #f5f5f5; border-radius: 10px; padding: 24px;
      margin-bottom: 16px; font-size: 28px; font-weight: bold;
      color: #333; letter-spacing: 2px;
      border: 2px solid #e0e0e0;
      user-select: none;
    }
    .question-box.loading {
      font-size: 16px; color: #888; font-weight: normal;
    }

    input {
      width: 100%; padding: 12px 14px; font-size: 18px;
      border: 2px solid #ddd; border-radius: 8px;
      text-align: center; outline: none;
      transition: border-color 0.2s;
      letter-spacing: 4px;
    }
    input:focus { border-color: #673AB7; }
    input.error { border-color: #f44336; }

    button {
      width: 100%; padding: 12px; margin-top: 12px;
      font-size: 16px; font-weight: 600;
      background: #673AB7; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg {
      color: #f44336; font-size: 13px; margin-top: 8px; display: none;
    }
    .success-msg {
      color: #4CAF50; font-size: 13px; margin-top: 8px; display: none;
    }
    .countdown {
      font-size: 12px; color: #aaa; margin-top: 10px;
    }
    .refresh-link {
      display: block; margin-top: 8px; font-size: 13px;
      color: #2196F3; cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="captcha-box">
    <h2>🤖 人机验证</h2>
    <p class="hint">请完成下面的算式以验证您是真人</p>

    <div class="question-box" id="questionDisplay">加载中...</div>

    <input type="text" id="answerInput" placeholder="输入计算结果" autocomplete="off" inputmode="numeric" pattern="[0-9]*" maxlength="5">

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">✅ 验证通过！</div>

    <button id="submitBtn" onclick="verifyCaptcha()">确认</button>

    <div class="countdown" id="countdown"></div>
    <a class="refresh-link" onclick="loadChallenge()">🔄 换一题</a>
  </div>

  <script>
    var challengeId = null;
    var expiresAt = 0;
    var timer = null;

    function updateCountdown() {
      var el = document.getElementById('countdown');
      var remaining = Math.max(0, Math.ceil(expiresAt - Date.now() / 1000));
      if (remaining <= 0) {
        el.textContent = '⏰ 已过期，请换一题';
        document.getElementById('submitBtn').disabled = true;
        loadChallenge();
      } else {
        el.textContent = '⏱ ' + remaining + ' 秒后过期';
      }
    }

    async function loadChallenge() {
      var qEl = document.getElementById('questionDisplay');
      var btn = document.getElementById('submitBtn');
      var input = document.getElementById('answerInput');
      var errEl = document.getElementById('errorMsg');
      var sucEl = document.getElementById('successMsg');

      qEl.textContent = '加载中...';
      qEl.className = 'question-box loading';
      btn.disabled = true;
      input.value = '';
      input.className = '';
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (timer) clearInterval(timer);

      try {
        var res = await fetch('/api/captcha/challenge');
        var data = await res.json();

        if (!data.captcha_needed) {
          // 不需要验证码 → 通知父窗口
          window.parent.postMessage({
            type: 'captchaCompleted',
            success: true
          }, '*');
          return;
        }

        challengeId = data.challenge_id;
        expiresAt = Date.now() / 1000 + data.expires_in;

        qEl.textContent = data.question;
        qEl.className = 'question-box';
        btn.disabled = false;
        input.focus();

        timer = setInterval(updateCountdown, 1000);
        updateCountdown();

      } catch(e) {
        qEl.textContent = '❌ 加载失败';
        qEl.className = 'question-box loading';
      }
    }

    async function verifyCaptcha() {
      var answer = document.getElementById('answerInput').value.trim();
      var btn = document.getElementById('submitBtn');
      var errEl = document.getElementById('errorMsg');
      var sucEl = document.getElementById('successMsg');
      var input = document.getElementById('answerInput');

      if (!answer) { errEl.textContent = '请输入计算结果'; errEl.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = '验证中...';
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      try {
        var res = await fetch('/api/captcha/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            challenge_id: challengeId,
            answer: answer
          })
        });
        var data = await res.json();

        if (data.success) {
          sucEl.style.display = 'block';
          btn.textContent = '✅ 验证通过';

          if (timer) clearInterval(timer);

          // 通知父窗口验证成功
          setTimeout(function() {
            window.parent.postMessage({
              type: 'captchaCompleted',
              success: true,
              expires_at: data.expires_at
            }, '*');
          }, 500);
        } else {
          errEl.textContent = data.error || '验证失败';
          errEl.style.display = 'block';
          input.value = '';
          input.className = 'error';
          input.focus();
          btn.disabled = false;
          btn.textContent = '确认';

          // 自动刷新题目
          setTimeout(loadChallenge, 1500);
        }
      } catch(e) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '确认';
      }
    }

    document.getElementById('answerInput').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') verifyCaptcha();
    });

    // 加载挑战
    loadChallenge();
  </script>
</body>
</html>
