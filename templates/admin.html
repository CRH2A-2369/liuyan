<script>
  let pqcPrivateKeyBytes = null;      // PQC 私钥（Uint8Array）
  let rsaPrivateKeyPem = null;       // RSA 私钥字符串
  let ml_kem1024 = null;             // 懒加载
  const rawData = JSON.parse(document.getElementById('raw-data').textContent);
  let allReplies = [], jse = null, csrfToken = '';

  // 初始化 JSEncrypt
  try { jse = new JSEncrypt(); } catch(e) {}
  let dataJse = null;  // 独立的数据解密实例
  let dataKeyPromptShown = false;

  // 工具函数：获取 CSRF Token
  function getCsrfToken() {
    return csrfToken;
  }

  // 修复被浏览器压缩成单行的 PEM 私钥
  function normalizePemKey(rawKey) {
    let k = rawKey.trim();
    if (!k) return k;
    // 已经是多行，直接返回
    if (k.includes('\n') && k.includes('-----BEGIN')) return k;
    // 单行 PEM → 重建换行
    const h = k.match(/-----BEGIN [^-]+-----/);
    const f = k.match(/-----END [^-]+-----/);
    if (h && f) {
      const header = h[0];
      const footer = f[0];
      let body = k.slice(k.indexOf(header) + header.length, k.indexOf(footer)).replace(/\s+/g, '');
      body = body.match(/.{1,64}/g).join('\n');
      return header + '\n' + body + '\n' + footer;
    }
    return k;
  }
  // 解密 IP（使用管理员私钥）
  function decryptIP(encrypted) {
    const tryDec = (jseInst) => {
      if (!jseInst || !jseInst.getPrivateKey()) return null;
      try {
        const raw = (encrypted && encrypted.startsWith('RSA:')
          ? encrypted.slice(4)
          : (encrypted || '')
        ).replace(/\s+/g, '');
        if (!raw) return null;
        return jseInst.decrypt(raw);
      } catch(e) { return null; }
    };

    // 先试登录私钥
    let dec = tryDec(jse);
    if (dec) return dec;

    // 再试独立数据私钥
    if (dataJse) {
      dec = tryDec(dataJse);
      if (dec) return dec;
    }

    return '（解密失败）';
  }

  async function promptDataKey() {
    if (dataKeyPromptShown) return false;
    dataKeyPromptShown = true;
    const input = prompt(
      '⚠️ IP数据解密失败，可能需要单独的数据解密私钥。\n\n' +
      '请粘贴用于解密IP/黑白名单数据的RSA私钥\n' +
      '（如与登录私钥相同请直接点取消）：'
    );
    if (!input || !input.trim()) {
      dataKeyPromptShown = false;
      return false;
    }
    const normalized = normalizePemKey(input);
    // 用黑/白名单第一条数据验证
    try {
      let testData = null;
      const blRes = await fetch('/api/blacklist');
      const blList = await blRes.json();
      if (blList.length > 0) testData = blList[0].encrypted;
      else {
        const wlRes = await fetch('/api/whitelist');
        const wlList = await wlRes.json();
        if (wlList.length > 0) testData = wlList[0].encrypted;
      }
      if (testData) {
        const testJse = new JSEncrypt();
        testJse.setPrivateKey(normalized);
        const raw = testData.replace(/\s+/g, '').replace(/^RSA:/, '');
        const testDec = testJse.decrypt(raw);
        if (testDec) {
          dataJse = testJse;
          sessionStorage.setItem('admin_data_key', normalized);
          alert('✅ 数据解密私钥设置成功！');
          return true;
        } else {
          alert('❌ 该私钥无法解密当前数据，请检查后重试。');
          dataKeyPromptShown = false;
          return false;
        }
      }
      dataKeyPromptShown = false;
      return false;
    } catch(e) {
      alert('❌ 验证失败：' + e.message);
      dataKeyPromptShown = false;
      return false;
    }
  }

  // ---------- 白名单 ----------
  async function loadWL() {
    const res = await fetch('/api/whitelist');
    const list = await res.json();
    const container = document.getElementById('wl-list');
    container.innerHTML = '';
    let failCount = 0;
    list.forEach(item => {
      const plainIP = decryptIP(item.encrypted);
      if (plainIP === '（解密失败）') failCount++;
      const div = document.createElement('div');
      div.className = 'bl-item';
      div.innerHTML = `
        <span>${plainIP}</span>
        <button class="bl-del" onclick="deleteIP('${item.hash}', 'white')">删除</button>
      `;
      container.appendChild(div);
    });
    if (failCount > 0 && failCount === list.length && list.length > 0) {
      const ok = await promptDataKey();
      if (ok) loadWL();
    }
  }

  async function addWL(ip) {
    const targetIp = ip || document.getElementById('wl-ip').value.trim();
    if (!targetIp) return alert('请输入IP地址');
    const res = await fetch('/api/whitelist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ action: 'add', ip: targetIp })
    });
    if (res.ok) {
      alert('添加白名单成功');
      document.getElementById('wl-ip').value = '';
      loadWL();
    } else {
      alert('添加失败：' + await res.text());
    }
  }

  async function addCurrentIPToWL() {
    const res = await fetch('/api/myip');
    const ip = await res.text();
    if (!ip) { alert('无法获取当前IP'); return; }
    if (confirm('确定将当前IP (' + ip + ') 加入白名单吗？')) {
      addWL(ip);
    }
  }

  // ---------- 黑名单 ----------
  async function loadBL() {
    const res = await fetch('/api/blacklist');
    const list = await res.json();
    const container = document.getElementById('bl-list');
    container.innerHTML = '';
    let failCount = 0;
    list.forEach(item => {
      const plainIP = decryptIP(item.encrypted);
      if (plainIP === '（解密失败）') failCount++;
      const div = document.createElement('div');
      div.className = 'bl-item';
      div.innerHTML = `
        <span>${plainIP}</span>
        <button class="bl-del" onclick="deleteIP('${item.hash}', 'black')">删除</button>
      `;
      container.appendChild(div);
    });
    if (failCount > 0 && failCount === list.length && list.length > 0) {
      const ok = await promptDataKey();
      if (ok) loadBL();
    }
  }

  // ---------- 删除 IP（统一函数） ----------
  async function deleteIP(hash, type) {
    if (!confirm('确定删除该IP？')) return;
    const url = type === 'white' ? '/api/whitelist' : '/api/blacklist';
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ action: 'remove', hash: hash })
    });
    if (res.ok) {
      alert('删除成功');
      if (type === 'white') loadWL(); else loadBL();
    } else {
      alert('删除失败：' + await res.text());
    }
  }

  // ---------- 原有功能（回复、导出、导入等）----------
  function insertAdminFileLink() {
    const url = prompt('请输入文件URL:');
    if (!url) return;
    const name = prompt('请输入显示名称:', url.split('/').pop() || '文件') || '文件';
    const ext = url.split('.').pop().toLowerCase();
    let md = ['jpg','jpeg','png','gif','webp','svg'].includes(ext) ? `![${name}](${url})` : `[📎 ${name}](${url})`;
    const ta = document.getElementById('rep-content');
    ta.value += (ta.value ? '\n' : '') + md;
    ta.focus();
  }

  const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function deriveKey(str) { return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString()); }
// ★ 新增：Web Crypto AES-CBC 加密（与 index.html v3 提交一致）
async function encryptAES(plaintext, keyBytes) {
    const iv = crypto.getRandomValues(new Uint8Array(16));
    const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-CBC' }, false, ['encrypt']);
    const enc = await crypto.subtle.encrypt(
        { name: 'AES-CBC', iv: iv },
        cryptoKey,
        new TextEncoder().encode(plaintext)
    );
    return { iv: iv, ciphertext: new Uint8Array(enc) };
}
// ★★★ 新增：与前端一致的 SHA-256 身份哈希计算 ★★★
  async function calcIdentityHash(nick, aesKey) {
      const encoder = new TextEncoder();
      const data = encoder.encode(nick + '|' + aesKey);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  const authFetch = async (url, opts={}) => {
    const headers = { ...opts.headers };
    if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
    const res = await fetch(url, { credentials: 'same-origin', ...opts, headers });
    if (res.status === 403) throw new Error('CSRF/Session 失效');
    return res;
  };

  async function init() {
    try {
      csrfToken = (await fetch('/api/csrf', {credentials:'same-origin'}).then(r=>r.json())).token;
      const status = await fetch('/api/admin/status', {credentials:'same-origin'}).then(r=>r.json());
      if (status.logged_in && sessionStorage.getItem('admin_has_key') === 'true') {
        const savedKey = sessionStorage.getItem('admin_priv_key');
        if (savedKey) {
          jse.setPrivateKey(savedKey);
          // ★ 恢复 PQC 私钥
          const savedPQCKey = sessionStorage.getItem('admin_pqc_priv_key');
          if (savedPQCKey) {
            try {
              pqcPrivateKeyBytes = Uint8Array.from(atob(savedPQCKey), c => c.charCodeAt(0));
            } catch(e) { console.warn('恢复PQC私钥失败', e); }
          }
          showAdmin();
        }
        else { await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}}); sessionStorage.clear(); location.reload(); }
      } else if (status.logged_in) {
        await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}}); sessionStorage.clear(); location.reload();
      } else {
        const chal = await fetch('/api/admin/challenge', {credentials:'same-origin'}).then(r=>r.json());
        if (chal.challenge && chal.challenge !== 'ERROR') { window.challenge = chal.challenge; document.getElementById('login-panel').style.display = 'block'; }
      }
    } catch(e) { console.error('Init:', e); }
  }
  init();

  async function verify() {
    const rsaKey = document.getElementById('privKey').value.trim();
    const pqcKeyB64 = document.getElementById('pqcPrivKey').value.trim();
    if (!rsaKey || !pqcKeyB64) { alert('请同时输入RSA私钥和PQC私钥'); return; }

    if (!rsaKey.includes('BEGIN RSA PRIVATE KEY')) {
        document.getElementById('err').textContent = 'RSA私钥格式无效';
        return;
    }
    rsaPrivateKeyPem = rsaKey;
    jse.setPrivateKey(rsaKey);

    try {
        pqcPrivateKeyBytes = Uint8Array.from(atob(pqcKeyB64), c => c.charCodeAt(0));
    } catch (e) {
        document.getElementById('err').textContent = 'PQC私钥Base64解码失败';
        return;
    }

    try {
        const chalRes = await fetch('/api/admin/challenge', { credentials: 'same-origin' });
        if (!chalRes.ok) throw new Error('获取挑战失败');
        const chal = await chalRes.json();
        if (!chal.ciphertext) {
            document.getElementById('err').textContent = '挑战响应缺少 ciphertext';
            return;
        }

        const { ciphertext, iv, enc_nonce } = chal;
        const ct = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
        const ivBytes = Uint8Array.from(atob(iv), c => c.charCodeAt(0));
        const encNonce = Uint8Array.from(atob(enc_nonce), c => c.charCodeAt(0));

        console.log('ct 长度:', ct.length);
        console.log('ivBytes 长度:', ivBytes.length);
        console.log('encNonce 长度:', encNonce.length);

        // 加载 Kyber 库
        if (!ml_kem1024) {
            const mod = await import('@noble/post-quantum/ml-kem');
            ml_kem1024 = mod.ml_kem1024;
        }

        // 解封
        const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
        console.log('shared 长度:', shared.length);

        if (shared.length !== 32) {
            document.getElementById('err').textContent = 'PQC解封失败，共享密钥长度错误';
            return;
        }

        const sharedKey = await crypto.subtle.digest('SHA-256', shared);
        const aesKey = new Uint8Array(sharedKey);

        // 解密 nonce
        try {
            const decrypted = await crypto.subtle.decrypt(
                { name: 'AES-CBC', iv: ivBytes },
                await crypto.subtle.importKey('raw', aesKey, { name: 'AES-CBC' }, false, ['decrypt']),
                encNonce
            );
            const nonceBytes = new Uint8Array(decrypted);
            console.log('nonce 长度:', nonceBytes.length);
            const nonceHex = Array.from(nonceBytes).map(b => b.toString(16).padStart(2,'0')).join('');

            // 提交验证
            const verifyRes = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                body: JSON.stringify({ nonce: nonceHex })
            });
            if (!verifyRes.ok) {
                const errText = await verifyRes.text();
                document.getElementById('err').textContent = errText || '验证失败';
                return;
            }
            // 登录成功
            sessionStorage.setItem('admin_has_key', 'true');
            sessionStorage.setItem('admin_priv_key', rsaKey);
            sessionStorage.setItem('admin_pqc_priv_key', pqcKeyB64);
            location.reload();
        } catch (decErr) {
            console.error('解密 nonce 失败:', decErr);
            document.getElementById('err').textContent = '解密挑战失败，请检查 PQC 私钥是否正确';
        }
    } catch (e) {
        document.getElementById('err').textContent = '验证出错: ' + e.message;
        console.error(e);
    }
}

async function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    if (!rawData.length) { list.innerHTML = '<p style="color:#888;text-align:center">暂无留言</p>'; return; }

    for (const m of rawData) {
        const isV3 = m.is_v3;
        const card = document.createElement('div');
        card.className = 'card';

        // 删除按钮
        const delBtn = document.createElement('button');
        delBtn.className = 'del';
        delBtn.textContent = '删除留言';
        delBtn.dataset.file = m.file;
        card.appendChild(delBtn);

        // 加密方式标签
        const tag = document.createElement('span');
        tag.style.cssText = 'display:inline-block;background:' + (isV3 ? '#9C27B0' : '#2196F3') + ';color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:8px;';
        tag.textContent = isV3 ? '🔐 PQC加密' : '🔐 RSA加密';
        card.appendChild(tag);

        let nick = '匿名', content = '解密失败', meta = '', rawAES = '';
        try {
            if (isV3) {
                // ---- PQC 解密 ----
                if (!pqcPrivateKeyBytes) throw new Error('PQC私钥未加载');
                if (!ml_kem1024) {
                    const mod = await import('@noble/post-quantum/ml-kem');
                    ml_kem1024 = mod.ml_kem1024;
                }

                // 1) 解封主密文获取共享密钥
                const ct = Uint8Array.from(atob(m.pqc_ciphertext), c => c.charCodeAt(0));
                const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                const sharedKey = await crypto.subtle.digest('SHA-256', shared);
                const aesKeyShared = new Uint8Array(sharedKey);

                // 2) 解密用户 AES 密钥
                const ivShared = Uint8Array.from(atob(m.iv_shared), c => c.charCodeAt(0));
                const encAESKeyBytes = Uint8Array.from(atob(m.encAESKey), c => c.charCodeAt(0));
                const decryptedKey = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv: ivShared },
                    await crypto.subtle.importKey('raw', aesKeyShared, { name: 'AES-CBC' }, false, ['decrypt']),
                    encAESKeyBytes
                );
                const userAESKey = new Uint8Array(decryptedKey);
                rawAES = new TextDecoder().decode(userAESKey);

                // 3) 解密内容 — 先 SHA-256 哈希用户密钥再解密
                const userAESKeyDigest = await crypto.subtle.digest('SHA-256', userAESKey);
                const ivContent = Uint8Array.from(atob(m.iv_content), c => c.charCodeAt(0));
                const encContentBytes = Uint8Array.from(atob(m.encContent), c => c.charCodeAt(0));
                const decContent = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv: ivContent },
                    await crypto.subtle.importKey('raw', new Uint8Array(userAESKeyDigest), { name: 'AES-CBC' }, false, ['decrypt']),
                    encContentBytes
                );
                const plain = new TextDecoder().decode(decContent);
                const sep = plain.indexOf(' | ');
                if (sep !== -1) { nick = plain.substring(0, sep).trim(); content = plain.substring(sep + 3).trim(); }
                else { content = plain; }

                // 4) 解密 IP 数据（如果存在）
                if (m.ip_data) {
                    const ipData = JSON.parse(m.ip_data);
                    const ctIp = Uint8Array.from(atob(ipData.ciphertext_ip), c => c.charCodeAt(0));
                    const sharedIp = ml_kem1024.decapsulate(ctIp, pqcPrivateKeyBytes);
                    const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                    const aesKeyIp = new Uint8Array(keyIp);
                    const ivIp = Uint8Array.from(atob(ipData.iv_ip), c => c.charCodeAt(0));
                    const encIpBytes = Uint8Array.from(atob(ipData.enc_ip), c => c.charCodeAt(0));
                    const decIp = await crypto.subtle.decrypt(
                        { name: 'AES-CBC', iv: ivIp },
                        await crypto.subtle.importKey('raw', aesKeyIp, { name: 'AES-CBC' }, false, ['decrypt']),
                        encIpBytes
                    );
                    const ipPlain = new TextDecoder().decode(decIp);
                    meta = '🌐 ' + ipPlain;
                }
            } else if (m.is_v2) {
                // ---- v2 RSA 解密（原有逻辑） ----
                const parts = m.rsa_iv.split('|');
                const rk = parts[1] ? parts[1].replace(/\s+/g, '') : '';
                const ivStr = parts[2] ? parts[2].replace(/\s+/g, '') : '';
                const aesEnc = m.aes_msg ? m.aes_msg.replace(/\s+/g, '') : '';
                const serverEnc = m.server_enc ? m.server_enc.replace(/\s+/g, '') : '';
                rawAES = jse.decrypt(rk);
                if (!rawAES) throw new Error('RSA解密失败');
                const key32 = deriveKey(rawAES);
                const ivW = CryptoJS.enc.Base64.parse(ivStr);
                const plain = CryptoJS.AES.decrypt(aesEnc, key32, { iv: ivW, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }).toString(CryptoJS.enc.Utf8);
                if (!plain) throw new Error('AES解密失败');
                const p = plain.indexOf(' | ');
                if (p !== -1) { nick = plain.substring(0, p); content = plain.substring(p + 3); }
                else { content = plain; }
                if (serverEnc) {
                    const raw = serverEnc.startsWith('RSA:') ? serverEnc.slice(4) : serverEnc;
                    const sm = jse.decrypt(raw);
                    meta = sm ? '🌐🕒 ' + sm : '';
                }
            } else {
                // ---- 最旧格式兼容（非v2非v3）----
                const parts = m.rsa_iv.split('|');
                const rk = parts[0] ? parts[0].replace(/\s+/g, '') : '';
                const ivStr = (parts[1] || '').replace(/\s+/g, '');
                const metaEnc = (m.meta_enc || '').replace(/\s+/g, '');
                const contentEnc = (m.content_enc || '').replace(/\s+/g, '');
                rawAES = jse.decrypt(rk);
                if (!rawAES) throw new Error('RSA解密失败');
                const key32 = deriveKey(rawAES);
                const ivW = CryptoJS.enc.Base64.parse(ivStr);
                const opts = { iv: ivW, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 };
                const metaPlain = CryptoJS.AES.decrypt(metaEnc, key32, opts).toString(CryptoJS.enc.Utf8);
                if (metaPlain) {
                    meta = '📦 ' + metaPlain;
                    const mp = metaPlain.split(' | ');
                    nick = mp[2] || '匿名';
                }
                content = CryptoJS.AES.decrypt(contentEnc, key32, opts).toString(CryptoJS.enc.Utf8) || '解密失败';
            }
        } catch(e) {
            console.warn(`[留言${m.seq}]`, e.message);
            content = '❌ 解密失败: ' + e.message;
            meta = '';
        }

        // --- 构建 UI（与原有相同）---
        const metaDiv = document.createElement('div');
        metaDiv.className = 'meta';
        metaDiv.textContent = meta || '无元数据';
        card.appendChild(metaDiv);

        const keySpan = document.createElement('span');
        keySpan.className = 'key-display';
        keySpan.textContent = '🔑 密钥: ' + (rawAES || '解密失败');
        card.appendChild(keySpan);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'md-content';
        contentDiv.style.cssText = 'margin:4px 0 0;word-break:break-all';
        contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
        card.appendChild(contentDiv);

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '复制原文';
        copyBtn.dataset.copy = content;
        card.appendChild(copyBtn);

        // --- 显示回复（原有逻辑，回复用RSA加密，仍用jse）---
        const reps = allReplies.filter(r => r.seq == m.seq);
        reps.sort((a, b) => (a.num || 1) - (b.num || 1));
        for (const rep of reps) {
            try {
                const rKey = deriveKey(rawAES);
                const rTxt = CryptoJS.AES.decrypt(
                    rep.aes_msg.replace(/\s+/g, ''),
                    rKey,
                    { iv: CryptoJS.enc.Base64.parse(rep.iv.replace(/\s+/g, '')), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
                ).toString(CryptoJS.enc.Utf8);
                if (rTxt) {
                    const p = rTxt.split(' | ');
                    const replyBox = document.createElement('div');
                    replyBox.className = 'reply-box';
                    const rDelBtn = document.createElement('button');
                    rDelBtn.className = 'reply-del';
                    rDelBtn.textContent = '删除回复';
                    rDelBtn.dataset.file = `回复_${m.seq}_${rep.num || 1}.txt`;
                    replyBox.appendChild(rDelBtn);
                    const rMeta = document.createElement('div');
                    rMeta.className = 'reply-meta';
                    rMeta.textContent = `📝 回复 #${rep.num || 1} ${p[0]} | 🕒 ${p[1] || ''}`;
                    replyBox.appendChild(rMeta);
                    const rContent = document.createElement('div');
                    rContent.className = 'md-content';
                    rContent.style.margin = '0';
                    rContent.innerHTML = DOMPurify.sanitize(marked.parse(p.slice(2).join(' | ')));
                    replyBox.appendChild(rContent);
                    const rCopyBtn = document.createElement('button');
                    rCopyBtn.className = 'copy-btn';
                    rCopyBtn.textContent = '复制回复';
                    rCopyBtn.dataset.copy = p.slice(2).join(' | ');
                    replyBox.appendChild(rCopyBtn);
                    card.appendChild(replyBox);
                }
            } catch(e) { console.warn(`[回复${m.seq}#${rep.num}]`, e.message); }
        }

        // 回复按钮
        const replyBtn = document.createElement('button');
        replyBtn.className = 'reply-btn';
        replyBtn.textContent = '回复';
        replyBtn.dataset.seq = m.seq;
        replyBtn.dataset.nick = nick;
        replyBtn.dataset.key = rawAES;
        card.appendChild(replyBtn);

        list.appendChild(card);
    }

    // 事件绑定（删除、回复等）
    list.onclick = e => {
        const t = e.target;
        if (t.matches('.del')) { if(confirm('确定？')) authFetch(`/admin/delete/${t.dataset.file}`, {method:'POST'}).then(()=>location.reload()); }
        if (t.matches('.reply-btn')) { openReply(t.dataset.seq, t.dataset.nick, t.dataset.key); }
        if (t.matches('.reply-del')) {
            if (confirm('确定删除这条回复？')) {
                authFetch(`/admin/delete_reply_file/${t.dataset.file}`, { method: 'POST' }).then(() => location.reload());
            }
        }
    };
}

function base64ToBytes(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
  return bytes;
}

// ===== 解密单条 v2 留言 =====
function decryptV2Message(lines) {
    if (!lines || lines.length < 2) return null;
    const first = lines[0].trim();
    if (!first.startsWith('v2|')) return null;
    const parts = first.split('|');
    if (parts.length < 3) return null;
    const rsaKey = parts[1];
    const ivBase64 = parts[2];
    const aesMsg = lines[1].trim();
    if (!rsaKey || !ivBase64 || !aesMsg) return null;
    try {
        const rawAES = jse.decrypt(rsaKey);
        if (!rawAES) return null;
        const key32 = deriveKey(rawAES);
        const iv = CryptoJS.enc.Base64.parse(ivBase64);
        const plain = CryptoJS.AES.decrypt(aesMsg, key32, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
        }).toString(CryptoJS.enc.Utf8);
        if (!plain) return null;
        const sep = plain.indexOf(' | ');
        if (sep === -1) return { nick: '匿名', content: plain };
        return {
            nick: plain.substring(0, sep).trim(),
            content: plain.substring(sep + 3).trim()
        };
    } catch (e) {
        console.warn('解密失败', e);
        return null;
    }
}

// ===== 导出明文数据（完整版，包含所有原始 IP 和时间明文，含黑白名单、人机验证配置） =====
async function exportPlainData() {
    const confirmText = prompt('请输入 "确认导出所有明文数据" 以继续：');
    if (confirmText !== '确认导出所有明文数据') {
        alert('操作已取消');
        return;
    }
    const statusDiv = document.getElementById('plain-status');
    statusDiv.style.display = 'block';
    statusDiv.textContent = '⏳ 正在获取数据...';
    try {
        const res = await authFetch('/api/admin/export-data');
        if (!res.ok) throw new Error('获取导出数据失败');
        const zipBlob = await res.blob();
        statusDiv.textContent = '⏳ 正在解压并解密数据...';
        const zip = await JSZip.loadAsync(zipBlob);

        const result = {
            messages: [],      // 留言 { nick, content, ip, time }
            votes: {},         // 投票 { poll_id: { config, votes: [ { seq, content, rawAES, key_hash, iv, ip, time } ] } }
            notices: [],       // 公告 { content, time, pinned }
            chat_qun: [],      // 群聊 { nick, time, content, state, pinned, ip }
            chat_private: [],  // 私聊 { filename, sender_pub, iv, expire_at, wrapped_key, aes_content, ip, time }
            ip_records: [],    // IP 记录 { date, ip, count }
            captcha_logs: [],  // 验证日志 { ip, verified_time, expiry_time }
            configs: {},       // 配置文件 { under, permission, rule, threshold, retention }
            blacklist: [],     // 黑名单 { hash, ip }
            whitelist: [],     // 白名单 { hash, ip }
            captcha_config: null,   // captcha/config.json
            captcha_verified: null  // captcha/verified.json
        };

        // 解密辅助：先试登录私钥，再试数据私钥
        const tryDecrypt = (enc) => {
            if (!enc || !enc.startsWith('RSA:')) return enc;
            const raw = enc.slice(4).replace(/\s+/g, '');
            // 用登录私钥
            if (jse && jse.getPrivateKey()) {
                try { const d = jse.decrypt(raw); if (d) return d; } catch(e) {}
            }
            // 用数据私钥
            if (dataJse && dataJse.getPrivateKey()) {
                try { const d = dataJse.decrypt(raw); if (d) return d; } catch(e) {}
            }
            return null; // 解不开
        };

        const getFileContent = async (path) => {
            if (zip.files[path] && !zip.files[path].dir) {
                return await zip.files[path].async('string');
            }
            return null;
        };

        // ---- 配置文件 ----
        const configFiles = [
            { key: 'under', path: 'under.txt' },
            { key: 'permission', path: '群/permission.txt' },
            { key: 'rule', path: '群/rule.txt' },
            { key: 'threshold', path: '群/threshold.txt' },
            { key: 'retention', path: 'chat/retention_hours.txt' }
        ];
        for (const { key, path } of configFiles) {
            const content = await getFileContent(path);
            if (content !== null) result.configs[key] = content.trim();
        }

        // ---- 黑白名单 ----

        // ---- 留言 ----
        for (const [path, file] of Object.entries(zip.files)) {

                if (first.startsWith('v3|')) {

                    // 解析 v3 头部: v3|pqc_ciphertext|iv_shared|iv_content|encAESKey|encContent|identity_hash
                    const v3parts = first.split('|');
                    if (v3parts.length < 6) continue;
                    const pqcCiphertextB64 = v3parts[1];
                    const ivSharedB64 = v3parts[2];
                    const ivContentB64 = v3parts[3];
                    // encAESKey 和 encContent 在独立行
                    const encAESKeyB64 = (lines[1] || '').trim();
                    const encContentB64 = (lines[2] || '').trim();
                    if (!encAESKeyB64 || !encContentB64) continue;

                    try {
                        // 1) 解封主密文，获取共享密钥
                        const ct = Uint8Array.from(atob(pqcCiphertextB64), c => c.charCodeAt(0));
                        const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                        const sharedKey = await crypto.subtle.digest('SHA-256', shared);
                        const aesKeyShared = new Uint8Array(sharedKey);

                        // 2) 用共享密钥解密用户 AES 密钥
                        const ivShared = Uint8Array.from(atob(ivSharedB64), c => c.charCodeAt(0));
                        const encAESKeyBytes = Uint8Array.from(atob(encAESKeyB64), c => c.charCodeAt(0));
                        const decKey = await crypto.subtle.decrypt(
                            { name: 'AES-CBC', iv: ivShared },
                            await crypto.subtle.importKey('raw', aesKeyShared, { name: 'AES-CBC' }, false, ['decrypt']),
                            encAESKeyBytes
                        );
                        const rawAES = new TextDecoder().decode(new Uint8Array(decKey));
                        const userAESKeyDigest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(rawAES));

                        // 3) 用用户 AES 密钥解密内容
                        const ivContent = Uint8Array.from(atob(ivContentB64), c => c.charCodeAt(0));
                        const encContentBytes = Uint8Array.from(atob(encContentB64), c => c.charCodeAt(0));
                        const decContent = await crypto.subtle.decrypt(
                            { name: 'AES-CBC', iv: ivContent },
                            await crypto.subtle.importKey('raw', new Uint8Array(userAESKeyDigest), { name: 'AES-CBC' }, false, ['decrypt']),
                            encContentBytes
                        );
                        const plain = new TextDecoder().decode(decContent);

                        // 分离昵称和内容

                        if (sep !== -1) {

                        // 4) 解密 IP 数据（第二行 JSON）
                        let ip = '127.0.0.1', time = '';
                        if (lines.length >= 4) {

                                const ctIp = Uint8Array.from(atob(ipData.ciphertext_ip), c => c.charCodeAt(0));
                                const sharedIp = ml_kem1024.decapsulate(ctIp, pqcPrivateKeyBytes);
                                const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                                const aesKeyIp = new Uint8Array(keyIp);
                                const ivIp = Uint8Array.from(atob(ipData.iv_ip), c => c.charCodeAt(0));

                } else if (first.startsWith('v2|')) {

                    try {

                        if (rawAES) {
                            const key32 = deriveKey(rawAES);

                            const plain = CryptoJS.AES.decrypt(aesMsg, key32, {

                            }).toString(CryptoJS.enc.Utf8);
                            if (plain) {
                                const sep = plain.indexOf(' | ');
                                if (sep !== -1) {
                                    nick = plain.substring(0, sep).trim();
                                    contentText = plain.substring(sep + 3).trim();
                                } else {
                                    contentText = plain;
                                }

                    } catch(e) {}
                    // 跳过解密失败的消息，否则导入时 rawAES 为空会导致垃圾数据
                    if (!rawAES) {
                        console.warn('v2 留言解密失败，跳过导出:', path);

                    result.messages.push({

                        nick, content: contentText, ip, time,

                    });
                }
                }
       }

        // ---- 投票（支持 v2 和 v3） ----
        // 1. 收集所有投票目录中的文件
        const voteDirs = {};

        // 2. 遍历每个投票

            const votes = [];

            for (const [fname, file] of Object.entries(files)) {
                if (!fname.match(/^投票_\d+\.txt$/)) continue;
                const seq = parseInt(fname.match(/\d+/)[0], 10);
                const content = await file.async('string');
                const lines = content.split('\n').filter(l => l.trim());
                if (lines.length < 6) continue;  // 最少需要 6 行
                const first = lines[0];

                // ---------- v2 格式（RSA 加密） ----------
                if (first.startsWith('v2|')) {
                    const parts = first.split('|');
                    // 格式: v2|rsa_key|iv
                    const rsaKey = parts[1] || '';
                    const iv = parts[2] || '';
                    const aesMsg = lines[1] || '';           // AES 加密的投票内容
                    const serverEnc = lines[2] || '';        // RSA 加密的 IP|时间
                    const editToken = lines[3] || '';
                    const keyHash = lines[4] || '';

                    // 解密 server_enc 获取 IP 和时间（使用管理员 RSA 私钥）
                    let ip = '127.0.0.1', time = '';

                        try {
                            const dec = jse.decrypt(raw);
                            if (dec) {
                                const parts2 = dec.split(' | ');
                                if (parts2.length >= 2) {
                                    ip = parts2[0];
                                    time = parts2[1];
                                }
                            }
                        } catch (e) {}
                    }

                    // 解密投票内容（用 RSA 解密得到的 AES 密钥）
                    let contentText = '（解密失败）', rawAES = '';
                    try {
                        rawAES = jse.decrypt(rsaKey);
                        if (rawAES) {
                            const key32 = deriveKey(rawAES);
                            const ivW = CryptoJS.enc.Base64.parse(iv);
                            const plain = CryptoJS.AES.decrypt(aesMsg, key32, {
                                iv: ivW,
                                mode: CryptoJS.mode.CBC,
                                padding: CryptoJS.pad.Pkcs7
                            }).toString(CryptoJS.enc.Utf8);
                            if (plain) {
                                // 格式: "投票者 | 选项内容"
                                const sep = plain.indexOf(' | ');
                                if (sep !== -1) {
                                    contentText = plain.substring(sep + 3).trim();
                                } else {
                                    contentText = plain;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn(`投票 ${pollId} 序号 ${seq} v2 解密失败`, e);
                    }
                    // 跳过解密失败的数据（rawAES 为空则无法重新加密）
                    if (!rawAES) continue;

                    votes.push({
                        seq,
                        content: contentText,
                        rawAES: rawAES,
                        key_hash: keyHash,
                        iv: iv,
                        ip: ip,
                        time: time,
                        version: 'v2'
                    });
                }
                // ---------- v3 格式（PQC 加密） ----------
                else if (first.startsWith('v3|')) {
                    // 服务端 v3 投票文件格式（11行）：
                    // 0: v3|rsa_key|iv|server_time
                    // 1: aes_msg     2: server_enc   3: edit_token
                    // 4: key_hash    5: remark_line
                    // 6: pqc_ct      7: iv_sh        8: iv_ct
                    // 9: enc_key    10: enc_ct
                    if (lines.length < 11) continue;
                    const v3parts = first.split('|');
                    const rsaKeyEnc = v3parts[1] || '';
                    const aesIvB64 = v3parts[2] || '';
                    const serverTimeHdr = v3parts[3] || '';
                    const serverEnc = (lines[2] || '').trim();
                    const pqcCiphertextB64 = (lines[6] || '').trim();
                    const ivSharedB64 = (lines[7] || '').trim();
                    const ivContentB64 = (lines[8] || '').trim();
                    const encAESKeyB64 = (lines[9] || '').trim();

                    try {

                        const ct = Uint8Array.from(atob(pqcCiphertextB64), c => c.charCodeAt(0));
                        const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                        const sharedKey = await crypto.subtle.digest('SHA-256', shared);

                        const ivShared = Uint8Array.from(atob(ivSharedB64), c => c.charCodeAt(0));
                        const encAESKeyBytes = Uint8Array.from(atob(encAESKeyB64), c => c.charCodeAt(0));
                        const decKey = await crypto.subtle.decrypt(
                            { name: 'AES-CBC', iv: ivShared },
                            await crypto.subtle.importKey('raw', aesKeyShared, { name: 'AES-CBC' }, false, ['decrypt']),
                            encAESKeyBytes
                        );
                        const layer2KeyB64 = new TextDecoder().decode(new Uint8Array(decKey));

                        // 3) 用 layer2Key 解密内容 JSON {key, vote, remark}
                        const ivContent = Uint8Array.from(atob(ivContentB64), c => c.charCodeAt(0));
                        const encContentBytes = Uint8Array.from(atob(encContentB64), c => c.charCodeAt(0));
                        const decContent = await crypto.subtle.decrypt(
                            { name: 'AES-CBC', iv: ivContent },
                            await crypto.subtle.importKey('raw', base64ToBytes(layer2KeyB64), { name: 'AES-CBC' }, false, ['decrypt']),
                            encContentBytes
                        );
                        const plain = new TextDecoder().decode(decContent);
                        let payload = {};
                        try { payload = JSON.parse(plain); } catch(e) {}
                        const rawAES = payload.key || '';
                        const voteContent = payload.vote || plain;
                        const remark = payload.remark || '';

                        let contentText = voteContent;
                        const sepIdx = voteContent.indexOf(' | ');
                        if (sepIdx !== -1) {
                            contentText = voteContent.substring(sepIdx + 3).trim();
                        }

                        // 4) 解密 IP 和时间（server_enc 是 RSA 加密的 IP|时间）
                        let ip = '127.0.0.1', time = serverTimeHdr;
                        if (serverEnc && jse && jse.getPrivateKey()) {

                                if (dec) {
                                    const parts2 = dec.split(' | ');
                                    if (parts2.length >= 2) { ip = parts2[0]; time = parts2[1]; }
                                }
                            } catch(e) {}
                        }

                        votes.push({
                            seq,
                            content: contentText,
                            rawAES: rawAES,
                            key_hash: (lines[4] || '').trim(),
                            iv: aesIvB64,
                            ip: ip,
                            time: time,
                            version: 'v3',
                            remark: remark
                        });
                    } catch (e) {
                        console.warn(`v3 投票序号 ${seq} 解密失败`, e);
                    }
                }
            }

            result.votes[pollId] = { config, votes };

                    const ivShared = Uint8Array.from(atob(ivSharedB64), c => c.charCodeAt(0));

                    const ivContent = Uint8Array.from(atob(ivContentB64), c => c.charCodeAt(0));

                    const plain = new TextDecoder().decode(decContent);

                            const ipPlain = new TextDecoder().decode(decIp);
                            const parts3 = ipPlain.split(' | ');

                    } else if (adminIpEnc.startsWith('RSA:')) {

                                if (parts3.length >= 2) { ip = parts3[0]; serverTime = parts3[1]; }
                            }

                    }

                    result.chat_private.push({
                        filename,
                        sender_pub: senderPub,
                        iv: iv,
                        expire_at: expireAt,
                        wrapped_key: 'PQC_V3',        // 标记
                        aes_content: encContentB64,    // 保留密文

                        time: serverTime,
                        version: 'v3',
                        nick: nick,
                        content: msgContent,
                        rawAES: rawAES,
                        sender_pqc_pub: senderPqcPub
                    });
                } catch(e) {
                    console.warn(`v3 私聊解密失败: ${filename}`, e);
                }
            }
        }

        // ---- IP 记录 ----
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            const match = path.match(/^ip\/ip_(\d{4}-\d{2}-\d{2})$/);
            if (!match) continue;
            const date = match[1];
            const content = await file.async('string');
            const lines = content.split('\n').filter(l => l.trim());
            for (const line of lines) {
                const parts = line.split('|');
                if (parts.length < 3) continue;
                const encIp = parts[1].trim();
                const count = parseInt(parts[2].trim(), 10) || 0;
                // ★ 使用已有的 decryptIP 函数，无论成功还是失败都返回可读字符串
                const ip = decryptIP(encIp);
                result.ip_records.push({ date, ip, count });
            }
        }

        // ---- 人机验证日志 ----
        const captchaLogRaw = await getFileContent('captcha/verified_log.json');
        if (captchaLogRaw) {
            try {
                const logs = JSON.parse(captchaLogRaw);
                for (const entry of logs) {
                    const encData = entry.data;
                    if (encData && encData.startsWith('RSA:')) {
                        try {
                            const dec = jse.decrypt(encData.slice(4));
                            if (dec) {
                                const parts = dec.split('|');
                                if (parts.length >= 3) {
                                    result.captcha_logs.push({
                                        ip: parts[0],
                                        verified_time: parts[1],
                                        expiry_time: parts[2]
                                    });
                                }
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {}
        }

        // ---- 导出 JSON ----
        statusDiv.textContent = `✅ 导出完成：留言 ${result.messages.length} 条，投票 ${Object.keys(result.votes).length} 个，公告 ${result.notices.length} 条，群聊 ${result.chat_qun.length} 条，私聊 ${result.chat_private.length} 条，IP记录 ${result.ip_records.length} 条，验证日志 ${result.captcha_logs.length} 条，黑名单 ${result.blacklist.length} 条，白名单 ${result.whitelist.length} 条，正在下载...`;
        const jsonStr = JSON.stringify(result, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `plain_data_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    } catch (e) {
        statusDiv.textContent = '❌ 导出失败：' + e.message;
        console.error(e);
    }
}

// ===== 导入明文数据（构造 ZIP 并全量覆盖，使用当前公钥重新加密，包含黑白名单、人机验证配置） =====
async function importPlainData(input) {
    if (!input.files || input.files.length === 0) return;
    const file = input.files[0];
    if (!file.name.endsWith('.json')) {
        alert('请上传 .json 文件');
        input.value = '';
        return;
    }
    const confirmMsg = `⚠️ 即将导入文件：${file.name}\n此操作将覆盖当前所有明文数据，不可撤销！\n请输入 "确认导入来自于 ${file.name} 的明文数据并覆盖" 以继续：`;
    const confirmText = prompt(confirmMsg);
    if (confirmText !== `确认导入来自于 ${file.name} 的明文数据并覆盖`) {
        alert('操作已取消');
        input.value = '';
        return;
    }

    const statusDiv = document.getElementById('plain-status');
    statusDiv.style.display = 'block';
    statusDiv.textContent = '⏳ 读取文件...';
    try {
        const text = await file.text();
        const data = JSON.parse(text);

        // ---- 获取公钥用于加密 ----
        const pubRes = await fetch('/gongyao.txt');
        if (!pubRes.ok) throw new Error('无法获取公钥');
        const pubKey = await pubRes.text();
        const encryptor = new JSEncrypt();
        encryptor.setPublicKey(pubKey);

        // 辅助加密函数
        const encryptRSA = (plain) => {
            if (!plain || !encryptor.getPublicKey()) return '';
            try {
                const enc = encryptor.encrypt(plain);
                return enc ? 'RSA:' + enc : '';
            } catch(e) {
                console.error('RSA加密异常:', e.message);
                return '';
            }
        };

        // ---- 创建 ZIP ----
        const zip = new JSZip();

        const addFile = (path, content) => {
            zip.file(path, content);
        };

        // ---- 配置文件 ----
        const configMap = {
            under: 'under.txt',
            permission: '群/permission.txt',
            rule: '群/rule.txt',
            threshold: '群/threshold.txt',
            retention: 'chat/retention_hours.txt'
        };
        for (const [key, filename] of Object.entries(configMap)) {
            if (data.configs && data.configs[key] !== undefined) {
                addFile(filename, data.configs[key]);
            }
        }

        // ---- 黑白名单 ----
        const writeList = (list, filename) => {
            // 始终写入文件，即使列表为空也写入空字符串，以确保文件存在
            if (Array.isArray(list)) {
                const lines = list.map(item => {
                    const ip = item.ip || '127.0.0.1';
                    const hash = item.hash || CryptoJS.SHA512(ip).toString(CryptoJS.enc.Hex);
                    const encrypted = encryptRSA(ip);
                    if (!encrypted) return null; // 加密失败跳过
                    return `${hash} | ${encrypted}`;
                }).filter(line => line !== null);
                // 即使 lines 为空，也写入空字符串，创建空文件
                addFile(filename, lines.join('\n'));
            }
        };
        writeList(data.blacklist, 'black.txt');
        writeList(data.whitelist, 'white.txt');

        // ---- 人机验证配置 ----
        if (data.captcha_config && typeof data.captcha_config === 'object') {
            addFile('captcha/config.json', JSON.stringify(data.captcha_config, null, 2));
        }

        // ---- 人机验证已验证IP ----
        if (data.captcha_verified && typeof data.captcha_verified === 'object') {
            addFile('captcha/verified.json', JSON.stringify(data.captcha_verified, null, 2));
        }

        // ★ Web Crypto AES-CBC 加密辅助函数（与 index.html v3 提交一致）
        async function encryptAES(plaintext, keyBytes) {
                const iv = crypto.getRandomValues(new Uint8Array(16));
                const cryptoKey = await crypto.subtle.importKey(
                        'raw', keyBytes, { name: 'AES-CBC' }, false, ['encrypt']
                );
                const enc = await crypto.subtle.encrypt(
                        { name: 'AES-CBC', iv: iv },
                        cryptoKey,
                        new TextEncoder().encode(plaintext)
                );
                return { iv: iv, ciphertext: new Uint8Array(enc) };
        }

        // ---- 留言 ----
        if (Array.isArray(data.messages)) {
            // ★ 检测是否有 v3 消息，如有则提前加载 PQC 公钥
            let pqcPubBytes = null;
            let ml_kem1024_import = null;
            const hasV3 = data.messages.some(m => m.version === 'v3');
            if (hasV3) {
                try {
                    const pubRes = await fetch('/gongyaoPQC.txt');
                    if (pubRes.ok) {
                        const pubB64 = await pubRes.text();
                        pqcPubBytes = Uint8Array.from(atob(pubB64.trim()), c => c.charCodeAt(0));
                        const mod = await import('@noble/post-quantum/ml-kem');
                        ml_kem1024_import = mod.ml_kem1024;
                    }
                } catch(e) { console.warn('加载PQC公钥失败，v3消息将回退到v2', e); }
            }

            let seq = 1;
            for (const msg of data.messages) {
                if (!msg.nick || !msg.content) continue;
                const isV3 = msg.version === 'v3' && pqcPubBytes && ml_kem1024_import;

                if (isV3) {
                    // ========== PQC v3 重新加密 ==========
                    // 加密数据的 AES 密钥 rawAES 保持不变，
                    // 但共同密钥（ML-KEM 封装）重新生成
                    let rawAES = msg.rawAES;
                    if (!rawAES) {
                        // 无原始 AES 密钥则生成新密钥
                        const aesKeyBytes = crypto.getRandomValues(new Uint8Array(32));
                        rawAES = new TextDecoder().decode(aesKeyBytes);
                    }
                    const userAESKeyRaw = new TextEncoder().encode(rawAES);
                    const userAESKeyDigest = await crypto.subtle.digest('SHA-256', userAESKeyRaw);

                    // ★ 重新生成共同密钥（新 ML-KEM 封装）
                    const { cipherText, sharedSecret } = ml_kem1024_import.encapsulate(pqcPubBytes);
                    const sharedKey = await crypto.subtle.digest('SHA-256', sharedSecret);
                    const aesKeyShared = new Uint8Array(sharedKey);

                    // 用新共享密钥加密用户 AES 密钥
                    const encAESKeyResult = await encryptAES(rawAES, aesKeyShared);

                    // 用用户 AES 密钥加密内容
                    const contentPlain = `${msg.nick} | ${msg.content}`;
                    const encContentResult = await encryptAES(contentPlain, new Uint8Array(userAESKeyDigest));

                    // 加密 IP 数据（新的 ML-KEM 封装）
                    const ip = msg.ip || '127.0.0.1';
                    const time = msg.time || new Date().toISOString().replace('T', ' ').slice(0, 19);
                    const ipPlain = `${ip} | ${time}`;
                    const { cipherText: ctIp, sharedSecret: sharedIp } = ml_kem1024_import.encapsulate(pqcPubBytes);
                    const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                    const aesKeyIp = new Uint8Array(keyIp);
                    const encIpResult = await encryptAES(ipPlain, aesKeyIp);
                    const ipData = {
                        ciphertext_ip: btoa(String.fromCharCode(...ctIp)),
                        iv_ip: btoa(String.fromCharCode(...encIpResult.iv)),
                        enc_ip: btoa(String.fromCharCode(...encIpResult.ciphertext))
                    };

                    // 计算身份哈希
                    const identityData = new TextEncoder().encode(`${msg.nick}|${rawAES}`);
                    const hashBuf = await crypto.subtle.digest('SHA-256', identityData);
                    const identityHash = Array.from(new Uint8Array(hashBuf))
                        .map(b => b.toString(16).padStart(2, '0')).join('');

                    // 组装 v3 文件内容
                    // 组装 v3 文件内容
                    const encAESKeyB64 = btoa(String.fromCharCode(...encAESKeyResult.ciphertext));
                    const encContentB64 = btoa(String.fromCharCode(...encContentResult.ciphertext));

                    const v3Header = [
                        'v3',
                        btoa(String.fromCharCode(...cipherText)),
                        btoa(String.fromCharCode(...encAESKeyResult.iv)),
                        btoa(String.fromCharCode(...encContentResult.iv)),
                        encAESKeyB64,
                        encContentB64,
                        identityHash
                    ].join('|');

                    // encAESKey 和 encContent 同时在独立行，供 exportPlainData 解析
                    const fileContent = v3Header + '\n' + encAESKeyB64 + '\n' + encContentB64 + '\n' + JSON.stringify(ipData);
                    addFile(`留言/留言_${seq}.txt`, fileContent);
                    seq++;
                } else {
                    // ========== RSA v2 重新加密（原有逻辑）==========
                    let rawAES = msg.rawAES;
                    if (!rawAES) {
                        // 无原始 AES 密钥则生成新密钥
                        const aesKeyBytes = CryptoJS.lib.WordArray.random(32);
                        rawAES = aesKeyBytes.toString(CryptoJS.enc.Base64);
                    }
                    const rsaKey = encryptor.encrypt(rawAES);
                    if (!rsaKey) {
                        console.warn('RSA加密失败，密钥可能过长，跳过此消息:', msg.nick);
                        continue;
                    }
                    const iv = CryptoJS.lib.WordArray.random(16);
                    const ivBase64 = iv.toString(CryptoJS.enc.Base64);
                    const plainText = `${msg.nick} | ${msg.content}`;
                    const key32 = deriveKey(rawAES);
                    const encrypted = CryptoJS.AES.encrypt(plainText, key32, {
                        iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                    }).toString();
                    const ip = msg.ip || '127.0.0.1';
                    const time = msg.time || new Date().toISOString().replace('T', ' ').slice(0, 19);
                    const serverMeta = `${ip} | ${time}`;
                    let serverEnc = encryptor.encrypt(serverMeta);
                    if (!serverEnc) {
                        serverEnc = encryptor.encrypt(serverMeta);  // 重试一次
                    }
                    if (!serverEnc) {
                        serverEnc = encryptor.encrypt(`127.0.0.1 | ${time}`) || '';
                    }
                    const fileContent = `v2|${rsaKey}|${ivBase64}|${time}\n${encrypted}\n${serverEnc}`;                    addFile(`留言/留言_${seq}.txt`, fileContent);
                    seq++;
                }
            }
        }

        // ---- 投票（支持 v2 和 v3 重新加密） ----
        if (data.votes && typeof data.votes === 'object') {
            // 遍历每个投票
            for (const [pollId, pollData] of Object.entries(data.votes)) {
                const config = pollData.config || {};
                const votes = pollData.votes || [];
                if (!config.options || config.options.length < 2) continue;

                // 创建投票目录
                const dir = `vote_data/${pollId}`;
                // 写入配置文件（config.json）
                addFile(`${dir}/config.json`, JSON.stringify(config, null, 2));

                let voteSeq = 1;
                for (const vote of votes) {
                    if (!vote.content) continue;

                    // 判断是否使用 v3（要求数据中有 version 字段且为 'v3'，且 PQC 公钥可用）
                    const isV3 = (vote.version === 'v3' && pqcPubBytes && ml_kem1024_import);

                    // 获取或生成 rawAES（用户 AES 密钥）
                    let rawAES = vote.rawAES;
                    if (!rawAES) {
                        const aesKeyBytes = crypto.getRandomValues(new Uint8Array(32));
                        rawAES = new TextDecoder().decode(aesKeyBytes);
                    }

                    // 公共字段
                    const ip = vote.ip || '127.0.0.1';
                    const time = vote.time || new Date().toISOString().replace('T', ' ').slice(0, 19);

                    // RSA 加密 rawAES（v2 和 v3 都需要，管理员 RSA 解密路径）
                    const rsaKeyEnc = encryptor.encrypt(rawAES);
                    if (!rsaKeyEnc) { console.warn('RSA加密AES密钥失败，跳过'); voteSeq++; continue; }

                    // ★ 用 CryptoJS 加密投票内容（与 vote.html submitVote 一致）
                    const voteContentStr = `投票者 | ${vote.content}`;
                    const key32 = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(rawAES).toString());
                    const aesIv = CryptoJS.lib.WordArray.random(16);
                    const aesIvB64 = CryptoJS.enc.Base64.stringify(aesIv).replace(/[\r\n\s]+/g, '');
                    const aesMsg = CryptoJS.AES.encrypt(voteContentStr, key32, {
                        iv: aesIv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                    }).toString().replace(/[\r\n\s]+/g, '');

                    // RSA 加密 IP|时间
                    const serverMeta = `${ip} | ${time}`;
                    let serverEnc = encryptor.encrypt(serverMeta);
                    if (!serverEnc) serverEnc = encryptor.encrypt(`127.0.0.1 | ${time}`) || '';

                    // 生成 edit_token
                    const editToken = Array.from(crypto.getRandomValues(new Uint8Array(18)))
                        .map(b => b.toString(16).padStart(2, '0')).join('');

                    // 计算 key_hash
                    const keyHash = CryptoJS.SHA256(rawAES).toString();

                    // 加密备注
                    const voteRemark = vote.remark || '';
                    let remarkLine = '|';
                    if (voteRemark) {
                        const remarkIv = CryptoJS.lib.WordArray.random(16);
                        const remarkIvB64 = CryptoJS.enc.Base64.stringify(remarkIv).replace(/[\r\n\s]+/g, '');
                        const remarkEnc = CryptoJS.AES.encrypt(voteRemark, key32, {
                            iv: remarkIv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                        }).toString().replace(/[\r\n\s]+/g, '');
                        remarkLine = remarkIvB64 + '|' + remarkEnc;
                    }

                    if (isV3) {
                        // ---------- PQC v3 重新加密 ----------
                        // 第二层随机 AES 密钥（32字节 WordArray）
                        const layer2Key = CryptoJS.lib.WordArray.random(32);
                        const layer2KeyB64 = CryptoJS.enc.Base64.stringify(layer2Key);

                        // PQC 封装
                        const { cipherText, sharedSecret } = ml_kem1024_import.encapsulate(pqcPubBytes);
                        const sharedKey = await crypto.subtle.digest('SHA-256', sharedSecret);
                        const layer1KeyHex = Array.from(new Uint8Array(sharedKey))
                            .map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 64);
                        const layer1Key = CryptoJS.enc.Hex.parse(layer1KeyHex);

                        // 第一层加密第二层 AES 密钥
                        const ivShared = CryptoJS.lib.WordArray.random(16);
                        const encAESKeyStr = CryptoJS.AES.encrypt(layer2KeyB64, layer1Key, {
                            iv: ivShared, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                        }).toString().replace(/[\r\n\s]+/g, '');

                        // 第二层加密 JSON payload
                        const payload = JSON.stringify({ key: rawAES, vote: voteContentStr, remark: voteRemark });
                        const ivContent = CryptoJS.lib.WordArray.random(16);
                        const encContentStr = CryptoJS.AES.encrypt(payload, layer2Key, {
                            iv: ivContent, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                        }).toString().replace(/[\r\n\s]+/g, '');

                        const pqcCtB64 = btoa(String.fromCharCode(...cipherText));
                        const ivSharedB64 = CryptoJS.enc.Base64.stringify(ivShared).replace(/[\r\n\s]+/g, '');
                        const ivContentB64 = CryptoJS.enc.Base64.stringify(ivContent).replace(/[\r\n\s]+/g, '');

                        // 组装 11 行 v3 文件（与 submit_vote 一致）
                        const fileContent = [
                            `v3|${rsaKeyEnc}|${aesIvB64}|${time}`,
                            aesMsg,
                            serverEnc,
                            editToken,
                            keyHash,
                            remarkLine,
                            pqcCtB64,
                            ivSharedB64,
                            ivContentB64,
                            encAESKeyStr,
                            encContentStr
                        ].join('\n');
                        addFile(`${dir}/投票_${voteSeq}.txt`, fileContent);
                    } else {
                        // ---------- v2 RSA 重新加密 ----------
                        const fileContent = [
                            `v2|${rsaKeyEnc}|${aesIvB64}`,
                            aesMsg,
                            serverEnc,
                            editToken,
                            keyHash,
                            remarkLine
                        ].join('\n');
                        addFile(`${dir}/投票_${voteSeq}.txt`, fileContent);
                    }
                    voteSeq++;
                } // end for votes
            } // end for pollData
        } // end if data.votes

        // ---- 公告 ----
        if (Array.isArray(data.notices)) {
            const notices = data.notices.map(n => ({
                content: n.content,
                time: n.time || new Date().toISOString().replace('T', ' ').slice(0, 19),
                pinned: n.pinned || false
            }));
            addFile('notice_data.json', JSON.stringify(notices, null, 2));
        }

        // ---- 群聊 ----
        if (Array.isArray(data.chat_qun)) {
            const chat = data.chat_qun.map(m => {
                const ip = m.ip || '127.0.0.1';
                const encryptedIp = encryptRSA(ip);
                return {
                    nick: m.nick,
                    time: m.time || new Date().toISOString().replace('T', ' ').slice(0, 19),
                    content: m.content,
                    state: m.state || 'enabled',
                    pinned: m.pinned || false,
                    ip: encryptedIp || 'PLAIN:' + ip,
                    key_hash: '',
                    reports: []
                };
            });
            addFile('chat_data.json', JSON.stringify(chat, null, 2));
        }

        // ---- 私聊（支持 v2 和 v3） ----
        if (Array.isArray(data.chat_private)) {
            for (const msg of data.chat_private) {
                const filename = msg.filename || `unknown_${Date.now()}.txt`;
                // 判断是否使用 v3
                const isV3 = (msg.version === 'v3' && pqcPubBytes && ml_kem1024_import);

                if (isV3) {
                    // ---------- PQC v3 重新加密 ----------
                    let rawAES = msg.rawAES;
                    if (!rawAES) {
                        const aesKeyBytes = crypto.getRandomValues(new Uint8Array(32));
                        rawAES = new TextDecoder().decode(aesKeyBytes);
                    }
                    const userAESKeyRaw = new TextEncoder().encode(rawAES);
                    const userAESKeyDigest = await crypto.subtle.digest('SHA-256', userAESKeyRaw);

                    // 生成新的 ML-KEM 封装
                    const { cipherText, sharedSecret } = ml_kem1024_import.encapsulate(pqcPubBytes);
                    const sharedKey = await crypto.subtle.digest('SHA-256', sharedSecret);
                    const aesKeyShared = new Uint8Array(sharedKey);

                    // 加密 rawAES
                    const encAESKeyResult = await encryptAES(rawAES, aesKeyShared);

                    // 加密消息内容（格式：昵称|时间|内容|nonce）
                    const nonce = Array.from(crypto.getRandomValues(new Uint8Array(8)))
                        .map(b => b.toString(16).padStart(2,'0')).join('');
                    const contentPlain = `${msg.nick || '匿名'}|${msg.time || new Date().toISOString().replace('T', ' ').slice(0,19)}|${msg.content || ''}|${nonce}`;
                    const encContentResult = await encryptAES(contentPlain, new Uint8Array(userAESKeyDigest));

                    // 加密 IP 和时间（用新的 ML-KEM 封装）
                    const ip = msg.ip || '127.0.0.1';
                    const time = msg.time || new Date().toISOString().replace('T', ' ').slice(0, 19);
                    const ipPlain = `${ip} | ${time}`;
                    const { cipherText: ctIp, sharedSecret: sharedIp } = ml_kem1024_import.encapsulate(pqcPubBytes);
                    const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                    const aesKeyIp = new Uint8Array(keyIp);
                    const encIpResult = await encryptAES(ipPlain, aesKeyIp);
                    const ipData = {
                        ct: btoa(String.fromCharCode(...ctIp)),
                        iv: btoa(String.fromCharCode(...encIpResult.iv)),
                        enc: btoa(String.fromCharCode(...encIpResult.ciphertext))
                    };
                    const adminIpEnc = 'PQC_IP:' + btoa(JSON.stringify(ipData));

                    // 组装 v3 私聊文件
                    const senderPub = msg.sender_pub || 'PQC:' + hashlib.sha256((msg.sender_pqc_pub||'')).substring(0,32);
                    const iv = msg.iv || CryptoJS.enc.Base64.stringify(CryptoJS.lib.WordArray.random(16));
                    const expireAt = msg.expire_at || '';
                    const pqcCiphertextB64 = btoa(String.fromCharCode(...cipherText));
                    const ivSharedB64 = btoa(String.fromCharCode(...encAESKeyResult.iv));
                    const ivContentB64 = btoa(String.fromCharCode(...encContentResult.iv));
                    const encAESKeyB64 = btoa(String.fromCharCode(...encAESKeyResult.ciphertext));
                    const encContentB64 = btoa(String.fromCharCode(...encContentResult.ciphertext));
                    const senderPqcPub = msg.sender_pqc_pub || '';

                    const fileContent = [
                        `v3|${senderPub}|${iv}|${expireAt}|${pqcCiphertextB64}|${ivSharedB64}|${ivContentB64}|${encAESKeyB64}|${encContentB64}|${senderPqcPub}`,
                        encAESKeyB64,
                        encContentB64,
                        `${adminIpEnc} | ${time}`
                    ].join('\n');
                    addFile(`chat/${filename}`, fileContent);
                } else {
                    // ---------- v2 RSA 加密（原有逻辑） ----------
                    const ip = msg.ip || '127.0.0.1';
                    const encryptedIp = encryptRSA(ip) || 'PLAIN:' + ip;
                    const time = msg.time || new Date().toISOString().replace('T', ' ').slice(0, 19);
                    const content = `v2|${msg.sender_pub}|${msg.iv}|${msg.expire_at || ''}\n${msg.wrapped_key}\n${msg.aes_content}\n${encryptedIp} | ${time}`;
                    addFile(`chat/${filename}`, content);
                }
            }
        }

        // ---- IP 记录 ----
        if (Array.isArray(data.ip_records)) {
            const grouped = {};
            let skippedCount = 0;
            let validCount = 0;
            for (const rec of data.ip_records) {
                // 1. 获取日期，若缺失则使用当前日期
                let date = rec.date ? rec.date.trim() : '';
                if (!date) {
                    date = new Date().toISOString().slice(0, 10);
                    console.warn('IP记录缺少日期，使用当前日期:', date);
                }
                // 校验日期格式 YYYY-MM-DD
                if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
                    console.warn('无效日期格式，跳过此记录:', date);
                    continue;
                }

                // 2. 获取 IP 并清理
                let ip = (rec.ip || '').trim();
                if (!ip) {
                    console.warn('IP为空，跳过');
                    continue;
                }

                // 3. 如果 IP 是加密格式（RSA:开头），说明导出时未解密，跳过（因为我们需要明文）
                if (ip.startsWith('RSA:')) {
                    console.warn('跳过已加密的IP记录（导入只接受明文IP）:', ip);
                    skippedCount++;
                    continue;
                }

                // 4. 如果 IP 是解密失败的标识，跳过
                if (ip === '（解密失败）') {
                    console.warn('跳过解密失败的IP记录:', ip);
                    skippedCount++;
                    continue;
                }

                // 5. 校验 IP 格式（同时支持 IPv4 和 IPv6）
                let isValid = false;

                // 5a. 尝试匹配 IPv4（xxx.xxx.xxx.xxx，每段 0-255）
                const ipv4Parts = ip.split('.');
                if (ipv4Parts.length === 4) {
                    let allValid = true;
                    for (let part of ipv4Parts) {
                        const num = parseInt(part, 10);
                        if (isNaN(num) || num < 0 || num > 255) {
                            allValid = false;
                            break;
                        }
                    }
                    if (allValid) {
                        isValid = true;
                    }
                }

                // 5b. 如果 IPv4 校验失败，尝试 IPv6（简单判断：包含 ':' 且不含空格）
                if (!isValid && ip.includes(':') && !/\s/.test(ip)) {
                    // 更严谨的校验可以添加，但服务端仅作为字符串使用，这样足够
                    isValid = true;
                }

                if (!isValid) {
                    console.warn('IP格式无效（不支持的格式）:', ip);
                    skippedCount++;
                    continue;
                }

                // 6. 获取 count
                const count = rec.count && !isNaN(rec.count) ? parseInt(rec.count, 10) : 1;

                // 7. 加密 IP
                const hash = CryptoJS.SHA512(ip).toString(CryptoJS.enc.Hex);
                const encrypted = encryptRSA(ip);
                if (!encrypted) {
                    console.warn('IP加密失败，跳过:', ip);
                    skippedCount++;
                    continue;
                }

                // 8. 分组存储
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(`${hash} | ${encrypted} | ${count}`);
                validCount++;
            }

            console.log(`IP记录处理完成：有效 ${validCount} 条，跳过 ${skippedCount} 条`);

            // 9. 写入 ZIP 文件
            for (const [date, lines] of Object.entries(grouped)) {
                if (lines.length > 0) {
                    addFile(`ip/ip_${date}`, lines.join('\n'));
                }
            }
        }

        // ---- 人机验证日志 ----
        if (Array.isArray(data.captcha_logs)) {
            const logs = [];
            for (const entry of data.captcha_logs) {
                const ip = entry.ip || '127.0.0.1';
                const verified = entry.verified_time || new Date().toISOString().replace('T', ' ').slice(0, 19);
                const expiry = entry.expiry_time || new Date(Date.now() + 3600000).toISOString().replace('T', ' ').slice(0, 19);
                const plain = `${ip}|${verified}|${expiry}`;
                const encrypted = encryptRSA(plain);
                if (encrypted) {
                    logs.push({ data: encrypted, ts: Date.now() / 1000 });
                }
            }
            if (logs.length > 0) {
                addFile('captcha/verified_log.json', JSON.stringify(logs, null, 2));
            }
        }

        // ---- 生成 ZIP 并上传 ----
        statusDiv.textContent = '⏳ 正在打包 ZIP...';
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const formData = new FormData();
        formData.append('file', zipBlob, 'import.zip');

        statusDiv.textContent = '⏳ 正在上传并覆盖数据...';
        const res = await authFetch('/api/admin/import-data', {
            method: 'POST',
            body: formData
        });
        const result = await res.json();
        if (result.ok) {
            statusDiv.textContent = '✅ 导入成功！页面即将刷新。';
            setTimeout(() => location.reload(), 1500);
        } else {
            throw new Error(result.error || '导入失败');
        }
    } catch (e) {
        statusDiv.textContent = '❌ 导入失败：' + e.message;
        console.error(e);
    } finally {
        input.value = '';
    }
}

// ===== 生成随机字符串 =====
function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

// ===== 重置 RSA 密钥 =====
async function rotateRSAKey() {
    // 1. 二次确认：生成随机字符
    const randomStr = generateRandomString(8);
    const expectedPhrase = `我已下载明文数据，确定重置RSA密钥${randomStr}`;
    const userInput = prompt(
        `⚠️ 即将生成新 RSA 密钥对并替换服务器公钥！\n\n` +
        `此操作将导致所有用旧公钥加密的数据无法解密。\n` +
        `请确保您已通过「导出明文数据」功能备份了所有数据。\n\n` +
        `请输入以下确认短语以继续：\n\n` +
        `"${expectedPhrase}"\n\n` +
        `（输入后点击「确定」）`
    );

    if (userInput === null) return; // 用户取消
    if (userInput.trim() !== expectedPhrase) {
        alert('❌ 确认短语输入错误，操作已取消。');
        return;
    }

    // 2. 生成密钥对（使用 forge）
    try {
        // 检查 forge 是否加载
        if (typeof forge === 'undefined') {
            alert('❌ forge 库未加载，请刷新页面后重试。');
            return;
        }

        const keypair = forge.pki.rsa.generateKeyPair({ bits: 2048, workers: 2 });
        const privateKeyPem = forge.pki.privateKeyToPem(keypair.privateKey);
        const publicKeyPem = forge.pki.publicKeyToPem(keypair.publicKey);

        // 3. 下载私钥（RSA.txt）
        const blob = new Blob([privateKeyPem], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'RSA.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('✅ 私钥已下载为 RSA.txt，请妥善保管！');

        // 4. 上传公钥到服务器
        const uploadConfirm = confirm('公钥将上传至服务器，确认继续？');
        if (!uploadConfirm) return;

        const res = await authFetch('/api/admin/rotate-key', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ public_key: publicKeyPem })
        });

        const data = await res.json();
        if (data.ok) {
            alert('✅ RSA 公钥已更新成功！');
            // 可选择刷新页面或提示重新登录
            if (confirm('公钥已更换，建议重新登录以确保会话安全，是否现在刷新？')) {
                location.reload();
            }
        } else {
            alert('❌ 上传公钥失败：' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('❌ 生成或上传密钥失败：' + e.message);
        console.error(e);
    }
}
// ===== 重置 PQC 密钥 =====
async function rotatePQCKey() {
    const randomStr = generateRandomString(8);
    const expectedPhrase = `我已下载明文数据，确定重置PQC密钥${randomStr}`;
    const userInput = prompt(
        `⚠️ 即将生成新 Kyber-1024 密钥对并替换服务器 PQC 公钥！\n\n` +
        `此操作将导致所有用旧 PQC 公钥加密的数据无法解密。\n` +
        `请确保您已通过「导出明文数据」功能备份了所有数据。\n\n` +
        `请输入以下确认短语以继续：\n\n` +
        `"${expectedPhrase}"\n\n` +
        `（输入后点击「确定」）`
    );

    if (userInput === null) return;
    if (userInput.trim() !== expectedPhrase) {
        alert('❌ 确认短语输入错误，操作已取消。');
        return;
    }

    try {
        // 加载 Kyber 库
        const mod = await import('@noble/post-quantum/ml-kem');
        const ml_kem1024_local = mod.ml_kem1024;

        // 生成密钥对
        const keys = ml_kem1024_local.keygen();
        const privBytes = new Uint8Array(keys.secretKey);  // Kyber-1024 私钥 3168 字节
        const pubBytes = new Uint8Array(keys.publicKey);   // Kyber-1024 公钥 1568 字节

        const privB64 = btoa(String.fromCharCode(...privBytes));
        const pubB64 = btoa(String.fromCharCode(...pubBytes));

        // 下载私钥
        const blob = new Blob([privB64], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'PQC私钥.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('✅ PQC 私钥已下载为 PQC私钥.txt，请妥善保管！');

        // 上传公钥
        const uploadConfirm = confirm('PQC 公钥将上传至服务器，确认继续？');
        if (!uploadConfirm) return;

        const res = await authFetch('/api/admin/rotate-pqc-key', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ public_key: pubB64 })
        });

        const data = await res.json();
        if (data.ok) {
            alert('✅ PQC 公钥已更新成功！');
            if (confirm('公钥已更换，建议重新登录以确保会话安全，是否现在刷新？')) {
                location.reload();
            }
        } else {
            alert('❌ 上传 PQC 公钥失败：' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('❌ 生成或上传 PQC 密钥失败：' + e.message);
        console.error(e);
    }
}
