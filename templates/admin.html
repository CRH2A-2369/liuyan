<script>
  let pqcPrivateKeyBytes = null;      // PQC 私钥（Uint8Array）
  let rsaPrivateKeyPem = null;       // RSA 私钥字符串
  let ml_kem1024 = null;             // 懒加载
  const rawData = JSON.parse(document.getElementById('raw-data').textContent);
  let allReplies = [], jse = null, csrfToken = '';

  // 初始化 JSEncrypt
  try { jse = new JSEncrypt(); } catch(e) {}
  let dataJse = null;  // 独立的数据解密实例
  let dataKeyPromptShown = false;

  // 工具函数：获取 CSRF Token
  function getCsrfToken() {
    return csrfToken;
  }

  // 修复被浏览器压缩成单行的 PEM 私钥
  function normalizePemKey(rawKey) {
    let k = rawKey.trim();
    if (!k) return k;
    // 已经是多行，直接返回
    if (k.includes('\n') && k.includes('-----BEGIN')) return k;
    // 单行 PEM → 重建换行
    const h = k.match(/-----BEGIN [^-]+-----/);
    const f = k.match(/-----END [^-]+-----/);
    if (h && f) {
      const header = h[0];
      const footer = f[0];
      let body = k.slice(k.indexOf(header) + header.length, k.indexOf(footer)).replace(/\s+/g, '');
      body = body.match(/.{1,64}/g).join('\n');
      return header + '\n' + body + '\n' + footer;
    }
    return k;
  }
  // 解密 IP（支持 RSA 和 PQC）
  async function decryptIP(encrypted) {
    // ---- PQC 路径 ----
    if (encrypted && encrypted.startsWith('PQC:')) {
      if (!pqcPrivateKeyBytes) return '（PQC私钥未加载）';
      try {
        if (!ml_kem1024) {
          const mod = await import('@noble/post-quantum/ml-kem');
          ml_kem1024 = mod.ml_kem1024;
        }
        const b64 = encrypted.slice(4);
        const data = JSON.parse(atob(b64));
        const ct = Uint8Array.from(atob(data.ct), c => c.charCodeAt(0));
        const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
        const key = await crypto.subtle.digest('SHA-256', shared);
        const aesKey = new Uint8Array(key);
        const iv = Uint8Array.from(atob(data.iv), c => c.charCodeAt(0));
        const enc = Uint8Array.from(atob(data.enc), c => c.charCodeAt(0));
        const dec = await crypto.subtle.decrypt(
          { name: 'AES-CBC', iv: iv },
          await crypto.subtle.importKey('raw', aesKey, { name: 'AES-CBC' }, false, ['decrypt']),
          enc
        );
        // 去除 PKCS7 填充
        const decArr = new Uint8Array(dec);
        const padLen = decArr[decArr.length - 1];
        if (padLen > 0 && padLen <= 16) {
          return new TextDecoder().decode(decArr.slice(0, decArr.length - padLen));
        }
        return new TextDecoder().decode(decArr);
      } catch(e) {
        console.warn('PQC IP解密失败', e);
        return '（PQC解密失败）';
      }
    }

    // ---- RSA 路径（原有逻辑）----
    const tryDec = (jseInst) => {
      if (!jseInst || !jseInst.getPrivateKey()) return null;
      try {
        const raw = (encrypted && encrypted.startsWith('RSA:')
          ? encrypted.slice(4)
          : (encrypted || '')
        ).replace(/\s+/g, '');
        if (!raw) return null;
        return jseInst.decrypt(raw);
      } catch(e) { return null; }
    };

    // 先试登录私钥
    let dec = tryDec(jse);
    if (dec) return dec;

    // 再试独立数据私钥
    if (dataJse) {
      dec = tryDec(dataJse);
      if (dec) return dec;
    }

    return '（解密失败）';
  }

  async function promptDataKey() {
    if (dataKeyPromptShown) return false;
    dataKeyPromptShown = true;
    const input = prompt(
      '⚠️ IP数据解密失败，可能需要单独的数据解密私钥。\n\n' +
      '请粘贴用于解密IP/黑白名单数据的RSA私钥\n' +
      '（如与登录私钥相同请直接点取消）：'
    );
    if (!input || !input.trim()) {
      dataKeyPromptShown = false;
      return false;
    }
    const normalized = normalizePemKey(input);
    // 用黑/白名单第一条数据验证
    try {
      let testData = null;
      const blRes = await fetch('/api/blacklist');
      const blList = await blRes.json();
      if (blList.length > 0) testData = blList[0].encrypted;
      else {
        const wlRes = await fetch('/api/whitelist');
        const wlList = await wlRes.json();
        if (wlList.length > 0) testData = wlList[0].encrypted;
      }
      if (testData) {
        const testJse = new JSEncrypt();
        testJse.setPrivateKey(normalized);
        const raw = testData.replace(/\s+/g, '').replace(/^RSA:/, '');
        const testDec = testJse.decrypt(raw);
        if (testDec) {
          dataJse = testJse;
          sessionStorage.setItem('admin_data_key', normalized);
          alert('✅ 数据解密私钥设置成功！');
          return true;
        } else {
          alert('❌ 该私钥无法解密当前数据，请检查后重试。');
          dataKeyPromptShown = false;
          return false;
        }
      }
      dataKeyPromptShown = false;
      return false;
    } catch(e) {
      alert('❌ 验证失败：' + e.message);
      dataKeyPromptShown = false;
      return false;
    }
  }

  // ---------- 白名单 ----------
  async function loadWL() {
    const res = await fetch('/api/whitelist');
    const list = await res.json();
    const container = document.getElementById('wl-list');
    container.innerHTML = '';
    let failCount = 0;
    for (const item of list) {
      const plainIP = await decryptIP(item.encrypted);
      if (plainIP === '（解密失败）') failCount++;
      const div = document.createElement('div');
      div.className = 'bl-item';
      div.innerHTML = `
        <span>${plainIP}</span>
        <button class="bl-del" onclick="deleteIP('${item.hash}', 'white')">删除</button>
      `;
      container.appendChild(div);
    }

  function deriveKey(str) { return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString()); }
// ★ 新增：Web Crypto AES-CBC 加密（与 index.html v3 提交一致）
async function encryptAES(plaintext, keyBytes) {
    const iv = crypto.getRandomValues(new Uint8Array(16));
    const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-CBC' }, false, ['encrypt']);
    // ★ PKCS7 填充
    const plainBytes = new TextEncoder().encode(plaintext);
    const padLen = 16 - (plainBytes.length % 16);
    const padded = new Uint8Array(plainBytes.length + padLen);
    padded.set(plainBytes);
    padded.fill(padLen, plainBytes.length);
    const enc = await crypto.subtle.encrypt(
        { name: 'AES-CBC', iv: iv },
        cryptoKey,
        padded
    );
    return { iv: iv, ciphertext: new Uint8Array(enc) };
}
// ★★★ 新增：与前端一致的 SHA-256 身份哈希计算 ★★★
  async function calcIdentityHash(nick, aesKey) {
      const encoder = new TextEncoder();
      const data = encoder.encode(nick + '|' + aesKey);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function verify() {
    const rsaKey = document.getElementById('privKey').value.trim();
    const pqcKeyB64 = document.getElementById('pqcPrivKey').value.trim();
    if (!rsaKey || !pqcKeyB64) { alert('请同时输入RSA私钥和PQC私钥'); return; }

    if (!rsaKey.includes('BEGIN RSA PRIVATE KEY')) {
        document.getElementById('err').textContent = 'RSA私钥格式无效';
        return;
    }
    rsaPrivateKeyPem = rsaKey;
    jse.setPrivateKey(rsaKey);

    try {
        pqcPrivateKeyBytes = Uint8Array.from(atob(pqcKeyB64), c => c.charCodeAt(0));
    } catch (e) {
        document.getElementById('err').textContent = 'PQC私钥Base64解码失败';
        return;
    }

    try {
        const chalRes = await fetch('/api/admin/challenge', { credentials: 'same-origin' });
        if (!chalRes.ok) throw new Error('获取挑战失败');
        const chal = await chalRes.json();
        if (!chal.ciphertext) {
            document.getElementById('err').textContent = '挑战响应缺少 ciphertext';
            return;
        }

        const { ciphertext, iv, enc_nonce } = chal;
        const ct = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
        const ivBytes = Uint8Array.from(atob(iv), c => c.charCodeAt(0));
        const encNonce = Uint8Array.from(atob(enc_nonce), c => c.charCodeAt(0));

        console.log('ct 长度:', ct.length);
        console.log('ivBytes 长度:', ivBytes.length);
        console.log('encNonce 长度:', encNonce.length);

        // 加载 Kyber 库
        if (!ml_kem1024) {
            const mod = await import('@noble/post-quantum/ml-kem');
            ml_kem1024 = mod.ml_kem1024;
        }

        // 解封
        const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
        console.log('shared 长度:', shared.length);

        if (shared.length !== 32) {
            document.getElementById('err').textContent = 'PQC解封失败，共享密钥长度错误';
            return;
        }

        const sharedKey = await crypto.subtle.digest('SHA-256', shared);
        const aesKey = new Uint8Array(sharedKey);

        // 解密 nonce
        try {
            const decrypted = await crypto.subtle.decrypt(
                { name: 'AES-CBC', iv: ivBytes },
                await crypto.subtle.importKey('raw', aesKey, { name: 'AES-CBC' }, false, ['decrypt']),
                encNonce
            );
            const nonceBytes = new Uint8Array(decrypted);
            console.log('nonce 长度:', nonceBytes.length);
            const nonceHex = Array.from(nonceBytes).map(b => b.toString(16).padStart(2,'0')).join('');

            // 提交验证
            const verifyRes = await fetch('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                body: JSON.stringify({ nonce: nonceHex })
            });
            if (!verifyRes.ok) {
                const errText = await verifyRes.text();
                document.getElementById('err').textContent = errText || '验证失败';
                return;
            }
            // 登录成功
            sessionStorage.setItem('admin_has_key', 'true');
            sessionStorage.setItem('admin_priv_key', rsaKey);
            sessionStorage.setItem('admin_pqc_priv_key', pqcKeyB64);
            location.reload();
        } catch (decErr) {
            console.error('解密 nonce 失败:', decErr);
            document.getElementById('err').textContent = '解密挑战失败，请检查 PQC 私钥是否正确';
        }
    } catch (e) {
        document.getElementById('err').textContent = '验证出错: ' + e.message;
        console.error(e);
    }
}

async function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    if (!rawData.length) { list.innerHTML = '<p style="color:#888;text-align:center">暂无留言</p>'; return; }

    for (const m of rawData) {
        const isV3 = m.is_v3;
        const card = document.createElement('div');
        card.className = 'card';

        // 删除按钮
        const delBtn = document.createElement('button');
        delBtn.className = 'del';
        delBtn.textContent = '删除留言';
        delBtn.dataset.file = m.file;
        card.appendChild(delBtn);

        // 加密方式标签
        const tag = document.createElement('span');
        tag.style.cssText = 'display:inline-block;background:' + (isV3 ? '#9C27B0' : '#2196F3') + ';color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:8px;';
        tag.textContent = isV3 ? '🔐 PQC加密' : '🔐 RSA加密';
        card.appendChild(tag);

        let nick = '匿名', content = '解密失败', meta = '', rawAES = '';
        try {
            if (isV3) {
                // ---- PQC 解密 ----
                if (!pqcPrivateKeyBytes) throw new Error('PQC私钥未加载');
                if (!ml_kem1024) {
                    const mod = await import('@noble/post-quantum/ml-kem');
                    ml_kem1024 = mod.ml_kem1024;
                }

                // 1) 解封主密文获取共享密钥
                const ct = Uint8Array.from(atob(m.pqc_ciphertext), c => c.charCodeAt(0));
                const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                const sharedKey = await crypto.subtle.digest('SHA-256', shared);
                const aesKeyShared = new Uint8Array(sharedKey);

                // 2) 解密用户 AES 密钥
                const ivShared = Uint8Array.from(atob(m.iv_shared), c => c.charCodeAt(0));
                const encAESKeyBytes = Uint8Array.from(atob(m.encAESKey), c => c.charCodeAt(0));
                const decryptedKey = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv: ivShared },
                    await crypto.subtle.importKey('raw', aesKeyShared, { name: 'AES-CBC' }, false, ['decrypt']),
                    encAESKeyBytes
                );
                let userAESKeyArr = new Uint8Array(decryptedKey);
                const padLen = userAESKeyArr[userAESKeyArr.length - 1];
                if (padLen > 0 && padLen <= 16) {
                    userAESKeyArr = userAESKeyArr.slice(0, userAESKeyArr.length - padLen);
                }
                const userAESKey = userAESKeyArr;
                rawAES = new TextDecoder().decode(userAESKey);

                // 3) 解密内容 — 先 SHA-256 哈希用户密钥再解密
                const userAESKeyDigest = await crypto.subtle.digest('SHA-256', userAESKey);
                const ivContent = Uint8Array.from(atob(m.iv_content), c => c.charCodeAt(0));
                const encContentBytes = Uint8Array.from(atob(m.encContent), c => c.charCodeAt(0));
                const decContent = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv: ivContent },
                    await crypto.subtle.importKey('raw', new Uint8Array(userAESKeyDigest), { name: 'AES-CBC' }, false, ['decrypt']),
                    encContentBytes
                );
                const plain = new TextDecoder().decode(decContent);
                const sep = plain.indexOf(' | ');
                if (sep !== -1) { nick = plain.substring(0, sep).trim(); content = plain.substring(sep + 3).trim(); }
                else { content = plain; }

                // 4) 解密 IP 数据（如果存在）
                if (m.ip_data) {
                    const ipData = JSON.parse(m.ip_data);
                    const ctIp = Uint8Array.from(atob(ipData.ciphertext_ip), c => c.charCodeAt(0));
                    const sharedIp = ml_kem1024.decapsulate(ctIp, pqcPrivateKeyBytes);
                    const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                    const aesKeyIp = new Uint8Array(keyIp);
                    const ivIp = Uint8Array.from(atob(ipData.iv_ip), c => c.charCodeAt(0));
                    const encIpBytes = Uint8Array.from(atob(ipData.enc_ip), c => c.charCodeAt(0));
                    const decIp = await crypto.subtle.decrypt(
                        { name: 'AES-CBC', iv: ivIp },
                        await crypto.subtle.importKey('raw', aesKeyIp, { name: 'AES-CBC' }, false, ['decrypt']),
                        encIpBytes
                    );
                    // 去除 PKCS7 填充
                    let decIpArr = new Uint8Array(decIp);
                    const padLenIp = decIpArr[decIpArr.length - 1];
                    if (padLenIp > 0 && padLenIp <= 16) {
                        decIpArr = decIpArr.slice(0, decIpArr.length - padLenIp);
                    }
                    const ipPlain = new TextDecoder().decode(decIpArr);
                    meta = '🌐 ' + ipPlain;
                }
            } else if (m.is_v2) {
                // ---- v2 RSA 解密（原有逻辑） ----
                const parts = m.rsa_iv.split('|');
                const rk = parts[1] ? parts[1].replace(/\s+/g, '') : '';
                const ivStr = parts[2] ? parts[2].replace(/\s+/g, '') : '';
                const aesEnc = m.aes_msg ? m.aes_msg.replace(/\s+/g, '') : '';
                const serverEnc = m.server_enc ? m.server_enc.replace(/\s+/g, '') : '';
                rawAES = jse.decrypt(rk);
                if (!rawAES) throw new Error('RSA解密失败');
                const key32 = deriveKey(rawAES);
                const ivW = CryptoJS.enc.Base64.parse(ivStr);
                const plain = CryptoJS.AES.decrypt(aesEnc, key32, { iv: ivW, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }).toString(CryptoJS.enc.Utf8);
                if (!plain) throw new Error('AES解密失败');
                const p = plain.indexOf(' | ');
                if (p !== -1) { nick = plain.substring(0, p); content = plain.substring(p + 3); }
                else { content = plain; }
                if (serverEnc) {
                    const raw = serverEnc.startsWith('RSA:') ? serverEnc.slice(4) : serverEnc;
                    const sm = jse.decrypt(raw);
                    meta = sm ? '🌐🕒 ' + sm : '';
                }
            } else {
                // ---- 最旧格式兼容（非v2非v3）----
                const parts = m.rsa_iv.split('|');
                const rk = parts[0] ? parts[0].replace(/\s+/g, '') : '';
                const ivStr = (parts[1] || '').replace(/\s+/g, '');
                const metaEnc = (m.meta_enc || '').replace(/\s+/g, '');
                const contentEnc = (m.content_enc || '').replace(/\s+/g, '');
                rawAES = jse.decrypt(rk);
                if (!rawAES) throw new Error('RSA解密失败');
                const key32 = deriveKey(rawAES);
                const ivW = CryptoJS.enc.Base64.parse(ivStr);
                const opts = { iv: ivW, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 };
                const metaPlain = CryptoJS.AES.decrypt(metaEnc, key32, opts).toString(CryptoJS.enc.Utf8);
                if (metaPlain) {
                    meta = '📦 ' + metaPlain;
                    const mp = metaPlain.split(' | ');
                    nick = mp[2] || '匿名';
                }
                content = CryptoJS.AES.decrypt(contentEnc, key32, opts).toString(CryptoJS.enc.Utf8) || '解密失败';
            }
        } catch(e) {
            console.warn(`[留言${m.seq}]`, e.message);
            content = '❌ 解密失败: ' + e.message;
            meta = '';
        }

        // --- 构建 UI（与原有相同）---
        const metaDiv = document.createElement('div');
        metaDiv.className = 'meta';
        metaDiv.textContent = meta || '无元数据';
        card.appendChild(metaDiv);

        const keySpan = document.createElement('span');
        keySpan.className = 'key-display';
        keySpan.textContent = '🔑 密钥: ' + (rawAES || '解密失败');
        card.appendChild(keySpan);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'md-content';
        contentDiv.style.cssText = 'margin:4px 0 0;word-break:break-all';
        contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
        card.appendChild(contentDiv);

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '复制原文';
        copyBtn.dataset.copy = content;
        card.appendChild(copyBtn);

        // --- 显示回复（原有逻辑，回复用RSA加密，仍用jse）---
        const reps = allReplies.filter(r => r.seq == m.seq);
        reps.sort((a, b) => (a.num || 1) - (b.num || 1));
        for (const rep of reps) {
            try {
                const rKey = deriveKey(rawAES);
                const rTxt = CryptoJS.AES.decrypt(
                    rep.aes_msg.replace(/\s+/g, ''),
                    rKey,
                    { iv: CryptoJS.enc.Base64.parse(rep.iv.replace(/\s+/g, '')), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
                ).toString(CryptoJS.enc.Utf8);
                if (rTxt) {
                    const p = rTxt.split(' | ');
                    const replyBox = document.createElement('div');
                    replyBox.className = 'reply-box';
                    const rDelBtn = document.createElement('button');
                    rDelBtn.className = 'reply-del';
                    rDelBtn.textContent = '删除回复';
                    rDelBtn.dataset.file = `回复_${m.seq}_${rep.num || 1}.txt`;
                    replyBox.appendChild(rDelBtn);
                    const rMeta = document.createElement('div');
                    rMeta.className = 'reply-meta';
                    rMeta.textContent = `📝 回复 #${rep.num || 1} ${p[0]} | 🕒 ${p[1] || ''}`;
                    replyBox.appendChild(rMeta);
                    const rContent = document.createElement('div');
                    rContent.className = 'md-content';
                    rContent.style.margin = '0';
                    rContent.innerHTML = DOMPurify.sanitize(marked.parse(p.slice(2).join(' | ')));
                    replyBox.appendChild(rContent);
                    const rCopyBtn = document.createElement('button');
                    rCopyBtn.className = 'copy-btn';
                    rCopyBtn.textContent = '复制回复';
                    rCopyBtn.dataset.copy = p.slice(2).join(' | ');
                    replyBox.appendChild(rCopyBtn);
                    card.appendChild(replyBox);
                }
            } catch(e) { console.warn(`[回复${m.seq}#${rep.num}]`, e.message); }
        }

        // 回复按钮
        const replyBtn = document.createElement('button');
        replyBtn.className = 'reply-btn';
        replyBtn.textContent = '回复';
        replyBtn.dataset.seq = m.seq;
        replyBtn.dataset.nick = nick;
        replyBtn.dataset.key = rawAES;
        card.appendChild(replyBtn);

        list.appendChild(card);
    }

    // 事件绑定（删除、回复等）
    list.onclick = e => {
        const t = e.target;
        if (t.matches('.del')) { if(confirm('确定？')) authFetch(`/admin/delete/${t.dataset.file}`, {method:'POST'}).then(()=>location.reload()); }
        if (t.matches('.reply-btn')) { openReply(t.dataset.seq, t.dataset.nick, t.dataset.key); }

                authFetch(`/admin/delete_reply_file/${t.dataset.file}`, { method: 'POST' }).then(() => location.reload());
            }
        }
    };
}

      let filename = 'backup.zip';

function base64ToBytes(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
  return bytes;
}

// ===== 解密单条 v2 留言 =====
function decryptV2Message(lines) {
    if (!lines || lines.length < 2) return null;
    const first = lines[0].trim();
    if (!first.startsWith('v2|')) return null;
    const parts = first.split('|');
    if (parts.length < 3) return null;
    const rsaKey = parts[1];
    const ivBase64 = parts[2];
    const aesMsg = lines[1].trim();
    if (!rsaKey || !ivBase64 || !aesMsg) return null;
    try {
        const rawAES = jse.decrypt(rsaKey);
        if (!rawAES) return null;
        const key32 = deriveKey(rawAES);
        const iv = CryptoJS.enc.Base64.parse(ivBase64);
        const plain = CryptoJS.AES.decrypt(aesMsg, key32, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
        }).toString(CryptoJS.enc.Utf8);
        if (!plain) return null;
        const sep = plain.indexOf(' | ');
        if (sep === -1) return { nick: '匿名', content: plain };
        return {
            nick: plain.substring(0, sep).trim(),
            content: plain.substring(sep + 3).trim()
        };
    } catch (e) {
        console.warn('解密失败', e);
        return null;
    }
}

// ===== 导出明文数据（完整版，包含所有原始 IP 和时间明文，含黑白名单、人机验证配置） =====
async function exportPlainData(categories) {
    const confirmText = prompt('请输入 "确认导出已选择的明文数据" 以继续：');
    if (confirmText !== '确认导出已选择的明文数据') {
        alert('操作已取消');
        return;
    }
    const statusDiv = document.getElementById('plain-status');
        const exportErrors = [];
        const addExportError = (msg) => { exportErrors.push(msg); statusDiv.textContent = '⚠️ ' + msg; };
    statusDiv.style.display = 'block';
    statusDiv.textContent = '⏳ 正在获取数据...';
    try {
        const res = await authFetch('/api/admin/export-data');
        if (!res.ok) throw new Error('获取导出数据失败');
        const zipBlob = await res.blob();
        statusDiv.textContent = '⏳ 正在解压并解密数据...';
        const zip = await JSZip.loadAsync(zipBlob);

        let result = {
            messages: [],      // 留言 { nick, content, ip, time }
            votes: {},         // 投票 { poll_id: { config, votes: [ { seq, content, rawAES, key_hash, iv, ip, time } ] } }
            notices: [],       // 公告 { content, time, pinned }
            chat_qun: [],      // 群聊 { nick, time, content, state, pinned, ip }
            chat_private: [],  // 私聊 { filename, sender_pub, iv, expire_at, wrapped_key, aes_content, ip, time }
            chat_reports: [],  // 群聊举报
            ip_records: [],    // IP 记录 { date, ip, count }
            captcha_logs: [],  // 验证日志 { ip, verified_time, expiry_time }
            configs: {},       // 配置文件 { under, permission, rule, threshold, retention }
            blacklist: [],     // 黑名单 { hash, ip }
            whitelist: [],     // 白名单 { hash, ip }
            captcha_config: null,   // captcha/config.json
            captcha_verified: null  // captcha/verified.json
        };

        // 解密辅助：支持 RSA 和 PQC
        const tryDecrypt = async (enc) => {
            if (!enc) return enc;
            // PQC 路径
            if (enc.startsWith('PQC:')) {
                if (!pqcPrivateKeyBytes) return null;
                try {
                    if (!ml_kem1024) {
                        const mod = await import('@noble/post-quantum/ml-kem');
                        ml_kem1024 = mod.ml_kem1024;
                    }
                    const b64 = enc.slice(4);
                    const pqcData = JSON.parse(atob(b64));
                    const ct = Uint8Array.from(atob(pqcData.ct), c => c.charCodeAt(0));
                    const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                    const key = await crypto.subtle.digest('SHA-256', shared);
                    const aesKey = new Uint8Array(key);
                    const iv = Uint8Array.from(atob(pqcData.iv), c => c.charCodeAt(0));
                    const encBytes = Uint8Array.from(atob(pqcData.enc), c => c.charCodeAt(0));
                    const dec = await crypto.subtle.decrypt(
                        { name: 'AES-CBC', iv: iv },
                        await crypto.subtle.importKey('raw', aesKey, { name: 'AES-CBC' }, false, ['decrypt']),
                        encBytes
                    );
                    const decArr = new Uint8Array(dec);
                    const padLen = decArr[decArr.length - 1];
                    if (padLen > 0 && padLen <= 16) {
                        return new TextDecoder().decode(decArr.slice(0, decArr.length - padLen));
                    }
                    return new TextDecoder().decode(decArr);
                } catch(e) { return null; }
            }
            // RSA 路径
            if (!enc.startsWith('RSA:')) return enc;
            const raw = enc.slice(4).replace(/\s+/g, '');
            if (jse && jse.getPrivateKey()) {
                try { const d = jse.decrypt(raw); if (d) return d; } catch(e) {}
            }
            if (dataJse && dataJse.getPrivateKey()) {
                try { const d = dataJse.decrypt(raw); if (d) return d; } catch(e) {}
            }
            return null;
        };

        const getFileContent = async (path) => {
            if (zip.files[path] && !zip.files[path].dir) {
                return await zip.files[path].async('string');
            }
            return null;
        };

        // ---- 配置文件 ----
        const configFiles = [
            { key: 'under', path: 'under.txt' },
            { key: 'permission', path: '群/permission.txt' },
            { key: 'rule', path: '群/rule.txt' },
            { key: 'threshold', path: '群/threshold.txt' },
            { key: 'retention', path: 'chat/retention_hours.txt' }
        ];
        for (const { key, path } of configFiles) {
            const content = await getFileContent(path);
            if (content !== null) result.configs[key] = content.trim();
        }

        // ---- 黑白名单 ----
        for (const [key, filename] of [['blacklist', 'black.txt'], ['whitelist', 'white.txt']]) {
            const content = await getFileContent(filename);
            if (content !== null) {
                const lines = content.split('\n').filter(l => l.trim());
                const list = [];
                for (const line of lines) {
                    const parts = line.split('|');
                    if (parts.length >= 2) {
                        const hash = parts[0].trim();
                        const encIp = parts[1].trim();
                        let ip = encIp;
                        const dec = await tryDecrypt(encIp);
                        if (dec) ip = dec;
                        list.push({ hash, ip });
                    }
                }
                result[key] = list;
            }
        }

        // ---- 人机验证配置 ----
        const captchaConfigRaw = await getFileContent('captcha/config.json');
        if (captchaConfigRaw) {
            try {
                result.captcha_config = JSON.parse(captchaConfigRaw);
            } catch (e) {}
        }

        // ---- 人机验证已验证IP ----
        const captchaVerifiedRaw = await getFileContent('captcha/verified.json');
        if (captchaVerifiedRaw) {
            try {
                result.captcha_verified = JSON.parse(captchaVerifiedRaw);
            } catch (e) {}
        }

        // ★ 收集留言 seq → rawAES 映射（供回复解密使用）
        const seqRawAESMap = {};
        // ---- 留言 ----
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            if (path.match(/^留言\/留言_\d+\.txt$/)) {
                const content = await file.async('string');
                const lines = content.split('\n').filter(l => l.trim());
                if (lines.length < 3) continue;
                const first = lines[0];
              if (first.startsWith('v3|')) {
                  const parts = first.split('|');
                  // 服务端格式: v3|sender_pub|iv|expire_at (第0行, 4部分)
                  // 第4行: pqc_ciphertext, 第5行: iv_shared, 第6行: iv_content
                  // 第7行: encAESKey, 第8行: encContent, 第9行: sender_pqc_pub
                  if (!pqcPrivateKeyBytes) continue;
                  if (!ml_kem1024) {
                      const mod = await import('@noble/post-quantum/ml-kem');
                      ml_kem1024 = mod.ml_kem1024;
                  }
                  if (parts.length < 4) continue;
                  if (lines.length < 10) continue;
                  const senderPub = parts[1] || '';
                  const iv = parts[2] || '';
                  const expireAt = parts[3] || '';
                  const pqcCiphertextB64 = (lines[4] || '').trim();
                  const ivSharedB64 = (lines[5] || '').trim();
                  const ivContentB64 = (lines[6] || '').trim();
                  const encAESKeyB64 = (lines[7] || '').trim();
                  const encContentB64 = (lines[8] || '').trim();
                  const senderPqcPub = (lines[9] || '').trim();
                  if (!pqcCiphertextB64 || !encAESKeyB64 || !encContentB64) continue;
                    try {
                        // 1) 解封 PQC 主密文
                        const ct = Uint8Array.from(atob(pqcCiphertextB64), c => c.charCodeAt(0));
                        const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                        // ★ 层1密钥 = SHA-256(shared)，与 chat.html / index.html v3 一致
                        const sharedKey = await crypto.subtle.digest('SHA-256', shared);
                        const aesKeyShared = new Uint8Array(sharedKey);

                        // 2) 用共享密钥解密用户 AES 密钥
                        const ivShared = Uint8Array.from(atob(ivSharedB64), c => c.charCodeAt(0));
                        const encAESKeyBytes = Uint8Array.from(atob(encAESKeyB64), c => c.charCodeAt(0));
                        const decKey = await crypto.subtle.decrypt(
                            { name: 'AES-CBC', iv: ivShared },
                            await crypto.subtle.importKey('raw', aesKeyShared, { name: 'AES-CBC' }, false, ['decrypt']),
                            encAESKeyBytes
                        );
                        // 移除 PKCS7 填充
                        let decKeyArr = new Uint8Array(decKey);
                        const padLenK = decKeyArr[decKeyArr.length - 1];
                        if (padLenK > 0 && padLenK <= 16) {
                            decKeyArr = decKeyArr.slice(0, decKeyArr.length - padLenK);
                        }
                        const rawAES = new TextDecoder().decode(decKeyArr);
                        const userAESKeyDigest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(rawAES));

                        // 3) 用用户 AES 密钥解密内容
                        const ivContent = Uint8Array.from(atob(ivContentB64), c => c.charCodeAt(0));
                        const encContentBytes = Uint8Array.from(atob(encContentB64), c => c.charCodeAt(0));
                        const decContent = await crypto.subtle.decrypt(
                            { name: 'AES-CBC', iv: ivContent },
                            await crypto.subtle.importKey('raw', new Uint8Array(userAESKeyDigest), { name: 'AES-CBC' }, false, ['decrypt']),
                            encContentBytes
                        );
                        // 移除 PKCS7 填充
                        let decContentArr2 = new Uint8Array(decContent);
                        const padLenC2 = decContentArr2[decContentArr2.length - 1];
                        if (padLenC2 > 0 && padLenC2 <= 16) {
                            decContentArr2 = decContentArr2.slice(0, decContentArr2.length - padLenC2);
                        }
                        const plain = new TextDecoder().decode(decContentArr2);

                        // 分离昵称和内容
                        let nick = '匿名', contentText = plain;
                        const sep = plain.indexOf(' | ');
                        if (sep !== -1) {
                            nick = plain.substring(0, sep).trim();
                            contentText = plain.substring(sep + 3).trim();
                        }

                        // 4) 解密 IP 数据（第二行 JSON）
                        let ip = '127.0.0.1', time = '';
                        if (lines.length >= 4) {
                            try {
                                const ipData = JSON.parse(lines[3]);
                                const ctIp = Uint8Array.from(atob(ipData.ciphertext_ip), c => c.charCodeAt(0));
                                const sharedIp = ml_kem1024.decapsulate(ctIp, pqcPrivateKeyBytes);
                                const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                                const aesKeyIp = new Uint8Array(keyIp);
                                const ivIp = Uint8Array.from(atob(ipData.iv_ip), c => c.charCodeAt(0));
                                const encIpBytes = Uint8Array.from(atob(ipData.enc_ip), c => c.charCodeAt(0));
                                const decIp = await crypto.subtle.decrypt(
                                    { name: 'AES-CBC', iv: ivIp },
                                    await crypto.subtle.importKey('raw', aesKeyIp, { name: 'AES-CBC' }, false, ['decrypt']),
                                    encIpBytes
                                );
                                // 移除 PKCS7 填充
                                let decIpArr2 = new Uint8Array(decIp);
                                const padLenIp2 = decIpArr2[decIpArr2.length - 1];
                                if (padLenIp2 > 0 && padLenIp2 <= 16) {
                                    decIpArr2 = decIpArr2.slice(0, decIpArr2.length - padLenIp2);
                                }
                                const ipPlain = new TextDecoder().decode(decIpArr2);
                                const ipParts = ipPlain.split(' | ');
                                if (ipParts.length >= 2) {
                                    ip = ipParts[0];
                                    time = ipParts[1];
                                } else {
                                    ip = ipPlain;
                                }
                            } catch(e) { addExportError('v3 留言 IP 解密失败: ' + e.message); }
                        }

                        const msgSeq = parseInt(path.match(/留言_(\d+)\.txt$/)[1], 10);
                        seqRawAESMap[msgSeq] = rawAES;

                        result.messages.push({
                            seq: parseInt(path.match(/留言_(\d+)\.txt$/)[1], 10),
                            version: 'v3',
                            nick, content: contentText, ip, time,
                            rawAES: rawAES
                        });
                    } catch(e) {
                        addExportError('v3 留言解密失败: ' + e.message);
                    }
                } else if (first.startsWith('v2|')) {
                    // ========== RSA v2 解密（原有逻辑，增加 rawAES 和 version 导出）==========
                    const parts = first.split('|');
                    const rsaKey = parts[1];
                    const iv = parts[2];
                    const serverTime = parts[3] || '';
                    const aesMsg = lines[1];
                    const serverEnc = lines[2] || '';

                    // 解密 server_enc 获取 IP 和时间
                    let ip = '127.0.0.1', time = serverTime;
                    if (serverEnc) {
                        const raw = serverEnc.startsWith('RSA:') ? serverEnc.slice(4) : serverEnc;
                        try {
                            const dec = jse.decrypt(raw);
                            if (dec) {
                                const parts2 = dec.split(' | ');
                                if (parts2.length >= 2) {
                                    ip = parts2[0];
                                    time = parts2[1];
                                }
                            }
                        } catch(e) {}
                    }

                    // 解密内容
                    let nick = '匿名', contentText = '（解密失败）', rawAES = '';
                    try {
                        rawAES = jse.decrypt(rsaKey);
                        if (rawAES) {
                            const key32 = deriveKey(rawAES);
                            const ivW = CryptoJS.enc.Base64.parse(iv);
                            const plain = CryptoJS.AES.decrypt(aesMsg, key32, {
                                iv: ivW, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                            }).toString(CryptoJS.enc.Utf8);
                            if (plain) {
                                const sep = plain.indexOf(' | ');
                                if (sep !== -1) {
                                    nick = plain.substring(0, sep).trim();
                                    contentText = plain.substring(sep + 3).trim();
                                } else {
                                    contentText = plain;
                                }
                            }
                        }
                    } catch(e) {}
                    // 跳过解密失败的消息，否则导入时 rawAES 为空会导致垃圾数据
                    if (!rawAES) {
                        addExportError('v2 留言解密失败，跳过: ' + path);
                        continue;
                    }
                    const msgSeq2 = parseInt(path.match(/留言_(\d+)\.txt$/)[1], 10);
                    seqRawAESMap[msgSeq2] = rawAES;
                    result.messages.push({
                        seq: parseInt(path.match(/留言_(\d+)\.txt$/)[1], 10),
                        version: 'v2',
                        nick, content: contentText, ip, time,
                        rawAES: rawAES
                    });
                }
                }
       }

        // ---- 回复（留言的回复） ----
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            const replyMatch = path.match(/^回复\/回复_(\d+)_(\d+)\.txt$/);
            if (!replyMatch) continue;
            const replySeq = parseInt(replyMatch[1], 10);
            const replyNum = parseInt(replyMatch[2], 10);
            const rawAES = seqRawAESMap[replySeq];
            if (!rawAES) {
                addExportError('回复缺少 rawAES，跳过: ' + path);
                continue;
            }
            try {
                const content = await file.async('string');
                const lines = content.split('\n').filter(l => l.trim());
                if (lines.length < 2) continue;
                const ivB64 = lines[0].trim();
                const aesMsg = lines[1].trim();
                const key32 = deriveKey(rawAES);
                const iv = CryptoJS.enc.Base64.parse(ivB64);
                const plain = CryptoJS.AES.decrypt(aesMsg, key32, {
                    iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                }).toString(CryptoJS.enc.Utf8);
                if (plain) {
                    const targetMsg = result.messages.find(m => m.seq === replySeq);
                    if (targetMsg) {
                        if (!targetMsg.replies) targetMsg.replies = [];
                        targetMsg.replies.push({
                            num: replyNum,
                            iv: ivB64,
                            aes_msg: aesMsg,
                            plain: plain
                        });
                    }
                }
            } catch(e) {
                addExportError('回复解密失败: ' + path + ' - ' + e.message);
            }
        }

        // ---- 投票（支持 v2 和 v3） ----
        // 1. 收集所有投票目录中的文件
        const voteDirs = {};
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            const match = path.match(/^vote_data\/([^/]+)\/(.+)$/);

            if (files['config.json']) {
                try {
                    const raw = await files['config.json'].async('string');
                    config = JSON.parse(raw);
                } catch (e) {
                    addExportError('投票配置解析失败: ' + pollId);
                }
            }

            const votes = [];
            // 遍历该投票下的所有投票记录文件（投票_序号.txt）
            for (const [fname, file] of Object.entries(files)) {
                if (!fname.match(/^投票_\d+\.txt$/)) continue;
                const seq = parseInt(fname.match(/\d+/)[0], 10);
                const content = await file.async('string');
                const lines = content.split('\n').filter(l => l.trim());
                if (lines.length < 6) continue;  // 最少需要 6 行
                const first = lines[0];

                // ---------- v2 格式（RSA 加密） ----------
                if (first.startsWith('v2|')) {
                    const parts = first.split('|');
                    // 格式: v2|rsa_key|iv
                    const rsaKey = parts[1] || '';
                    const iv = parts[2] || '';
                    const aesMsg = lines[1] || '';           // AES 加密的投票内容
                    const serverEnc = lines[2] || '';        // RSA 加密的 IP|时间
                    const editToken = lines[3] || '';
                    const keyHash = lines[4] || '';

                    // 解密 server_enc 获取 IP 和时间（使用管理员 RSA 私钥）
                    let ip = '127.0.0.1', time = '';
                    if (serverEnc) {
                        const raw = serverEnc.startsWith('RSA:') ? serverEnc.slice(4) : serverEnc;
                        try {
                            const dec = jse.decrypt(raw);
                            if (dec) {
                                const parts2 = dec.split(' | ');
                                if (parts2.length >= 2) {
                                    ip = parts2[0];
                                    time = parts2[1];
                                }
                            }
                        } catch (e) {}
                    }

                    // 解密投票内容（用 RSA 解密得到的 AES 密钥）
                    let contentText = '（解密失败）', rawAES = '';
                    try {
                        rawAES = jse.decrypt(rsaKey);
                        if (rawAES) {
                            const key32 = deriveKey(rawAES);
                            const ivW = CryptoJS.enc.Base64.parse(iv);
                            const plain = CryptoJS.AES.decrypt(aesMsg, key32, {
                                iv: ivW,
                                mode: CryptoJS.mode.CBC,
                                padding: CryptoJS.pad.Pkcs7
                            }).toString(CryptoJS.enc.Utf8);
                            if (plain) {
                                // 格式: "投票者 | 选项内容"
                                const sep = plain.indexOf(' | ');
                                if (sep !== -1) {
                                    contentText = plain.substring(sep + 3).trim();
                                } else {
                                    contentText = plain;
                                }
                            }
                        }
                    } catch (e) {
                        addExportError('v2 投票解密失败: ' + pollId + ' #' + seq + ' - ' + e.message);
                    }
                    // 跳过解密失败的数据（rawAES 为空则无法重新加密）
                    if (!rawAES) continue;

                    // 解密备注 (line 5: remark_iv|remark_aes_msg)
                    let remark = '';
                    const remarkLine = (lines[5] || '').trim();
                    if (remarkLine && remarkLine !== '|' && rawAES) {
                        const rParts = remarkLine.split('|');
                        if (rParts.length >= 2 && rParts[0] && rParts[1]) {
                            try {
                                const rKey32 = deriveKey(rawAES);
                                const rIv = CryptoJS.enc.Base64.parse(rParts[0].replace(/\s+/g, ''));
                                const rDec = CryptoJS.AES.decrypt(rParts[1].replace(/\s+/g, ''), rKey32, {
                                    iv: rIv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
                                }).toString(CryptoJS.enc.Utf8);
                                if (rDec) remark = rDec;
                            } catch(e) {}
                        }
                    }

                    votes.push({
                        seq,
                        content: contentText,
                        rawAES: rawAES,
                        key_hash: keyHash,
                        iv: iv,
                        ip: ip,
                        time: time,
                        version: 'v2',
                        remark: remark
                    });
                }
                // ---------- v3 格式（PQC 加密） ----------
                else if (first.startsWith('v3|')) {
                    // ★ 不用 filter，保留空行，但去掉末尾空行
                    const rawLines = content.split('\n');
                    while (rawLines.length > 0 && rawLines[rawLines.length - 1].trim() === '') {
                        rawLines.pop();
                    }
                    const _l = (i) => (i < rawLines.length ? rawLines[i] : '').trim();
                    if (rawLines.length < 6) continue;
                    const v3parts = _l(0).split('|');
                    const rsaKeyEnc = v3parts[1] || '';
                    const aesIvB64 = v3parts[2] || '';
                    const serverTimeHdr = v3parts[3] || '';
                    const serverEnc = _l(2);
                    const pqcCiphertextB64 = rawLines.length >= 7 ? _l(6) : '';
                    const ivSharedB64 = rawLines.length >= 8 ? _l(7) : '';
                    const ivContentB64 = rawLines.length >= 9 ? _l(8) : '';
                    const encAESKeyB64 = rawLines.length >= 10 ? _l(9) : '';
                    const encContentB64 = rawLines.length >= 11 ? _l(10) : '';

                    let decrypted = false;

                    // ---- 路径 A：RSA 回退优先（更可靠）----
                    if (!decrypted && rsaKeyEnc && jse && jse.getPrivateKey()) {
                        try {
                            const rawAES = jse.decrypt(rsaKeyEnc);
                            if (rawAES) {
                                const key32 = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(rawAES).toString());
                                const plain = CryptoJS.AES.decrypt(_l(1), key32, {
                                    iv: CryptoJS.enc.Base64.parse(aesIvB64),
                                    mode: CryptoJS.mode.CBC,
                                    padding: CryptoJS.pad.Pkcs7
                                }).toString(CryptoJS.enc.Utf8);
                                if (plain) {
                                    let contentText = plain;
                                    const sepIdx = plain.indexOf(' | ');
                                    if (sepIdx !== -1) { contentText = plain.substring(sepIdx + 3).trim(); }

                                    let ip = '127.0.0.1', time = serverTimeHdr;
                                    if (serverEnc) {
                                        try {
                                            const raw = serverEnc.startsWith('RSA:') ? serverEnc.slice(4) : serverEnc;
                                            const dec = jse.decrypt(raw);
                                            if (dec) {
                                                const parts2 = dec.split(' | ');
                                                if (parts2.length >= 2) { ip = parts2[0]; time = parts2[1]; }
                                            }
                                        } catch(e) {}
                                    }

                                    let remark = '';
                                    const remarkLine = _l(5);
                                    if (remarkLine && remarkLine !== '|' && rawAES) {
                                        const rParts = remarkLine.split('|');
                                        if (rParts.length >= 2 && rParts[0] && rParts[1]) {
                                            try {
                                                const rKey32 = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(rawAES).toString());
                                                const rDec = CryptoJS.AES.decrypt(rParts[1].replace(/\s+/g, ''), rKey32, {
                                                    iv: CryptoJS.enc.Base64.parse(rParts[0].replace(/\s+/g, '')),
                                                    mode: CryptoJS.mode.CBC,
                                                    padding: CryptoJS.pad.Pkcs7
                                                }).toString(CryptoJS.enc.Utf8);
                                                if (rDec) remark = rDec;
                                            } catch(e) {}
                                        }
                                    }

                                    votes.push({
                                        seq, content: contentText, rawAES, key_hash: _l(4),
                                        iv: aesIvB64, ip, time, version: 'v3', remark
                                    });
                                    decrypted = true;
                                }
                            }
                        } catch(rsaErr) {
                            // RSA 失败，继续尝试 PQC
                        }
                    }

                    // ---- 路径 B：PQC 双层解密 ----
                    if (!decrypted && pqcPrivateKeyBytes && ml_kem1024 && encAESKeyB64 && encContentB64) {
                        try {
                            const ct = Uint8Array.from(atob(pqcCiphertextB64), c => c.charCodeAt(0));
                            const shared = ml_kem1024.decapsulate(ct, pqcPrivateKeyBytes);
                            const sharedWa = CryptoJS.lib.WordArray.create(shared);
                            const layer1Key = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(sharedWa).toString().substring(0, 64));

                            const layer2KeyB64 = CryptoJS.AES.decrypt(encAESKeyB64, layer1Key, {
                                iv: CryptoJS.enc.Base64.parse(ivSharedB64),
                                mode: CryptoJS.mode.CBC,
                                padding: CryptoJS.pad.Pkcs7
                            }).toString(CryptoJS.enc.Utf8);
                            const layer2Key = CryptoJS.enc.Base64.parse(layer2KeyB64);

                            const plain = CryptoJS.AES.decrypt(encContentB64, layer2Key, {
                                iv: CryptoJS.enc.Base64.parse(ivContentB64),
                                mode: CryptoJS.mode.CBC,
                                padding: CryptoJS.pad.Pkcs7
                            }).toString(CryptoJS.enc.Utf8);

                            let payload = {};
                            try { payload = JSON.parse(plain); } catch(e) {}
                            const rawAES = payload.key || '';
                            const voteContent = payload.vote || plain;
                            const remark = payload.remark || '';

                            let contentText = voteContent;
                            const sepIdx = voteContent.indexOf(' | ');
                            if (sepIdx !== -1) { contentText = voteContent.substring(sepIdx + 3).trim(); }

                            let ip = '127.0.0.1', time = serverTimeHdr;
                            if (serverEnc && jse && jse.getPrivateKey()) {
                                try {
                                    const raw = serverEnc.startsWith('RSA:') ? serverEnc.slice(4) : serverEnc;
                                    const dec = jse.decrypt(raw);
                                    if (dec) {
                                        const parts2 = dec.split(' | ');
                                        if (parts2.length >= 2) { ip = parts2[0]; time = parts2[1]; }
                                    }
                                } catch(e) {}
                            }

                            votes.push({
                                seq, content: contentText, rawAES, key_hash: _l(4),
                                iv: aesIvB64, ip, time, version: 'v3', remark
                            });
                            decrypted = true;
                        } catch(pqcErr) {
                            // PQC 也失败，记录
                        }
                    }

                    if (!decrypted) {
                        const hasPqcData = !!(encAESKeyB64 && encContentB64);
                        const hasRsa = !!(rsaKeyEnc && jse && jse.getPrivateKey());
                        addExportError('v3投票解密失败: ' + pollId + ' #' + seq
                            + ' (RSA' + (hasRsa ? '已尝试' : '不可用') + ', PQC' + (hasPqcData ? '已尝试' : '无数据') + ')');
                    }
                }
            }

            // 将解密后的投票数据存入结果对象
            result.votes[pollId] = { config, votes };
        } // end for voteDirs

        // ---- 公告 ----
        const noticeRaw = await getFileContent('notice_data.json');
        if (noticeRaw) {
            try {
                const notices = JSON.parse(noticeRaw);
                result.notices = notices.map(n => ({
                    content: n.content,
                    time: n.time,
                    pinned: n.pinned || false
                }));
            } catch (e) {}
        }

        // ---- 群聊 ----
        const chatRaw = await getFileContent('chat_data.json');
        if (chatRaw) {
            try {
                const chat = JSON.parse(chatRaw);
                const chatResult = [];
                for (const m of chat) {
                    let ip = '127.0.0.1';
                    const rawIp = m.ip || '';
                    if (rawIp && rawIp.startsWith('PQC:')) {
                        try {
                            const dec = await tryDecrypt(rawIp);
                            if (dec) ip = dec;
                        } catch (e) {}
                    } else if (rawIp && rawIp.startsWith('RSA:')) {
                        try {
                            const dec = jse.decrypt(rawIp.slice(4));
                            if (dec) ip = dec;
                        } catch (e) {}
                    } else if (rawIp && rawIp.startsWith('PLAIN:')) {
                        ip = rawIp.slice(6);
                    } else if (rawIp) {
                        ip = rawIp;
                    }
                    chatResult.push({
                        nick: m.nick,
                        time: m.time,
                        content: m.content,
                        state: m.state || 'enabled',
                        pinned: m.pinned || false,
                        ip: ip
                    });
                }
                result.chat_qun = chatResult;
            } catch (e) {}
        }

        // ---- 私聊（支持 v2 和 v3） ----
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            const match = path.match(/^chat\/([a-f0-9]{16}_\d{4}\.txt)$/);
            if (!match) continue;
            const filename = match[1];
            const content = await file.async('string');
            const lines = content.split('\n').filter(l => l.trim());
            if (lines.length < 4) continue;
            const first = lines[0];

            // ---------- v2 RSA 加密 ----------
            if (first.startsWith('v2|')) {
                const parts = first.split('|');
                const senderPub = parts[1] || '';
                const iv = parts[2] || '';
                const expireAt = parts[3] || '';
                const wrappedKey = lines[1] || '';
                const aesContent = lines[2] || '';
                const adminLine = lines[3] || '';
                const adminParts = adminLine.split('|', 2);
                const adminIpEnc = adminParts[0] || '';
                const serverTime = adminParts[1] || '';
                let ip = adminIpEnc;
                if (adminIpEnc.startsWith('RSA:')) {
                    try { const dec = jse.decrypt(adminIpEnc.slice(4)); if (dec) ip = dec; } catch (e) {}
                }
                result.chat_private.push({
                    filename,
                    sender_pub: senderPub,
                    iv,
                    expire_at: expireAt,
                    wrapped_key: wrappedKey,
                    aes_content: aesContent,
                    ip: ip,
                    time: serverTime,
                    version: 'v2',
                    signature: (lines.length >= 5 ? lines[4].trim() : '')
                });
            }
            // ---------- v3 PQC 加密 ----------
            else if (first.startsWith('v3|')) {
                const parts = first.split('|');
                if (parts.length < 4) continue;
                const senderPub = parts[1] || '';
                const iv = parts[2] || '';
                const expireAt = parts[3] || '';

                // ★ 不解密端到端内容，只提取 IP（用 PQC 解密）和时间（直接提取），其他保持加密不变
                // 服务端文件格式（lines 已 filter 空行）：
                // [0]=v3|...  [1]=PQC_V3  [2]=aes_content  [3]=PQC_IP:...|time
                // [4]=RSA加密的管理员密钥  [5]=iv_shared  [6]=iv_content
                // [7]=encAESKey  [8]=encContent  [9]=pqc_ciphertext(1568字节)

                if (lines.length < 4) continue;
                const aesContent = (lines[2] || '').trim();

                // 提取 IP 和时间
                let ip = '127.0.0.1', serverTime = '';
                const adminLine = lines[3] || '';
                const adminParts = adminLine.split('|', 2);
                const adminIpEnc = (adminParts[0] || '').trim();
                serverTime = (adminParts[1] || '').trim();

                // 解密 PQC_IP
                if (adminIpEnc.startsWith('PQC_IP:')) {
                    if (pqcPrivateKeyBytes) {
                        if (!ml_kem1024) {
                            const mod = await import('@noble/post-quantum/ml-kem');
                            ml_kem1024 = mod.ml_kem1024;
                        }
                        try {
                            const ipData = JSON.parse(atob(adminIpEnc.slice(7)));
                            const ctIp = Uint8Array.from(atob(ipData.ct), c => c.charCodeAt(0));
                            const sharedIp = ml_kem1024.decapsulate(ctIp, pqcPrivateKeyBytes);
                            const keyIp = await crypto.subtle.digest('SHA-256', sharedIp);
                            const aesKeyIp = new Uint8Array(keyIp);
                            const ivIp = Uint8Array.from(atob(ipData.iv), c => c.charCodeAt(0));
                            const encIpBytes = Uint8Array.from(atob(ipData.enc), c => c.charCodeAt(0));
                            const decIp = await crypto.subtle.decrypt(
                                { name: 'AES-CBC', iv: ivIp },
                                await crypto.subtle.importKey('raw', aesKeyIp, { name: 'AES-CBC' }, false, ['decrypt']),
                                encIpBytes
                            );
                            let decIpArr = new Uint8Array(decIp);
                            const padLenIp = decIpArr[decIpArr.length - 1];
                            if (padLenIp > 0 && padLenIp <= 16) {
                                decIpArr = decIpArr.slice(0, decIpArr.length - padLenIp);
                            }
                            const ipPlain = new TextDecoder().decode(decIpArr);
                            const parts3 = ipPlain.split(' | ');
                            if (parts3.length >= 2) { ip = parts3[0]; serverTime = parts3[1]; }
                            else { ip = ipPlain; }
                        } catch(e) {
                            addExportError('v3 私聊 PQC_IP 解密失败: ' + filename);
                        }
                    }
                } else if (adminIpEnc.startsWith('RSA:')) {
                    try {
                        const dec = jse.decrypt(adminIpEnc.slice(4));
                        if (dec) {
                            const parts3 = dec.split(' | ');
                            if (parts3.length >= 2) { ip = parts3[0]; serverTime = parts3[1]; }
                        }
                    } catch(e) {}
                }

                // 服务端文件行: [4]=pqc_ciphertext [5]=iv_shared [6]=iv_content [7]=encAESKey [8]=encContent [9]=sender_pqc_pub
                const pqcCiphertextB64 = (lines.length > 4 ? lines[4] : '').trim();
                const ivShared   = (lines.length > 5 ? lines[5] : '').trim();
                const ivContent  = (lines.length > 6 ? lines[6] : '').trim();
                const encAESKey  = (lines.length > 7 ? lines[7] : '').trim();
                const encContent = (lines.length > 8 ? lines[8] : '').trim();
                const senderPqcPub = (lines.length > 9 ? lines[9] : '').trim();

                result.chat_private.push({
                    filename,
                    sender_pub: senderPub,
                    iv,
                    expire_at: expireAt,
                    wrapped_key: 'PQC_V3',
                    aes_content: aesContent,
                    ip: ip,
                    time: serverTime,
                    version: 'v3',
                    pqc_ciphertext: pqcCiphertextB64,
                    iv_shared: ivShared,
                    iv_content: ivContent,
                    encAESKey: encAESKey,
                    encContent: encContent,
                    sender_pqc_pub: senderPqcPub,
                    signature: (lines.length >= 11 ? lines[10].trim() : '')
                });
            }
        }

        // ---- 群聊举报 ----
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            const reportMatch = path.match(/^chat_reports\/report_(\d+)_(\d+)\.json$/);
            if (!reportMatch) continue;
            try {
                const raw = await file.async('string');
                const report = JSON.parse(raw);
                // 解密举报者 IP
                let reporterIp = report.reporter_ip || '127.0.0.1';
                if (reporterIp.startsWith('RSA:')) {
                    try {
                        const dec = jse.decrypt(reporterIp.slice(4));
                        if (dec) reporterIp = dec;
                    } catch(e) {}
                } else if (reporterIp.startsWith('PQC:')) {
                    const dec = await tryDecrypt(reporterIp);
                    if (dec) reporterIp = dec;
                }
                result.chat_reports.push({
                    chat_index: report.chat_index,
                    reporter_ip: reporterIp,
                    reason: report.reason || '',
                    time: report.time || '',
                    report_index: parseInt(reportMatch[2], 10)
                });
            } catch(e) {
                addExportError('举报文件解析失败: ' + path);
            }
        }

        // ---- IP 记录 ----
        for (const [path, file] of Object.entries(zip.files)) {
            if (file.dir) continue;
            const match = path.match(/^ip\/ip_(\d{4}-\d{2}-\d{2})$/);
            if (!match) continue;
            const date = match[1];
            const content = await file.async('string');
            const lines = content.split('\n').filter(l => l.trim());
            for (const line of lines) {
                const parts = line.split('|');
                if (parts.length < 3) continue;
                const encIp = parts[1].trim();
                const count = parseInt(parts[2].trim(), 10) || 0;
                // ★ 使用已有的 decryptIP 函数，无论成功还是失败都返回可读字符串
                const ip = await decryptIP(encIp);
                result.ip_records.push({ date, ip, count });
            }
        }

        // ---- 人机验证日志 ----
        const captchaLogRaw = await getFileContent('captcha/verified_log.json');
        if (captchaLogRaw) {
            try {
                const logs = JSON.parse(captchaLogRaw);
                for (const entry of logs) {
                    const encData = entry.data;
                    if (encData) {
                        try {
                            let dec = null;
                            if (encData.startsWith('PQC:')) {
                                dec = await tryDecrypt(encData);
                            } else if (encData.startsWith('RSA:')) {
                                dec = jse.decrypt(encData.slice(4));
                            }
                            if (dec) {
                                const parts = dec.split('|');
                                if (parts.length >= 3) {
                                    result.captcha_logs.push({
                                        ip: parts[0],
                                        verified_time: parts[1],
                                        expiry_time: parts[2]
                                    });
                                }
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {}
        }

        // ---- 导出 JSON ----
        if (exportErrors.length > 0) {
            statusDiv.textContent += '\n⚠️ 解密失败 ' + exportErrors.length + ' 项，详见控制台';
            console.error('导出解密失败汇总:', exportErrors);
        }
        // ★ 如果指定了分类，则过滤数据
        if (categories) {
          result = filterExportDataByCategories(result, categories);
        }
        statusDiv.textContent = `✅ 导出完成：留言 ${result.messages.length} 条，投票 ${Object.keys(result.votes).length} 个，公告 ${result.notices.length} 条，群聊 ${result.chat_qun.length} 条，私聊 ${result.chat_private.length} 条，IP记录 ${result.ip_records.length} 条，验证日志 ${result.captcha_logs.length} 条，黑名单 ${result.blacklist.length} 条，白名单 ${result.whitelist.length} 条，正在下载...`;
        const jsonStr = JSON.stringify(result, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `plain_data_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    } catch (e) {
        statusDiv.textContent = '❌ 导出失败：' + e.message;
        console.error(e);
    }
}

// ===== 导入明文数据（构造 ZIP 并全量覆盖，使用当前公钥重新加密，包含黑白名单、人机验证配置） =====
// ===== 共享：将明文 JSON 构造为 ZIP（importPlainData 与 importPlainDataMerge 共用） =====
async function buildZipFromPlainData(data, statusDiv) {
    const importErrors = [];
    const addImportError = (msg) => { importErrors.push(msg); if (statusDiv) statusDiv.textContent = '⚠️ ' + msg; };

        // ---- 获取公钥用于加密 ----
        const pubRes = await fetch('/gongyao.txt');
        // ---- 获取当前盐值和 IP 加密方式 ----
        let currentSalt = '';
        let currentEncMode = 'rsa';
        try {
            const saltRes = await authFetch('/api/admin/ip-salt');
            const saltData = await saltRes.json();
            currentSalt = saltData.salt || '';
        } catch(e) { console.warn('获取盐值失败', e); }
        try {
            const modeRes = await authFetch('/api/admin/ip-encryption-mode');
            const modeData = await modeRes.json();
            currentEncMode = modeData.mode || 'rsa';
        } catch(e) { console.warn('获取加密方式失败', e); }
        if (!pubRes.ok) throw new Error('无法获取公钥');
        const pubKey = await pubRes.text();
        const encryptor = new JSEncrypt();
        // 带盐哈希
        const hashIP = (ip) => {
            return CryptoJS.SHA512(ip + currentSalt).toString(CryptoJS.enc.Hex);
        };
        encryptor.setPublicKey(pubKey);

        if (hasAnyV3) {

        // 辅助加密函数

        // IP 存储加密（根据当前模式选择 RSA 或 PQC）

        // ★ Web Crypto AES-CBC 加密辅助函数（与 index.html v3 提交一致）
        async function encryptAES(plaintext, keyBytes) {

                padded.set(plainBytes);
                padded.fill(padLen, plainBytes.length);
                const enc = await crypto.subtle.encrypt(

                );
                return { iv: iv, ciphertext: new Uint8Array(enc) };

        // ---- 投票（支持 v2 和 v3 重新加密） ----
        if (data.votes && typeof data.votes === 'object') {

                    // ★ 用 CryptoJS 加密投票内容（与 vote.html submitVote 一致）
                    const voteContentStr = `投票者 | ${vote.content}`;

        // ---- IP 记录 ----
        if (Array.isArray(data.ip_records)) {

                    skippedCount++;
                    continue;
                }

                // 5. 校验 IP 格式（同时支持 IPv4 和 IPv6）
                let isValid = false;

                // 5a. 尝试匹配 IPv4（xxx.xxx.xxx.xxx，每段 0-255）
                const ipv4Parts = ip.split('.');
                if (ipv4Parts.length === 4) {
                    let allValid = true;
                    for (let part of ipv4Parts) {
                        const num = parseInt(part, 10);
                        if (isNaN(num) || num < 0 || num > 255) {
                            allValid = false;
                            break;
                        }
                    }
                    if (allValid) {
                        isValid = true;
                    }
                }

                // 5b. 如果 IPv4 校验失败，尝试 IPv6（简单判断：包含 ':' 且不含空格）
                if (!isValid && ip.includes(':') && !/\s/.test(ip)) {
                    // 更严谨的校验可以添加，但服务端仅作为字符串使用，这样足够
                    isValid = true;
                }

                if (!isValid) {
                    console.warn('IP格式无效（不支持的格式）:', ip);
                    skippedCount++;
                    continue;
                }

                // 6. 获取 count
                const count = rec.count && !isNaN(rec.count) ? parseInt(rec.count, 10) : 1;

                // 7. 加密 IP
                const hash = hashIP(ip);
                const encrypted = await encryptIPStorage(ip);
                if (!encrypted) {
                    console.warn('IP加密失败，跳过:', ip);
                    skippedCount++;
                    continue;
                }

                // 8. 分组存储
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(`${hash} | ${encrypted} | ${count}`);
                validCount++;
            }

            console.log(`IP记录处理完成：有效 ${validCount} 条，跳过 ${skippedCount} 条`);

            // 9. 写入 ZIP 文件
            for (const [date, lines] of Object.entries(grouped)) {
                if (lines.length > 0) {
                    addFile(`ip/ip_${date}`, lines.join('\n'));
                }
            }
        }

        // ---- 人机验证日志 ----
        if (Array.isArray(data.captcha_logs)) {
            const logs = [];
            for (const entry of data.captcha_logs) {
                const ip = entry.ip || '127.0.0.1';
                const verified = entry.verified_time || new Date().toISOString().replace('T', ' ').slice(0, 19);
                const expiry = entry.expiry_time || new Date(Date.now() + 3600000).toISOString().replace('T', ' ').slice(0, 19);
                const plain = `${ip}|${verified}|${expiry}`;
                const encrypted = await encryptIPStorage(plain);
                if (encrypted) {
                    logs.push({ data: encrypted, ts: Date.now() / 1000 });
                }
            }
            if (logs.length > 0) {
                addFile('captcha/verified_log.json', JSON.stringify(logs, null, 2));
            }
        }

    return { zip, importErrors };
}

// ===== 生成随机字符串 =====
function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

// ===== 重置 RSA 密钥 =====
async function rotateRSAKey() {
    // 1. 二次确认：生成随机字符
    const randomStr = generateRandomString(8);
    const expectedPhrase = `我已下载明文数据，确定重置RSA密钥${randomStr}`;
    const userInput = prompt(
        `⚠️ 即将生成新 RSA 密钥对并替换服务器公钥！\n\n` +
        `此操作将导致所有用旧公钥加密的数据无法解密。\n` +
        `请确保您已通过「导出明文数据」功能备份了所有数据。\n\n` +
        `请输入以下确认短语以继续：\n\n` +
        `"${expectedPhrase}"\n\n` +
        `（输入后点击「确定」）`
    );

    if (userInput === null) return; // 用户取消
    if (userInput.trim() !== expectedPhrase) {
        alert('❌ 确认短语输入错误，操作已取消。');
        return;
    }

    // 2. 生成密钥对（使用 forge）
    try {
        // 检查 forge 是否加载
        if (typeof forge === 'undefined') {
            alert('❌ forge 库未加载，请刷新页面后重试。');
            return;
        }

        const keypair = forge.pki.rsa.generateKeyPair({ bits: 2048, workers: 2 });
        const privateKeyPem = forge.pki.privateKeyToPem(keypair.privateKey);
        const publicKeyPem = forge.pki.publicKeyToPem(keypair.publicKey);

        // 3. 下载私钥（RSA.txt）
        const blob = new Blob([privateKeyPem], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'RSA.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('✅ 私钥已下载为 RSA.txt，请妥善保管！');

        // 4. 上传公钥到服务器
        const uploadConfirm = confirm('公钥将上传至服务器，确认继续？');
        if (!uploadConfirm) return;

        const res = await authFetch('/api/admin/rotate-key', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ public_key: publicKeyPem })
        });

        const data = await res.json();
        if (data.ok) {
            alert('✅ RSA 公钥已更新成功！');
            // 可选择刷新页面或提示重新登录
            if (confirm('公钥已更换，建议重新登录以确保会话安全，是否现在刷新？')) {
                location.reload();
            }
        } else {
            alert('❌ 上传公钥失败：' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('❌ 生成或上传密钥失败：' + e.message);
        console.error(e);
    }
}

function filterDataByCategories(data, categories) {
  var filtered = { configs: {}, blacklist: [], whitelist: [], captcha_config: null, captcha_verified: null };
  if (categories.configs) filtered.configs = data.configs || {};
  if (categories.messages) filtered.messages = data.messages || [];
  if (categories.votes_config && data.votes) {
    filtered.votes = {};
    for (var pid in data.votes) {
      if (data.votes[pid].config) {
        filtered.votes[pid] = { config: data.votes[pid].config, votes: categories.votes_data ? (data.votes[pid].votes || []) : [] };
      }
    }
  } else if (categories.votes_data && data.votes) {
    filtered.votes = {};
    for (var pid in data.votes) {
      filtered.votes[pid] = { config: {}, votes: data.votes[pid].votes || [] };
    }
  }
  if (categories.chat_qun) filtered.chat_qun = data.chat_qun || [];
  if (categories.chat_private) filtered.chat_private = data.chat_private || [];
  if (categories.chat_reports) filtered.chat_reports = data.chat_reports || [];
  if (categories.notices) filtered.notices = data.notices || [];
  if (categories.ip_records) filtered.ip_records = data.ip_records || [];
  if (categories.captcha) {
    filtered.captcha_logs = data.captcha_logs || [];
    filtered.captcha_config = data.captcha_config;
    filtered.captcha_verified = data.captcha_verified;
  }
  if (categories.configs || categories.messages || categories.ip_records) {
    filtered.blacklist = data.blacklist || [];
    filtered.whitelist = data.whitelist || [];
  }
  return filtered;
}

    var result = await res.json();
    if (result.ok) { var s = result.stats; statusDiv.textContent = '✅ 增量导入完成：新增 '+s.added+'，跳过 '+s.skipped+'。页面即将刷新。'; setTimeout(function(){ location.reload(); }, 1500); }
    else { throw new Error(result.error || '导入失败'); }
  } catch(e) { statusDiv.textContent = '❌ 导入失败：' + e.message; console.error(e); }
  finally { input.value = ''; closeSelectiveImport(); }
}
// ===== 导出选择分类 =====
function showSelectiveExport() {
  var container = document.getElementById('category-checks-export');
  container.innerHTML = '';
  CATEGORIES.forEach(function(c) {
    container.innerHTML += '<div style="margin:4px 0"><label style="cursor:pointer;font-size:13px"><input type="checkbox" class="sel-cat-export" data-key="'+c.key+'" checked onchange="updateSelCountExport()"> '+c.label+'</label></div>';
  });
  document.getElementById('sel-all-export').checked = true;
  document.getElementById('sel-none-export').checked = false;
  updateSelCountExport();
  document.getElementById('selective-export-modal').style.display = 'flex';
}

function closeSelectiveExport() {
  document.getElementById('selective-export-modal').style.display = 'none';
}

function toggleAllCategoriesExport(src) {
  var checkAll = src.id === 'sel-all-export';
  document.getElementById('sel-all-export').checked = checkAll;
  document.getElementById('sel-none-export').checked = !checkAll;
  document.querySelectorAll('.sel-cat-export').forEach(function(cb){ cb.checked = checkAll; });
  updateSelCountExport();
}

function updateSelCountExport() {
  var total = document.querySelectorAll('.sel-cat-export').length;
  var sel = document.querySelectorAll('.sel-cat-export:checked').length;
  document.getElementById('sel-count-export').textContent = '已选 ' + sel + ' / ' + total + ' 个分类';
}

function getSelectedExportCategories() {
  var sel = {};
  document.querySelectorAll('.sel-cat-export:checked').forEach(function(cb){ sel[cb.dataset.key] = true; });
  return sel;
}

function startSelectiveExport() {
  var categories = getSelectedExportCategories();
  var hasSelection = Object.values(categories).some(function(v) { return v; });
  if (!hasSelection) { alert('请至少选择一个分类'); return; }
  closeSelectiveExport();
  exportPlainData(categories);
}

function filterExportDataByCategories(data, categories) {
  var filtered = { configs: {}, blacklist: [], whitelist: [], captcha_config: null, captcha_verified: null };

  if (categories.configs) filtered.configs = data.configs || {};

  if (categories.messages || categories.message_replies) {
    filtered.messages = (data.messages || []).map(function(m) {
      var copy = { seq: m.seq, version: m.version, nick: m.nick, content: m.content, ip: m.ip, time: m.time, rawAES: m.rawAES };
      if (categories.message_replies && m.replies) copy.replies = m.replies;
      return copy;
    });
  }

  if (categories.votes_config || categories.votes_data) {
    filtered.votes = {};
    for (var pid in data.votes || {}) {
      var poll = data.votes[pid];
      filtered.votes[pid] = {};
      if (categories.votes_config) filtered.votes[pid].config = poll.config || {};
      if (categories.votes_data) filtered.votes[pid].votes = poll.votes || [];
    }
  }

  if (categories.chat_qun) filtered.chat_qun = data.chat_qun || [];
  if (categories.chat_private) filtered.chat_private = data.chat_private || [];
  if (categories.chat_reports) filtered.chat_reports = data.chat_reports || [];
  if (categories.notices) filtered.notices = data.notices || [];
  if (categories.ip_records) filtered.ip_records = data.ip_records || [];

  if (categories.captcha) {
    filtered.captcha_logs = data.captcha_logs || [];
    filtered.captcha_config = data.captcha_config;
    filtered.captcha_verified = data.captcha_verified;
  }

  if (categories.configs || categories.messages || categories.ip_records) {
    filtered.blacklist = data.blacklist || [];
    filtered.whitelist = data.whitelist || [];
  }

  return filtered;
}
