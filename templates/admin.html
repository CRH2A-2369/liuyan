<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>管理后台</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js" integrity="sha512-94ncgEEqkuZ4yNTFmu2dSn1TJ6Ij+ANQqpR7eLVU99kzvYzu6UjBxuVoNHtnd29R+T6nvK+ugCVI698pbyEkvQ==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-E8QSvWZ0eCLGk4km3hxSsNmGWbLtSCSUcewDQPQWZF6pEU8GlT8a5fF32wOl1i8ftdMhssTrF/OhyGWwonTcXA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js" integrity="sha512-rfX4p3RNnxdwLT3wWP1K0NR3ztTobn+sISlT9WhxDDK00zNYbQ6MCHA5OHm0hqKAzEMXYCgFrp8iY/ER5MkXqA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" crossorigin="anonymous"></script>
  <style>
    .copy-btn { background:#eee; border:1px solid #ddd; border-radius:3px; padding:2px 8px; font-size:11px; cursor:pointer; color:#555; margin-left:8px; vertical-align:middle; }
    .copy-btn:hover { background:#ddd; }
    .copy-btn.copied { background:#4CAF50; color:#fff; border-color:#4CAF50; }
    .md-content { line-height:1.6; font-size:14px; }
    .md-content img { max-width:100%; border-radius:4px; margin:8px 0; cursor:pointer; }
    .md-content a { color:#2196F3; text-decoration:none; word-break:break-all; }
    .md-content a:hover { text-decoration:underline; }
    .md-content pre { background:#f5f5f5; padding:10px; border-radius:4px; overflow-x:auto; font-size:12px; }
    .md-content code { background:#f0f0f0; padding:2px 4px; border-radius:3px; font-size:13px; }
    .md-content blockquote { border-left:3px solid #ddd; margin:8px 0; padding:4px 12px; color:#666; }
    body { font-family:sans-serif; max-width:900px; margin:40px auto; padding:20px; min-height:100vh; display:flex; flex-direction:column; }
    .card { border:1px solid #eee; padding:12px; margin:10px 0; background:#fafafa; position:relative; }
    .del { position:absolute; top:10px; right:10px; color:#c00; cursor:pointer; border:none; background:none; }
    .reply-btn { background:#4CAF50; color:#fff; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; margin-top:8px; }
    .login { max-width:400px; margin:50px auto; text-align:center; }
    textarea { width:100%; height:100px; margin:10px 0; padding:8px; box-sizing:border-box; }
    input { padding:8px; width:100%; box-sizing:border-box; margin:5px 0; }
    button { padding:10px 20px; cursor:pointer; }
    a { color:#666; }
    .err { color:red; font-size:12px; }
    .meta { font-size:12px; color:#666; margin-bottom:4px; }
    .key-display { font-family:monospace; background:#eee; padding:2px 5px; border-radius:3px; font-size:11px; word-break:break-all; display:inline-block; max-width:100%; margin:4px 0; }
    #reply-panel { background:#f9f9f9; border:2px dashed #4CAF50; padding:15px; margin-top:20px; border-radius:8px; display:none; }
    .reply-box { background:#e8f5e9; padding:10px; margin-top:10px; border-radius:6px; position:relative; border-left:3px solid #4CAF50; }
    .reply-del { position:absolute; top:6px; right:6px; background:#f44336; color:#fff; border:none; border-radius:3px; padding:2px 8px; cursor:pointer; font-size:12px; }
    .reply-meta { font-size:11px; color:#555; margin-bottom:4px; }
    #bl-list { max-height:120px; overflow-y:auto; background:#fff; padding:6px; border:1px solid #eee; border-radius:4px; margin-top:8px; }
    .bl-item { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
    .bl-del { background:#f44336; color:#fff; border:none; border-radius:3px; padding:1px 6px; cursor:pointer; font-size:11px; }
    footer { margin-top:auto; padding:20px 0; text-align:center; color:#888; font-size:12px; border-top:1px solid #eee; }
  </style>
</head>
<body>
  <script id="raw-data" type="application/json">{{ messages | tojson }}</script>

  <div id="login-panel" class="login">
    <h2>管理员验证</h2><p>输入私钥完成认证</p>
    <textarea id="privKey" placeholder="-----BEGIN RSA PRIVATE KEY-----..."></textarea>
    <div id="err" class="err"></div><button onclick="verify()">验证并进入</button>
  </div>

  <div id="msg-panel" style="display:none">
    <hr><h3>IP白名单管理（豁免速率限制）</h3>
    <div id="wl-list" style="max-height:120px;overflow-y:auto;background:#fff;padding:6px;border:1px solid #eee;border-radius:4px;margin-top:8px"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <input id="wl-ip" placeholder="输入要加入白名单的IP" style="flex:1">
      <button onclick="addWL()">添加</button>
      <button onclick="addCurrentIPToWL()" style="background:#2196F3;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer">➕ 添加当前IP</button>
    </div>
    <h2>信件管理
  <a href="javascript:logout()" style="font-size:14px">[退出登录]</a>
  <a href="/admin/qun" style="font-size:14px;margin-left:10px;color:#4CAF50;text-decoration:none;border:1px solid #4CAF50;padding:3px 10px;border-radius:4px">💬 群聊管理</a>
  <a href="/admin/vote" style="font-size:14px;margin-left:10px;color:#673AB7;text-decoration:none;border:1px solid #673AB7;padding:3px 10px;border-radius:4px">🗳️ 投票管理</a>
  <a href="/admin/ip" style="font-size:14px;margin-left:10px;color:#009688;text-decoration:none;border:1px solid #009688;padding:3px 10px;border-radius:4px">🌐 IP记录</a>
  <a href="/admin/notice" style="font-size:14px;margin-left:10px;color:#FF3407;text-decoration:none;border:1px solid #FF57FB;padding:3px 10px;border-radius:4px">📢 公告管理</a>
  <a href="/admin/chat" style="font-size:14px;margin-left:10px;color:#FF57FB;text-decoration:none;border:1px solid #FFBC00;padding:3px 10px;border-radius:4px"> 私聊管理</a>
  <a href="/admin/captcha" style="font-size:14px;margin-left:10px;color:#FC6241;text-decoration:none;border:1px solid #FFDC21;padding:3px 10px;border-radius:4px"> 🤖人机验证</a>
</h2>
    <div id="list"></div>
    <div id="reply-panel">
      <h3>📝 发送回复</h3>
      <input id="rep-seq" readonly><input id="rep-nick" readonly><input id="rep-key" type="password" readonly>
      <button type="button" onclick="insertAdminFileLink()" style="background:#FF9800;font-size:12px;height:30px;padding:0 12px;margin-bottom:5px">🔗 插入文件外链</button>
      <textarea id="rep-content" placeholder="回复内容（无字数限制）"></textarea>
      <button onclick="submitReply()">发送</button><button onclick="closeReply()" style="background:#ccc;margin-left:10px">取消</button>
    </div>
    <hr><h3>IP黑名单管理</h3>
    <div style="display:flex;gap:8px"><input id="bl-ip" placeholder="输入要封禁的IP" style="flex:1"><button onclick="addBL()">添加</button></div>
    <div id="bl-list"></div>

<hr>
<h3>📦 数据备份与恢复（全量操作，请谨慎）</h3>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin:8px 0">
  <button onclick="exportData()" style="background:#2196F3;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer">📤 导出所有数据</button>
  <button onclick="document.getElementById('import-file-input').click()" style="background:#FF9800;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer">📥 导入数据并覆盖</button>
  <input type="file" id="import-file-input" accept=".zip" style="display:none" onchange="importData(this)">
</div>
<p style="font-size:12px;color:#888;margin:4px 0">导出将下载包含所有数据的 ZIP 文件；导入将用所选 ZIP 完全覆盖当前数据，操作不可逆！</p>

    <hr><h3>修改底部文字</h3><textarea id="footInput" placeholder="输入新内容"></textarea><button onclick="updateFoot()">保存底部</button>
  </div>
  <footer id="footer"></footer>

<script>
  const rawData = JSON.parse(document.getElementById('raw-data').textContent);
  let allReplies = [], jse = null, csrfToken = '';

  // 初始化 JSEncrypt
  try { jse = new JSEncrypt(); } catch(e) {}

  // 工具函数：获取 CSRF Token
  function getCsrfToken() {
    return csrfToken;
  }

  // 解密 IP（使用管理员私钥）
  function decryptIP(encrypted) {
    if (!jse) return '（密钥未加载）';
    try {
      const raw = encrypted && encrypted.startsWith('RSA:') ? encrypted.slice(4) : encrypted;
      if (!raw) return '（空数据）';
      const dec = jse.decrypt(raw);
      return dec || '（解密失败）';
    } catch(e) {
      return '（解密失败）';
    }
  }

  // ---------- 白名单 ----------
  async function loadWL() {
    const res = await fetch('/api/whitelist');
    const list = await res.json();
    const container = document.getElementById('wl-list');
    container.innerHTML = '';
    list.forEach(item => {
      const plainIP = decryptIP(item.encrypted);
      const div = document.createElement('div');
      div.className = 'bl-item';
      div.innerHTML = `
        <span>${plainIP}</span>
        <button class="bl-del" onclick="deleteIP('${item.hash}', 'white')">删除</button>
      `;
      container.appendChild(div);
    });
  }

  async function addWL(ip) {
    const targetIp = ip || document.getElementById('wl-ip').value.trim();
    if (!targetIp) return alert('请输入IP地址');
    const res = await fetch('/api/whitelist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ action: 'add', ip: targetIp })
    });
    if (res.ok) {
      alert('添加白名单成功');
      document.getElementById('wl-ip').value = '';
      loadWL();
    } else {
      alert('添加失败：' + await res.text());
    }
  }

  async function addCurrentIPToWL() {
    const res = await fetch('/api/myip');
    const ip = await res.text();
    if (!ip) { alert('无法获取当前IP'); return; }
    if (confirm('确定将当前IP (' + ip + ') 加入白名单吗？')) {
      addWL(ip);
    }
  }

  // ---------- 黑名单 ----------
  async function loadBL() {
    const res = await fetch('/api/blacklist');
    const list = await res.json();
    const container = document.getElementById('bl-list');
    container.innerHTML = '';
    list.forEach(item => {
      const plainIP = decryptIP(item.encrypted);
      const div = document.createElement('div');
      div.className = 'bl-item';
      div.innerHTML = `
        <span>${plainIP}</span>
        <button class="bl-del" onclick="deleteIP('${item.hash}', 'black')">删除</button>
      `;
      container.appendChild(div);
    });
  }

  async function addBL(ip) {
    const targetIp = ip || document.getElementById('bl-ip').value.trim();
    if (!targetIp) return alert('请输入IP地址');
    const res = await fetch('/api/blacklist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ action: 'add', ip: targetIp })
    });
    if (res.ok) {
      alert('添加黑名单成功');
      document.getElementById('bl-ip').value = '';
      loadBL();
    } else {
      alert('添加失败：' + await res.text());
    }
  }

  // ---------- 删除 IP（统一函数） ----------
  async function deleteIP(hash, type) {
    if (!confirm('确定删除该IP？')) return;
    const url = type === 'white' ? '/api/whitelist' : '/api/blacklist';
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
      body: JSON.stringify({ action: 'remove', hash: hash })
    });
    if (res.ok) {
      alert('删除成功');
      if (type === 'white') loadWL(); else loadBL();
    } else {
      alert('删除失败：' + await res.text());
    }
  }

  // ---------- 原有功能（回复、导出、导入等）----------
  function insertAdminFileLink() {
    const url = prompt('请输入文件URL:');
    if (!url) return;
    const name = prompt('请输入显示名称:', url.split('/').pop() || '文件') || '文件';
    const ext = url.split('.').pop().toLowerCase();
    let md = ['jpg','jpeg','png','gif','webp','svg'].includes(ext) ? `![${name}](${url})` : `[📎 ${name}](${url})`;
    const ta = document.getElementById('rep-content');
    ta.value += (ta.value ? '\n' : '') + md;
    ta.focus();
  }

  const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function deriveKey(str) { return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString()); }

  const authFetch = async (url, opts={}) => {
    const headers = { ...opts.headers };
    if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
    const res = await fetch(url, { credentials: 'same-origin', ...opts, headers });
    if (res.status === 403) throw new Error('CSRF/Session 失效');
    return res;
  };

  async function init() {
    try {
      csrfToken = (await fetch('/api/csrf', {credentials:'same-origin'}).then(r=>r.json())).token;
      const status = await fetch('/api/admin/status', {credentials:'same-origin'}).then(r=>r.json());
      if (status.logged_in && sessionStorage.getItem('admin_has_key') === 'true') {
        const savedKey = sessionStorage.getItem('admin_priv_key');
        if (savedKey) { jse.setPrivateKey(savedKey); showAdmin(); }
        else { await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}}); sessionStorage.clear(); location.reload(); }
      } else if (status.logged_in) {
        await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}}); sessionStorage.clear(); location.reload();
      } else {
        const chal = await fetch('/api/admin/challenge', {credentials:'same-origin'}).then(r=>r.json());
        if (chal.challenge && chal.challenge !== 'ERROR') { window.challenge = chal.challenge; document.getElementById('login-panel').style.display = 'block'; }
      }
    } catch(e) { console.error('Init:', e); }
  }
  init();

  async function verify(){
    if(!jse||!window.challenge) return;
    const k = document.getElementById('privKey').value.trim(); if(!k) return;
    jse.setPrivateKey(k);
    try{
      const plain = jse.decrypt(window.challenge);
      if(!plain) throw new Error('RSA解密为空');
      const fd = new FormData(); fd.append('plaintext', plain);
      const r = await authFetch('/api/admin/verify',{method:'POST',body:fd});
      if(r.ok){ sessionStorage.setItem('admin_has_key', 'true'); sessionStorage.setItem('admin_priv_key', k); location.reload(); }
      else document.getElementById('err').textContent = await r.text();
    }catch(e){ document.getElementById('err').textContent = '私钥无效'; }
  }

  function showAdmin(){
    document.getElementById('login-panel').style.display='none';
    document.getElementById('msg-panel').style.display='block';
    fetch('/api/replies', {credentials:'same-origin'}).then(function(r){return r.json();}).then(function(rps){allReplies=rps;render();});
    fetch('/api/footer', {credentials:'same-origin'}).then(function(r){return r.text();}).then(function(t){document.getElementById('footInput').value=t;});
    loadBL();
    loadWL();
  }

  function render(){
    const list = document.getElementById('list');
    list.innerHTML = '';
    if(!rawData.length){ list.innerHTML='<p style="color:#888;text-align:center">暂无留言</p>'; return; }

    rawData.forEach(m => {
      const isV2 = m.is_v2;
      let rk, ivStr, aesEnc, serverEnc, metaEnc, contentEnc;

      if (isV2) {
        const parts = m.rsa_iv.split('|');
        rk = (parts[1] || '').replace(/\s+/g, '');
        ivStr = (parts[2] || '').replace(/\s+/g, '');
        aesEnc = (m.aes_msg || '').replace(/\s+/g, '');
        serverEnc = (m.server_enc || '').replace(/\s+/g, '');
      } else {
        const parts = m.rsa_iv.split('|');
        rk = parts[0].replace(/\s+/g, '');
        ivStr = (parts[1] || '').replace(/\s+/g, '');
        metaEnc = (m.meta_enc || '').replace(/\s+/g, '');
        contentEnc = (m.content_enc || '').replace(/\s+/g, '');
      }

      let meta = '解密失败', txt = '解密失败', rawAES = '', serverMeta = '', nick = '匿名';
      try {
        rawAES = jse.decrypt(rk);
        if (!rawAES) throw new Error('RSA解密失败，请检查私钥');
        const key32 = deriveKey(rawAES);
        const ivW = CryptoJS.enc.Base64.parse(ivStr);
        const opts = { iv: ivW, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 };

        if (isV2) {
          const plain = CryptoJS.AES.decrypt(aesEnc, key32, opts).toString(CryptoJS.enc.Utf8);
          if (!plain) throw new Error('AES解密结果为空');
          const p = plain.indexOf(' | ');
          if (p !== -1) {
            nick = plain.substring(0, p);
            txt = plain.substring(p + 3);
            meta = '👤 ' + nick;
          } else {
            txt = plain;
            meta = '（格式异常）';
          }
          if (serverEnc) {
            const sm = jse.decrypt(serverEnc);
            if (sm) serverMeta = ' | 🌐🕒 ' + sm;
          }
        } else {
          meta = CryptoJS.AES.decrypt(metaEnc, key32, opts).toString(CryptoJS.enc.Utf8);
          txt  = CryptoJS.AES.decrypt(contentEnc, key32, opts).toString(CryptoJS.enc.Utf8);
          if (!meta || !txt) throw new Error('AES解密结果为空');
          const mp = meta.split(' | ');
          nick = mp[2] || '匿名';
        }
      } catch(e) {
        console.warn(`[留言${m.seq}]`, e.message);
        meta = txt = `❌ ${e.message}`;
      }

      const card = document.createElement('div');
      card.className = 'card';

      const delBtn = document.createElement('button');
      delBtn.className = 'del';
      delBtn.textContent = '删除留言';
      delBtn.dataset.file = m.file;
      card.appendChild(delBtn);

      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';
      metaDiv.textContent = isV2 ? (meta + serverMeta) : ('📦 ' + meta);
      card.appendChild(metaDiv);

      const keySpan = document.createElement('span');
      keySpan.className = 'key-display';
      keySpan.textContent = '🔑 AES密钥: ' + (rawAES || '解密失败');
      card.appendChild(keySpan);

      const contentDiv = document.createElement('div');
      contentDiv.className = 'md-content';
      contentDiv.style.cssText = 'margin:4px 0 0;word-break:break-all';
      contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(txt));
      card.appendChild(contentDiv);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = '复制原文';
      copyBtn.dataset.copy = txt;
      card.appendChild(copyBtn);

      const reps = allReplies.filter(r => r.seq == m.seq);
      reps.sort((a, b) => (a.num || 1) - (b.num || 1));
      reps.forEach(rep => {
        try {
          const rKey = deriveKey(rawAES);
          const rTxt = CryptoJS.AES.decrypt(
            rep.aes_msg.replace(/\s+/g, ''),
            rKey,
            { iv: CryptoJS.enc.Base64.parse(rep.iv.replace(/\s+/g, '')),
              mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
          ).toString(CryptoJS.enc.Utf8);
          if (rTxt) {
            const p = rTxt.split(' | ');
            const replyBox = document.createElement('div');
            replyBox.className = 'reply-box';

            const rDelBtn = document.createElement('button');
            rDelBtn.className = 'reply-del';
            rDelBtn.textContent = '删除回复';
            rDelBtn.dataset.file = `回复_${m.seq}_${rep.num || 1}.txt`;
            replyBox.appendChild(rDelBtn);

            const rMeta = document.createElement('div');
            rMeta.className = 'reply-meta';
            rMeta.textContent = `📝 回复 #${rep.num || 1} ${p[0]} | 🕒 ${p[1] || ''}`;
            replyBox.appendChild(rMeta);

            const rContent = document.createElement('div');
            rContent.className = 'md-content';
            rContent.style.margin = '0';
            rContent.innerHTML = DOMPurify.sanitize(marked.parse(p.slice(2).join(' | ')));
            replyBox.appendChild(rContent);

            const rCopyBtn = document.createElement('button');
            rCopyBtn.className = 'copy-btn';
            rCopyBtn.textContent = '复制回复';
            rCopyBtn.dataset.copy = p.slice(2).join(' | ');
            replyBox.appendChild(rCopyBtn);

            card.appendChild(replyBox);
          }
        } catch(e) { console.warn(`[回复${m.seq}#${rep.num}]`, e.message); }
      });

      const replyBtn = document.createElement('button');
      replyBtn.className = 'reply-btn';
      replyBtn.textContent = '回复';
      replyBtn.dataset.seq = m.seq;
      replyBtn.dataset.nick = nick;
      replyBtn.dataset.key = rawAES;
      card.appendChild(replyBtn);

      list.appendChild(card);
    });

    list.onclick = e => {
      const t = e.target;
      if (t.matches('.del')) { if(confirm('确定？')) authFetch(`/admin/delete/${t.dataset.file}`, {method:'POST'}).then(()=>location.reload()); }
      if (t.matches('.reply-btn')) { openReply(t.dataset.seq, t.dataset.nick, t.dataset.key); }
      if (t.matches('.reply-del')) {
        if (confirm('确定删除这条回复？')) {
          authFetch(`/admin/delete_reply_file/${t.dataset.file}`, { method: 'POST' })
            .then(() => location.reload());
        }
      }
    };
  }

  function openReply(s,n,k){
    document.getElementById('reply-panel').style.display='block';
    document.getElementById('rep-seq').value=s;
    document.getElementById('rep-nick').value=n;
    document.getElementById('rep-key').value=k;
    document.getElementById('reply-panel').scrollIntoView({behavior:'smooth'});
  }
  function closeReply(){ document.getElementById('reply-panel').style.display='none'; document.getElementById('rep-content').value=''; }
  function submitReply(){
    const s = document.getElementById('rep-seq').value, k = document.getElementById('rep-key').value, t = document.getElementById('rep-content').value.trim();
    if (!t) return alert('内容不能为空');
    const iv = CryptoJS.lib.WordArray.random(16), pld = `${document.getElementById('rep-nick').value} | ${new Date().toLocaleString()} | ${t}`;
    const enc = CryptoJS.AES.encrypt(pld, deriveKey(k), {iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7}).toString();
    authFetch('/api/reply', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({seq:s, iv:CryptoJS.enc.Base64.stringify(iv), aes_msg:enc})}).then(r=>r.ok?(alert('已发送'),closeReply(),location.reload()):alert('失败'));
  }
  function updateFoot(){ authFetch('/api/footer',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'content='+encodeURIComponent(document.getElementById('footInput').value)}).then(()=>{alert('已更新');location.reload();}); }
  function logout(){ sessionStorage.removeItem('admin_has_key'); sessionStorage.removeItem('admin_priv_key'); authFetch('/api/admin/logout').then(()=>location.reload()); }

  // ── 导出数据 ──
  async function exportData() {
    if (!confirm('⚠️ 确认导出所有数据？\n导出文件包含所有留言、群聊、投票、IP记录等，请妥善保管。')) return;
    const confirmText = prompt('请输入 "确认导出所有文件" 以继续：');
    if (confirmText !== '确认导出所有文件') {
      alert('操作已取消');
      return;
    }
    try {
      const res = await authFetch('/api/admin/export-data');
      if (!res.ok) {
        const err = await res.text();
        throw new Error(err || '导出失败');
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const disposition = res.headers.get('content-disposition');
      let filename = 'backup.zip';
      if (disposition) {
        const match = disposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        if (match && match[1]) {
          filename = match[1].replace(/['"]/g, '');
        }
      }
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert('✅ 导出成功');
    } catch (e) {
      alert('❌ 导出失败：' + e.message);
    }
  }

  // ── 导入数据 ──
  function importData(input) {
    if (!input.files || input.files.length === 0) return;
    const file = input.files[0];
    const confirmMsg = `⚠️ 即将导入文件：${file.name}\n此操作将覆盖当前所有数据，不可撤销！\n请输入 "确认覆盖来自于 ${file.name} 的文件" 以继续：`;
    const confirmText = prompt(confirmMsg);
    if (confirmText !== `确认覆盖来自于 ${file.name} 的文件`) {
      alert('操作已取消');
      input.value = '';
      return;
    }

    const formData = new FormData();
    formData.append('file', file);

    authFetch('/api/admin/import-data', {
      method: 'POST',
      body: formData,
    }).then(res => res.json()).then(data => {
      if (data.ok) {
        alert('✅ 导入成功！页面即将刷新。');
        location.reload();
      } else {
        alert('❌ 导入失败：' + (data.error || '未知错误'));
      }
    }).catch(err => {
      alert('❌ 请求失败：' + err.message);
    }).finally(() => {
      input.value = '';
    });
  }

  // 兼容旧代码（可能存在的调用）
  async function addCurrentIP() {
    try {
      var res = await fetch('/api/myip');
      var ip = await res.text();
      if (!ip) { alert('无法获取当前IP'); return; }
      if (confirm('确定将当前IP (' + ip + ') 加入白名单吗？')) {
        addWL(ip);
      }
    } catch(e) {
      alert('获取当前IP失败：' + e.message);
    }
  }
</script>
