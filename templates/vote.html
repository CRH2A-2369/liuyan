<script>
// ★ 验证码拦截：如果服务器返回 418，保存状态并跳转
function handleCaptchaRedirect(res, saveStateFn) {
  if (res.status === 418) {
    // 保存当前表单状态（可选）
    if (typeof saveStateFn === 'function') saveStateFn();
    var returnUrl = encodeURIComponent(window.location.href);
    window.location.href = '/captcha?redirect=' + returnUrl;
    return true; // 触发了验证码跳转
  }
  return false; // 正常响应
}

var esc = function(s){ return String(s || '').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); };
function parseMeta(metaStr) {
  var parts = (metaStr||'').split(' | ');
  if (parts.length >= 3) return parts.slice(1).join(' | ');
  return metaStr || '';
}
var LS_NICK = 'msg_nick';
var LS_AES = 'msg_aes';
function getLS(k){ return localStorage.getItem(k) || ''; }
function setLS(k, v){ localStorage.setItem(k, v); }
function deriveAESKey(str){return CryptoJS.enc.Hex.parse(CryptoJS.SHA256(str).toString());}

function genRandomKey() {
  var chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ,./?;:><|]}[{=-+_!@#$%^&*()~';
  var key = '';
  for (var i = 0; i < 32; i++) {
    key += chars[Math.floor(Math.random() * chars.length)];
  }
  document.getElementById('global-key').value = key;
}

var _markedParse = null;
(function(){
  if (typeof marked === 'undefined') return;
  if (typeof marked.parse === 'function') {
    _markedParse = function(t,o){ return marked.parse(t,o); };
  } else if (typeof marked === 'function') {
    _markedParse = function(t,o){ return marked(t,o); };
  }
})();

var URL_REGEX = /(https?:\/\/[^\s<>\[\]()]*[^\s<>\[\]()\.,;:!?])/gi;
function autoLink(text) {
  if (!text) return '';
  return String(text).replace(URL_REGEX, function(url) {
    return '[' + url + '](' + url + ')';
  });
}

function renderMd(text) {
  if (!text) return '';
  var linked = autoLink(text);
  if (!_markedParse) return esc(linked);
  try {
    var raw = _markedParse(linked, { breaks: true });
    if (!raw) return esc(linked);
    return '<span class="md-content">' + DOMPurify.sanitize(raw) + '</span>';
  } catch(e) {
    return esc(linked);
  }
}
function renderMdInline(text) {
  if (!text) return '';
  var linked = autoLink(text);
  if (!_markedParse) return esc(linked);
  try {
    var raw = _markedParse(linked, { breaks: true });
    if (!raw) return esc(linked);
    return DOMPurify.sanitize(raw);
  } catch(e) {
    return esc(linked);
  }
}

function bytesToBase64(bytes) {
  var binary = '';
  for (var i = 0; i < bytes.length; i++) { binary += String.fromCharCode(bytes[i]); }
  return btoa(binary);
}
function base64ToBytes(b64) {
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
  return bytes;
}
// ========== PQC 加密支持 ==========
var pqcPubKeyBytes = null;
var pqcPubKeyLoaded = false;

async function loadPqcPubKey() {
  if (pqcPubKeyLoaded) return pqcPubKeyBytes;
  try {
    var r = await fetch('/gongyaoPQC.txt');
    var b64 = (await r.text()).trim().replace(/\s/g, '');
    pqcPubKeyBytes = base64ToBytes(b64);
    pqcPubKeyLoaded = true;
  } catch(e) {
    console.error('加载PQC公钥失败:', e);
  }
  return pqcPubKeyBytes;
}

function getEncMode() {
  var sel = document.querySelector('input[name="enc-mode"]:checked');
  return sel ? sel.value : 'rsa';
}

function onEncModeChange() {
  var mode = getEncMode();
  var hint = document.getElementById('enc-mode-hint');
  if (mode === 'pqc') hint.textContent = '使用后量子加密保护AES密钥';
  else if (mode === 'auto') hint.textContent = '自动检测：优先PQC，不可用时回退RSA';
  else hint.textContent = '';
}

// ========== PQC 加密核心 ==========
async function pqcEncryptVote(aesKeyStr, voteContent, remark) {
  var pkBytes = await loadPqcPubKey();
  if (!pkBytes) throw new Error('无法加载服务器PQC公钥');

  var { ml_kem1024 } = await import('@noble/post-quantum/ml-kem');

  // 1. PQC 封装 → shared_secret + ciphertext
  var shared = new Uint8Array(32);
  var ct = new Uint8Array(1568);
  ml_kem1024.encapsulate(ct, shared, pkBytes);

  // 2. shared_secret → SHA256 → 第一层 AES 密钥
  var sharedWa = CryptoJS.lib.WordArray.create(shared);
  var layer1Key = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(sharedWa).toString().substring(0, 64));

  // 3. 随机第二层 AES 密钥
  var layer2Key = CryptoJS.lib.WordArray.random(32);

  // 4. 第一层加密第二层 AES 密钥
  var ivShared = CryptoJS.lib.WordArray.random(16);
  var encAESKey = CryptoJS.AES.encrypt(
    CryptoJS.enc.Base64.stringify(layer2Key),
    layer1Key,
    { iv: ivShared, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
  ).toString();

  // 5. 第二层加密投票内容 + AES密钥（让管理员能解密）
  var ivContent = CryptoJS.lib.WordArray.random(16);
  var plainPayload = JSON.stringify({ key: aesKeyStr, vote: voteContent, remark: remark || '' });
  var encContent = CryptoJS.AES.encrypt(
    plainPayload,
    layer2Key,
    { iv: ivContent, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
  ).toString();

  return {
    pqc_ciphertext: bytesToBase64(ct),
    iv_shared: CryptoJS.enc.Base64.stringify(ivShared),
    iv_content: CryptoJS.enc.Base64.stringify(ivContent),
    encAESKey: encAESKey,
    encContent: encContent
  };
}

refreshCsrf();
var allPolls = [];
var currentPollId = null;
var currentEditingPollId = null;
var currentEditingSeq = null;
var pollingTimer = null;
var lastSyncTime = null;

function countSelected(inputName) {
  inputName = inputName || 'vote-opt';
  return document.querySelectorAll('input[name="' + inputName + '"]:checked').length;
}

function checkLimit(minSel, maxSel, inputName) {
  inputName = inputName || 'vote-opt';
  var total = countSelected(inputName);
  var hintEl = document.getElementById('select-hint');
  if (!hintEl) return;
  if (total > maxSel) {
    var allChecked = document.querySelectorAll('input[name="' + inputName + '"]:checked');
    allChecked[allChecked.length - 1].checked = false;
    hintEl.textContent = '⚠️ 最多选 ' + maxSel + ' 个，已自动取消超出的选项';
    hintEl.className = 'err';
    setTimeout(function(){ updateHint(minSel, maxSel, inputName); }, 2000);
    return;
  }
  updateHint(minSel, maxSel, inputName);
}

function updateHint(minSel, maxSel, inputName) {
  inputName = inputName || 'vote-opt';
  var total = countSelected(inputName);
  var hintEl = document.getElementById('select-hint');
  if (!hintEl) return;
  if (minSel === 1 && maxSel === 1) {
    hintEl.className = total >= 1 ? 'ok' : '';
    hintEl.textContent = total >= 1 ? '已选 1 个 ✓' : '请选择 1 个选项';
  } else if (total < minSel) {
    hintEl.textContent = '已选 ' + total + ' 个（至少选 ' + minSel + ' 个）';
    hintEl.className = 'warn';
  } else {
    hintEl.textContent = '已选 ' + total + ' 个 ✓';
    hintEl.className = 'ok';
  }
}

function updateEditHint(minSel, maxSel) {
  var total = countSelected('edit-opt');
  var hintEl = document.getElementById('edit-select-hint');
  if (!hintEl) return;
  if (minSel === 1 && maxSel === 1) {
    hintEl.textContent = total >= 1 ? '已选 1 个 ✓' : '请选择 1 个选项';
    hintEl.style.color = total >= 1 ? '#4CAF50' : '#888';
  } else if (total < minSel) {
    hintEl.textContent = '已选 ' + total + ' 个（至少选 ' + minSel + ' 个）';
    hintEl.style.color = '#FF9800';
  } else {
    hintEl.textContent = '已选 ' + total + ' 个 ✓';
    hintEl.style.color = '#4CAF50';
  }
}

function collectVoteValues(inputName, customInputId) {
  inputName = inputName || 'vote-opt';
  var checked = document.querySelectorAll('input[name="' + inputName + '"]:checked');
  var selected = Array.from(checked).map(function(cb){ return cb.value; });
  var customIdx = selected.indexOf('__custom__');
  if (customIdx !== -1) {
    var customText = (document.getElementById(customInputId) || {}).value || '';
    customText = customText.trim();
    if (customText) {
      selected[customIdx] = customText;
    } else {
      selected.splice(customIdx, 1);
    }
  }
  return selected;
}

function startPolling() {
  if (pollingTimer) return;
  syncFromServer();
  pollingTimer = setInterval(syncFromServer, 5000);
}

function stopPolling() {
  if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
}

function syncFromServer() {
  fetch('/api/votes')
    .then(function(r){ window.handleRateLimitResponse(r); return r.json(); })
    .then(function(polls){
      allPolls = polls || [];
      lastSyncTime = new Date();

      var pollIds = {};
      (polls||[]).forEach(function(p){ pollIds[p.id] = true; });
      var all = getAllMyVotes();
      var changed = false;
      var myNick = currentIdentity().nick;
      Object.keys(all).forEach(function(pid){
        if (!pollIds[pid] && all[pid].nick === myNick) {
          delete all[pid];
          changed = true;
        }
      });
      if (changed) saveAllMyVotes(all);

      var identity = currentIdentity();
      if (!identity.nick || !identity.key) {
        finishSync();
        return;
      }
      var keyHash = CryptoJS.SHA256(identity.key).toString();

      // ★ 只恢复本地完全没有记录的投票（已有记录的不覆盖）
      var missingPolls = (polls||[]).filter(function(p) {
        return !all[p.id];
      });

      if (missingPolls.length === 0) {
        finishSync();
        return;
      }

      var promises = missingPolls.map(function(p) {
        return fetch('/api/votes/' + encodeURIComponent(p.id) + '/my-vote?key_hash=' + encodeURIComponent(keyHash))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.found) {
              // ★ 再次检查本地是否已有记录，防止竞态
              var currentAll = getAllMyVotes();
              if (!currentAll[p.id]) {
                currentAll[p.id] = {
                  seq: data.seq,
                  rsa_key: data.rsa_key,
                  iv: data.iv,
                  aes_enc: data.aes_msg,
                  nick: identity.nick,
                  remark_iv: data.remark_iv || '',
                  remark_aes_msg: data.remark_aes_msg || ''
                };
                saveAllMyVotes(currentAll);
              }
              return true;
            }
            return false;
          })
          .catch(function() { return false; });
      });

      return Promise.all(promises).then(function() {
        finishSync();
      });

      function finishSync() {
        var statusEl = document.getElementById('polling-status');
        if (statusEl) {
          statusEl.textContent = '🔄 上次同步：' + lastSyncTime.toLocaleTimeString();
        }
        if (isModalOpen()) {
          renderMyVotes();
          return;
        }
        renderPollList();
        renderMyVotes();
      }
    })
    .catch(function(e){
      console.error('同步失败:', e);
    });
}

function renderPollList() {
  var polls = allPolls;
  var myVotes = getMyVotes();
  var list = document.getElementById('poll-list');
  if (!polls.length) {
    list.innerHTML = '<p style="color:#888;text-align:center;padding:30px">暂无投票</p>';
    return;
  }
  list.innerHTML = '';
  polls.forEach(function(p){
    var card = document.createElement('div');
    card.className = 'poll-card';
    var isVoted = !!myVotes[p.id];
    var votedBadge = isVoted ? ' <span class="badge badge-voted">已投票</span>' : '';
    var editBadge = p.allowEdit ? ' <span class="badge badge-editable">可修改</span>' : '';
    var multiBadge = (p.maxSelect && p.maxSelect > 1) ? ' <span class="badge badge-multi">多选(' + (p.minSelect||1) + '~' + p.maxSelect + ')</span>' : '';
    card.innerHTML = '<h3>'+renderMdInline(p.title)+votedBadge+editBadge+multiBadge+'</h3><div class="meta">'+(p.options||[]).length+'个选项 · '+(p.total_votes||0)+'人已投票 · '+esc(p.created_at)+'</div>';
    card.onclick = (function(pollId, isVoted) {
      return function() {
        if (isVoted) viewMyVote(pollId);
        else openVoteModal(allPolls.find(function(pp){return pp.id===pollId;}));
      };
    })(p.id, isVoted);
    list.appendChild(card);
  });
}

function loadPolls() {
  fetch('/api/votes')
    .then(function(r){ window.handleRateLimitResponse(r); return r.json(); })
    .then(function(polls){
    allPolls = polls || [];
    lastSyncTime = new Date();

    var pollIds = {};
    (polls||[]).forEach(function(p){ pollIds[p.id] = true; });
    var all = getAllMyVotes();
    var changed = false;
    var myNick = currentIdentity().nick;
    Object.keys(all).forEach(function(pid){
      if (!pollIds[pid] && all[pid].nick === myNick) { delete all[pid]; changed = true; }
    });
    if (changed) saveAllMyVotes(all);

    renderPollList();
    renderMyVotes();
    startPolling();
  }).catch(function(){ document.getElementById('poll-list').innerHTML='<p style="color:red">加载失败</p>'; });
}

function renderMyVotes() {
  var myVotes = getMyVotes();
  var keys = Object.keys(myVotes);
  var section = document.getElementById('my-votes-section');
  var listDiv = document.getElementById('my-votes-list');
  if (keys.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  listDiv.innerHTML = '';
  var keyIn = document.getElementById('global-key').value.trim();
  var canDecrypt = !!keyIn;
  keys.forEach(function(pollId){
    var mv = myVotes[pollId];
    var poll = allPolls.find(function(p){return p.id === pollId;});
    var pollTitle = poll ? renderMdInline(poll.title) : ('[已删除] ' + esc(pollId));
    var row = document.createElement('div');
    row.className = 'my-vote-row';
    row.innerHTML = '<div class="poll-title">'+pollTitle+'</div>';
    if (canDecrypt) {
      try {
        var key32 = deriveAESKey(keyIn);
        var ivClean = (mv.iv || '').replace(/[\r\n\s]+/g, '');
        if (!ivClean) {
          row.innerHTML += '<div class="my-choice" style="color:#f44336">⚠️ IV 丢失</div>';
        } else {
          var ivWa = CryptoJS.enc.Base64.parse(ivClean);
          var aesClean = (mv.aes_enc || '').replace(/[\r\n\s]+/g, '');
          var choice = CryptoJS.AES.decrypt(aesClean, key32, {
            iv: ivWa, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
          }).toString(CryptoJS.enc.Utf8);
          if (choice) {
            if (mv.nick !== currentIdentity().nick) {
              row.innerHTML += '<div class="my-choice" style="color:#f44336">⚠️ 昵称不匹配</div>';
            } else {
              row.innerHTML += '<div class="my-choice">✅ 你投了：<b>'+renderMdInline(choice)+'</b></div>';
              row.innerHTML += '<div class="my-meta">服务器时间与IP已独立加密存储</div>';
            }
          } else {
            row.innerHTML += '<div class="my-choice" style="color:#f44336">⚠️ 密钥不匹配</div>';
          }
        }
      } catch(e) {
        row.innerHTML += '<div class="my-choice" style="color:#f44336">⚠️ 解密失败: '+esc(e.message)+'</div>';
      }
    } else {
      row.innerHTML += '<div class="my-choice" style="color:#888">🔒 输入密钥后可见</div>';
    }

    var safeId = String(pollId).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    if (poll) {
      row.innerHTML += '<button onclick="viewMyVote(\''+ safeId +'\')">查看详情</button>';
      if (poll.allowEdit) {
        row.innerHTML += '<button style="background:#FF9800;color:#fff;border:none;border-radius:4px;cursor:pointer" onclick="editMyVote(\''+ safeId +'\')">修改投票</button>';
      }
    }
    row.innerHTML += '<button class="del-local-btn" data-poll-id="' + safeId + '" onclick="deleteLocalVote(this.getAttribute(\'data-poll-id\'))">🗑️ 删除记录</button>';
    listDiv.appendChild(row);
  });
}

function deleteLocalVote(pollId) {
    if (!confirm('确定删除这条本地投票记录吗？（刷新后将自动从服务器恢复）')) return;
    try {
        var all = getAllMyVotes();
        if (all[pollId]) {
            delete all[pollId];
            saveAllMyVotes(all);
            renderPollList();
            renderMyVotes();
            syncFromServer();
        } else {
            alert('记录不存在或已删除');
        }
    } catch(e) {
        alert('删除失败：' + e.message);
    }
}

function buildOptionRows(poll, inputName, customInputId, prevChoices) {
  var minSel = poll.minSelect || 1;
  var maxSel = poll.maxSelect || 1;
  var isMulti = maxSel > 1;
  var inputType = isMulti ? 'checkbox' : 'radio';

  var html = '';
  (poll.options||[]).forEach(function(opt, i){
    var checked = (prevChoices && prevChoices.indexOf(opt) !== -1) ? ' checked' : '';
    html += '<div class="option-row">';
    html += '<input type="' + inputType + '" name="' + inputName + '" value="' + esc(opt) + '" id="' + inputName + i + '"' + checked + ' onchange="checkLimit(' + minSel + ',' + maxSel + ',\'' + inputName + '\')">';
    html += '<label for="' + inputName + i + '">' + renderMdInline(opt) + '</label>';
    html += '</div>';
  });

  if (poll.custom) {
    var customChecked = '';
    var customText = '';
    if (prevChoices) {
      var customChoice = prevChoices.find(function(c){ return (poll.options||[]).indexOf(c) === -1; });
      if (customChoice) {
        customChecked = ' checked';
        customText = customChoice;
      }
    }
    html += '<div class="custom-row">';
    html += '<input type="' + inputType + '" name="' + inputName + '" value="__custom__" id="' + inputName + 'custom"' + customChecked + ' onchange="checkLimit(' + minSel + ',' + maxSel + ',\'' + inputName + '\')">';
    html += '<input type="text" id="' + customInputId + '" placeholder="' + esc(poll.customHint || '输入自定义选项...') + '" value="' + esc(customText) + '" maxlength="512" onfocus="selectCustom(\'' + inputName + '\')" oninput="selectCustom(\'' + inputName + '\')">';
    html += '<button type="button" class="link-btn" onclick="insertFileLinkEl(document.getElementById(\'' + customInputId + '\'))">🔗 外链</button>';
    html += '</div>';
  }

  return html;
}

function selectCustom(inputName) {
  var cb = document.getElementById(inputName + 'custom');
  if (cb && !cb.checked) cb.checked = true;
  var hintEl = document.getElementById('select-hint');
  if (hintEl) {
    var minSel = parseInt(hintEl.dataset.minSel) || 1;
    var maxSel = parseInt(hintEl.dataset.maxSel) || 1;
    checkLimit(minSel, maxSel, inputName);
  }
}

function openVoteModal(poll, restoreSelected, restoreRemark) {
  currentPollId = poll.id;
  currentEditingPollId = null;
  currentEditingSeq = null;
  document.getElementById('vote-title').innerHTML = renderMdInline(poll.title);

  var minSel = poll.minSelect || 1;
  var maxSel = poll.maxSelect || 1;

  var optsDiv = document.getElementById('vote-options');
  var hintEl = document.createElement('div');
  hintEl.id = 'select-hint';
  hintEl.dataset.minSel = minSel;
  hintEl.dataset.maxSel = maxSel;
  hintEl.textContent = (maxSel > 1) ? '请选择 ' + minSel + '~' + maxSel + ' 个选项' : '请选择 1 个选项';
  optsDiv.innerHTML = '';
  optsDiv.appendChild(hintEl);
  optsDiv.innerHTML += buildOptionRows(poll, 'vote-opt', 'custom-val', restoreSelected || null);

  // ★ 备注输入框
  var oldRemark = document.getElementById('vote-remark-container');
  if (oldRemark) oldRemark.remove();
  var remarkContainer = document.createElement('div');
  remarkContainer.id = 'vote-remark-container';
  remarkContainer.style.cssText = 'margin:12px 0';
  remarkContainer.innerHTML = '<label style="font-size:13px;color:#666">📝 备注（可选，仅管理员可见）</label>' +
    '<textarea id="vote-remark" placeholder="输入备注信息..." maxlength="500" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;resize:vertical;font-size:13px;margin-top:4px">' + esc(restoreRemark || '') + '</textarea>';
  var msgEl = document.getElementById('vote-msg');
  optsDiv.parentNode.insertBefore(remarkContainer, msgEl);

  document.getElementById('vote-msg').style.display = 'none';
  document.getElementById('vote-submit-btn').disabled = false;
  document.getElementById('vote-submit-btn').textContent = '提交投票';
  document.getElementById('vote-modal').style.display = 'flex';
}

function viewMyVote(pollId) {
  var myVotes = getMyVotes();
  var mv = myVotes[pollId];
  if (!mv) return;
  var poll = allPolls.find(function(p){return p.id === pollId;});
  var pollTitle = poll ? renderMdInline(poll.title) : esc(pollId);
  document.getElementById('view-title').innerHTML = '📋 ' + pollTitle;
  var contentDiv = document.getElementById('view-content');
  var editArea = document.getElementById('view-edit-area');
  var keyIn = document.getElementById('global-key').value.trim();
  if (!keyIn) {
    contentDiv.innerHTML = '<p style="color:#888">🔒 请在上方输入AES密钥查看你的投票内容</p>';
    editArea.style.display = 'none';
    document.getElementById('view-modal').style.display = 'flex';
    return;
  }
  try {
    var key32 = deriveAESKey(keyIn);
    var choice = CryptoJS.AES.decrypt(mv.aes_enc, key32, {
      iv: CryptoJS.enc.Base64.parse(mv.iv), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
    }).toString(CryptoJS.enc.Utf8);
    if (!choice) {
      contentDiv.innerHTML = '<p style="color:#f44336">⚠️ 密钥不匹配，无法解密。</p>';
      editArea.style.display = 'none';
    } else {
      if (mv.nick !== currentIdentity().nick) {
        contentDiv.innerHTML = '<p style="color:#f44336">⚠️ 昵称不匹配（存储:'+esc(mv.nick)+' 当前:'+esc(currentIdentity().nick)+'），这不是你的投票。</p>';
        editArea.style.display = 'none';
      } else {
        contentDiv.innerHTML = '<p>🗳️ 你投了：<b>'+renderMdInline(choice)+'</b></p><p class="hint">服务器时间与IP已独立加密存储</p>';
        // ★ 显示备注
        var remarkText = '';
        if (mv.remark_iv && mv.remark_aes_msg) {
          try {
            var remarkIvParsed = CryptoJS.enc.Base64.parse(mv.remark_iv);
            var remarkDec = CryptoJS.AES.decrypt(mv.remark_aes_msg, key32, {
              iv: remarkIvParsed,
              mode: CryptoJS.mode.CBC,
              padding: CryptoJS.pad.Pkcs7
            }).toString(CryptoJS.enc.Utf8);
            if (remarkDec) remarkText = remarkDec;
          } catch(e) {}
        }
        if (remarkText) {
          contentDiv.innerHTML += '<p style="font-size:13px;color:#888;margin-top:8px">📝 备注：' + renderMdInline(remarkText) + '</p>';
        }
        editArea.style.display = 'none';
      }
    }
  } catch(e) {
    contentDiv.innerHTML = '<p style="color:#f44336">⚠️ 解密失败</p>';
    editArea.style.display = 'none';
  }
  document.getElementById('view-modal').style.display = 'flex';
}

function editMyVote(pollId) {
  var myVotes = getMyVotes();
  var mv = myVotes[pollId];
  if (!mv) return;
  var poll = allPolls.find(function(p){return p.id === pollId;});
  if (!poll || !poll.allowEdit) { alert('该投票不允许修改'); return; }
  var keyIn = document.getElementById('global-key').value.trim();
  // ★ 自动填充密钥（如果输入框为空）
  if (!keyIn) {
    var storedKey = getLS(LS_AES);
    if (storedKey) {
      document.getElementById('global-key').value = storedKey;
      keyIn = storedKey;
    }
  }
  if (!keyIn) { alert('请先在上方输入AES密钥'); return; }
  if (mv.nick !== currentIdentity().nick) { alert('身份校验失败（昵称不匹配）'); return; }

  currentPollId = pollId;
  currentEditingPollId = pollId;
  currentEditingSeq = mv.seq;
  document.getElementById('view-title').innerHTML = '✏️ 修改投票：' + renderMdInline(poll.title);
  var contentDiv = document.getElementById('view-content');
  var editArea = document.getElementById('view-edit-area');
  var editOptsDiv = document.getElementById('view-edit-options');
  var minSel = poll.minSelect || 1;
  var maxSel = poll.maxSelect || 1;

  try {
    var key32 = deriveAESKey(keyIn);
    var choice = CryptoJS.AES.decrypt(mv.aes_enc, key32, {
      iv: CryptoJS.enc.Base64.parse(mv.iv), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
    }).toString(CryptoJS.enc.Utf8);
    if (!choice) {
      contentDiv.innerHTML = '<p style="color:#f44336">⚠️ 密钥不匹配</p>';
      editArea.style.display = 'none';
      document.getElementById('view-modal').style.display = 'flex';
      return;
    }
    contentDiv.innerHTML = '<p>原投票：<b>'+renderMdInline(choice)+'</b></p>';

    // ★ 显示当前备注
    var currentRemark = '';
    if (mv.remark_iv && mv.remark_aes_msg) {
      try {
        var remarkIvParsed = CryptoJS.enc.Base64.parse(mv.remark_iv);
        var remarkDec = CryptoJS.AES.decrypt(mv.remark_aes_msg, key32, {
          iv: remarkIvParsed,
          mode: CryptoJS.mode.CBC,
          padding: CryptoJS.pad.Pkcs7
        }).toString(CryptoJS.enc.Utf8);
        if (remarkDec) currentRemark = remarkDec;
      } catch(e) {}
    }

    // ★ 移除旧的备注容器，避免累积
    var oldRemarkContainer = document.getElementById('view-remark-container');
    if (oldRemarkContainer) oldRemarkContainer.remove();

    // 创建备注编辑容器
    var remarkEditContainer = document.createElement('div');
    remarkEditContainer.id = 'view-remark-container';
    remarkEditContainer.style.cssText = 'margin:12px 0';
    remarkEditContainer.innerHTML = '<label style="font-size:13px;color:#666">📝 备注（可选，仅管理员可见）</label>' +
      '<textarea id="view-remark-input" placeholder="输入备注信息..." maxlength="500" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;resize:vertical;font-size:13px;margin-top:4px">' + esc(currentRemark) + '</textarea>';

    // 插入到 editOptsDiv 之前
    editOptsDiv.parentNode.insertBefore(remarkEditContainer, editOptsDiv);

    // ★★★ 加密方式选择器（修改投票时也需要）
    var oldEncModeRow = document.getElementById('edit-enc-mode-row');
    if (oldEncModeRow) oldEncModeRow.remove();
    var encModeRow = document.createElement('div');
    encModeRow.id = 'edit-enc-mode-row';
    encModeRow.style.cssText = 'margin:8px 0;font-size:13px;color:#666';
    encModeRow.innerHTML = '🔐 修改加密方式：' +
      '<label style="margin-left:8px;cursor:pointer"><input type="radio" name="edit-enc-mode" value="rsa"> RSA</label>' +
      '<label style="margin-left:8px;cursor:pointer"><input type="radio" name="edit-enc-mode" value="pqc"> 🔮 PQC</label>' +
      '<label style="margin-left:8px;cursor:pointer"><input type="radio" name="edit-enc-mode" value="auto" checked> 🤖 自动</label>';
    editOptsDiv.parentNode.insertBefore(encModeRow, editOptsDiv);
    // ★ 根据原投票的加密方式自动选中对应选项
    var voteVersion = mv.version || '';
    var editEncRadios = encModeRow.querySelectorAll('input[name="edit-enc-mode"]');
    editEncRadios.forEach(function(r) {
      if (voteVersion === 'v3' && r.value === 'pqc') r.checked = true;
      else if (voteVersion === 'v2' && r.value === 'rsa') r.checked = true;
    });

    var prevChoices = choice.split(', ');
    editOptsDiv.innerHTML = '';
    var editHintEl = document.createElement('div');
    editHintEl.id = 'edit-select-hint';
    editHintEl.dataset.minSel = minSel;
    editHintEl.dataset.maxSel = maxSel;
    editHintEl.style.cssText = 'font-size:12px;color:#888;margin-bottom:8px;transition:color .3s';
    editOptsDiv.appendChild(editHintEl);
    editOptsDiv.innerHTML += buildOptionRows(poll, 'edit-opt', 'view-custom-val', prevChoices);
    updateEditHint(minSel, maxSel);
    editArea.style.display = 'block';
  } catch(e) {
    contentDiv.innerHTML = '<p style="color:#f44336">⚠️ 解密失败</p>';
    editArea.style.display = 'none';
  }
  document.getElementById('view-modal').style.display = 'flex';
}

async function confirmEdit() {
  var identity = currentIdentity();
  var originalKey = document.getElementById('global-key').value.trim();
  if (!originalKey) {
    originalKey = prompt('请输入您当初投票时使用的 AES 密钥（用于身份验证）:');
  }
  if (!originalKey) { alert('必须提供原密钥才能修改'); return; }
  var originalKeyHash = CryptoJS.SHA256(originalKey).toString();
  if (!identity.nick || !identity.key) { alert('请填写昵称和AES密钥'); return; }
  var poll = allPolls.find(function(p){return p.id === currentEditingPollId;});
  var minSel = (poll && poll.minSelect) || 1;
  var maxSel = (poll && poll.maxSelect) || 1;

  var selectedValues = collectVoteValues('edit-opt', 'view-custom-val');
  if (selectedValues.length < minSel) {
    alert('请至少选择 ' + minSel + ' 个选项（当前选了 ' + selectedValues.length + ' 个）');
    return;
  }
  if (selectedValues.length > maxSel) {
    alert('最多只能选 ' + maxSel + ' 个选项');
    return;
  }
  var voteContent = selectedValues.join(', ');
  if (!voteContent) { alert('请选择或输入投票内容'); return; }

  var myVotes = getMyVotes();
  var mv = myVotes[currentEditingPollId];
  if (!mv) { alert('找不到原投票记录'); return; }
  setLS(LS_NICK, identity.nick);
  setLS(LS_AES, identity.key);
  var iv = CryptoJS.lib.WordArray.random(16);
  var key32 = deriveAESKey(identity.key);
  var msgEnc = CryptoJS.AES.encrypt(voteContent, key32, {iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7}).toString().replace(/[\r\n\s]+/g, '');

  var ivB64 = CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g, '');
  var keyHash = CryptoJS.SHA256(identity.key).toString();

  var remarkInput = document.getElementById('view-remark-input');
  var remark = remarkInput ? remarkInput.value.trim() : '';
  var remarkIvB64 = '', remarkEnc = '';
  if (remark) {
    var remarkIv = CryptoJS.lib.WordArray.random(16);
    remarkIvB64 = CryptoJS.enc.Base64.stringify(remarkIv).replace(/[\r\n\s]+/g, '');
    remarkEnc = CryptoJS.AES.encrypt(remark, key32, {iv: remarkIv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7})
      .toString()
      .replace(/[\r\n\s]+/g, '');
  }

  try {
    var pubRes = await fetch('/gongyao.txt');
    var pub = await pubRes.text();
    var jse = new JSEncrypt();
    jse.setPublicKey(pub);
    var encrypted = jse.encrypt(identity.key);
    if (!encrypted) { alert('RSA加密失败，密钥可能过长'); return; }
    var cleanRsaKey = encrypted.replace(/[\r\n\s]+/g, '');

    var editEncRadio = document.querySelector('input[name="edit-enc-mode"]:checked');
    var encMode = editEncRadio ? editEncRadio.value : getEncMode();
    var pqcData = null;
    if (encMode === 'pqc' || encMode === 'auto') {
      try {
        pqcData = await pqcEncryptVote(identity.key, voteContent, remark);
      } catch(e) {
        if (encMode === 'pqc') { alert('PQC加密失败：' + e.message); return; }
        console.warn('PQC加密失败，回退RSA:', e.message);
      }
    }
    var body = {
      rsa_key: cleanRsaKey,
      iv: ivB64,
      aes_msg: msgEnc,
      original_key_hash: originalKeyHash,
      key_hash: keyHash,
      remark_iv: remarkIvB64,
      remark_aes_msg: remarkEnc,
      version: pqcData ? 'v3' : 'v2'
    };
    if (pqcData) {
      body.pqc_ciphertext = pqcData.pqc_ciphertext;
      body.iv_shared = pqcData.iv_shared;
      body.iv_content = pqcData.iv_content;
      body.encAESKey = pqcData.encAESKey;
      body.encContent = pqcData.encContent;
    }

    sessionStorage.setItem('pending_edit_poll', currentEditingPollId);
    sessionStorage.setItem('pending_edit_seq', mv.seq);
    sessionStorage.setItem('pending_edit_body', JSON.stringify(body));
    sessionStorage.setItem('pending_edit_iv', CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g, ''));
    sessionStorage.setItem('pending_edit_enc', msgEnc.replace(/[\r\n\s]+/g, ''));
    sessionStorage.setItem('pending_edit_key', cleanRsaKey);

    var res = await fetch('/api/votes/'+encodeURIComponent(currentEditingPollId)+'/'+mv.seq, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
      body: JSON.stringify(body)
    });

    if (res.status === 418) {
      var returnUrl = encodeURIComponent(window.location.href);
      window.location.href = '/captcha?redirect=' + returnUrl;
      return;
    }
    window.handleRateLimitResponse(res);
    if (res.ok) {
      mv.iv = CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g, '');
      mv.aes_enc = msgEnc.replace(/[\r\n\s]+/g, '');
      mv.rsa_key = cleanRsaKey;
      mv.nick = identity.nick;
      mv.remark_iv = remarkIvB64;
      mv.remark_aes_msg = remarkEnc;
      mv.version = pqcData ? 'v3' : 'v2';
      saveMyVote(currentEditingPollId, mv);

      sessionStorage.removeItem('pending_edit_poll');
      sessionStorage.removeItem('pending_edit_seq');
      sessionStorage.removeItem('pending_edit_body');
      sessionStorage.removeItem('pending_edit_iv');
      sessionStorage.removeItem('pending_edit_enc');
      sessionStorage.removeItem('pending_edit_key');

      alert('✅ 投票已修改');
      closeModal('view-modal');
      syncFromServer();
    } else {
      var t = await res.text();
      try {
        var errJson = JSON.parse(t);
        alert('修改失败：' + (errJson.error || t));
      } catch(e) {
        alert('修改失败：' + t);
      }
    }
  } catch(err) {
    alert('修改请求失败：' + err.message);
    console.error(err);
  }
}

async function submitVote() {
  var identity = currentIdentity();
  if (!identity.nick || !identity.key) {
    alert('请填写昵称和AES密钥');
    return;
  }
  var poll = allPolls.find(function(p){ return p.id === currentPollId; });
  if (!poll) {
    alert('投票已不存在，请刷新');
    return;
  }
  var minSel = poll.minSelect || 1;
  var maxSel = poll.maxSelect || 1;

  var selectedValues = collectVoteValues('vote-opt', 'custom-val');
  if (selectedValues.length < minSel) {
    alert('请至少选择 ' + minSel + ' 个选项（当前选了 ' + selectedValues.length + ' 个）');
    return;
  }
  if (selectedValues.length > maxSel) {
    alert('最多只能选 ' + maxSel + ' 个选项');
    return;
  }
  var voteContent = selectedValues.join(', ');
  if (!voteContent) {
    alert('请选择或输入投票内容');
    return;
  }

  // ★ 获取备注
  var remark = document.getElementById('vote-remark').value.trim();
  var remarkIvB64 = '', remarkEnc = '';

  // ★ 准备 AES 密钥
  var key32 = deriveAESKey(identity.key);
  var iv = CryptoJS.lib.WordArray.random(16);
  var ivB64 = CryptoJS.enc.Base64.stringify(iv).replace(/[\r\n\s]+/g, '');
  var msgEnc = CryptoJS.AES.encrypt(voteContent, key32, {
    iv: iv,
    mode: CryptoJS.mode.CBC,
    padding: CryptoJS.pad.Pkcs7
  }).toString().replace(/[\r\n\s]+/g, '');

  // ★ 加密备注
  if (remark) {
    try {
      var remarkIv = CryptoJS.lib.WordArray.random(16);
      remarkIvB64 = CryptoJS.enc.Base64.stringify(remarkIv).replace(/[\r\n\s]+/g, '');
      remarkEnc = CryptoJS.AES.encrypt(remark, key32, {
        iv: remarkIv,
        mode: CryptoJS.mode.CBC,
        padding: CryptoJS.pad.Pkcs7
      }).toString().replace(/[\r\n\s]+/g, '');
    } catch (e) {
      alert('备注加密失败：' + e.message);
      return;
    }
  }

  setLS(LS_NICK, identity.nick);
  setLS(LS_AES, identity.key);

  try {
    // ★ 获取公钥并加密 AES 密钥
    var pubRes = await fetch('/gongyao.txt');
    var pub = await pubRes.text();
    var jse = new JSEncrypt();
    jse.setPublicKey(pub);
    var cleanRsaKey = jse.encrypt(identity.key).replace(/[\r\n\s]+/g, '');
    if (!cleanRsaKey) {
      alert('RSA加密失败，请检查公钥');
      return;
    }

    // ★ PQC 加密（如果选择了 PQC 或自动模式且 PQC 可用）
    var encMode = getEncMode();
    var pqcData = null;
    if (encMode === 'pqc' || encMode === 'auto') {
      try {
        pqcData = await pqcEncryptVote(identity.key, voteContent, remark);
      } catch(e) {
        if (encMode === 'pqc') throw e; // PQC 模式必须成功
        console.warn('PQC加密失败，回退RSA:', e.message);
      }
    }

    var editToken = Array.from(crypto.getRandomValues(new Uint8Array(18)))
      .map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    var keyHash = CryptoJS.SHA256(identity.key).toString();

    // ★ 保存待提交数据到 sessionStorage（用于验证码返回后恢复）
    sessionStorage.setItem('pending_vote_poll', currentPollId);
    sessionStorage.setItem('pending_vote_content', voteContent);
    sessionStorage.setItem('pending_vote_iv', ivB64);
    sessionStorage.setItem('pending_vote_enc', msgEnc);
    sessionStorage.setItem('pending_vote_key', cleanRsaKey);
    sessionStorage.setItem('pending_vote_token', editToken);
    // ★ 保存用户选择的选项和备注，以便恢复
    sessionStorage.setItem('pending_vote_selected', JSON.stringify(selectedValues));
    sessionStorage.setItem('pending_vote_remark', remark);

    // ★ 发送投票请求
    var res = await fetch('/api/votes/' + encodeURIComponent(currentPollId), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfToken
      },
      body: JSON.stringify({
        rsa_key: cleanRsaKey,
        iv: ivB64,
        aes_msg: msgEnc,
        key_hash: keyHash,
        remark_iv: remarkIvB64,
        remark_aes_msg: remarkEnc,
        version: pqcData ? 'v3' : 'v2',
        pqc_ciphertext: pqcData ? pqcData.pqc_ciphertext : undefined,
        iv_shared: pqcData ? pqcData.iv_shared : undefined,
        iv_content: pqcData ? pqcData.iv_content : undefined,
        encAESKey: pqcData ? pqcData.encAESKey : undefined,
        encContent: pqcData ? pqcData.encContent : undefined
      })
    });

    // ★ 处理验证码拦截（418）
    if (res.status === 418) {
      var returnUrl = encodeURIComponent(window.location.href);
      window.location.href = '/captcha?redirect=' + returnUrl;
      return; // 跳转后终止
    }

    window.handleRateLimitResponse(res);
    if (!res.ok) {
      var errText = await res.text();
      throw new Error(errText);
    }

    var data = await res.json();

    // ★ 保存投票记录到本地
    saveMyVote(currentPollId, {
      seq: data.seq,
      rsa_key: cleanRsaKey,
      iv: ivB64,
      aes_enc: msgEnc,
      edit_token: data.edit_token || editToken,
      remark_iv: remarkIvB64,
      remark_aes_msg: remarkEnc,
      version: pqcData ? 'v3' : 'v2'
    });

    // ★ 清除待提交数据
    sessionStorage.removeItem('pending_vote_poll');
    sessionStorage.removeItem('pending_vote_content');
    sessionStorage.removeItem('pending_vote_iv');
    sessionStorage.removeItem('pending_vote_enc');
    sessionStorage.removeItem('pending_vote_key');
    sessionStorage.removeItem('pending_vote_token');
    sessionStorage.removeItem('pending_vote_selected');
    sessionStorage.removeItem('pending_vote_remark');

    var msgEl = document.getElementById('vote-msg');
    msgEl.textContent = '✅ 投票成功！';
    msgEl.style.color = '#4CAF50';
    msgEl.style.display = 'block';
    document.getElementById('vote-submit-btn').disabled = true;
    setTimeout(function(){
      closeModal('vote-modal');
      syncFromServer();
    }, 1200);

  } catch (err) {
    var msgEl = document.getElementById('vote-msg');
    msgEl.textContent = '❌ ' + err.message;
    msgEl.style.color = '#f44336';
    msgEl.style.display = 'block';
    console.error('提交投票失败:', err);
  }
}

(function(){
  var STORAGE_KEY = 'rate_limit_state_v1';
  var state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"blockUntil":0,"whitelisted":false}');
  var timer = null;

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function updateUI(){
    var now = Date.now() / 1000;
    var remaining = Math.ceil(state.blockUntil - now);
    var disabled = !state.whitelisted && remaining > 0;

    document.querySelectorAll('.rate-limited-btn').forEach(function(btn){
      btn.disabled = disabled;
      if(disabled){
        if(!btn.dataset.origText) btn.dataset.origText = btn.textContent;
        btn.textContent = btn.dataset.origText + ' (' + remaining + 's)';
      }else{
        if(btn.dataset.origText) btn.textContent = btn.dataset.origText;
      }
    });
  }

  function start(){
    if(timer) clearInterval(timer);
    updateUI();
    timer = setInterval(function(){
      var remaining = Math.ceil(state.blockUntil - Date.now()/1000);
      if(remaining <= 0){
        clearInterval(timer); timer = null;
        state.blockUntil = 0;
      }
      updateUI(); save();
    }, 200);
  }

  window.handleRateLimitResponse = function(response){
    var wl = response.headers.get('X-RateLimit-Whitelisted') === '1';
    var bu = parseFloat(response.headers.get('X-RateLimit-BlockUntil') || '0');
    state.whitelisted = wl;
    state.blockUntil = bu || 0;
    save();
    if(!wl && state.blockUntil > Date.now()/1000) start();
    else updateUI();
  };

  if(!state.whitelisted && state.blockUntil > Date.now()/1000){
    start();
  }else{
    updateUI();
  }
})();
// ★ 从验证码页面跳回后，自动重试待提交的投票
// ★ 从验证码页面跳回后，自动恢复待提交的投票
(function() {
  var pendingPoll = sessionStorage.getItem('pending_vote_poll');
  if (pendingPoll) {
    // 等待 allPolls 加载完成（可能尚未加载）
    var checkAndRestore = function() {
      var pollObj = allPolls.find(function(p){ return p.id === pendingPoll; });
      if (!pollObj) {
        // 如果还未加载，等待500ms再试
        setTimeout(checkAndRestore, 500);
        return;
      }
      // 打开投票模态框
      openVoteModal(pollObj);

      // ★ 恢复用户之前选择的选项
      var selectedStr = sessionStorage.getItem('pending_vote_selected');
      if (selectedStr) {
        try {
          var selectedValues = JSON.parse(selectedStr);
          // 勾选对应的选项
          var inputs = document.querySelectorAll('#vote-options input[type="radio"], #vote-options input[type="checkbox"]');
          inputs.forEach(function(inp) {
            if (selectedValues.indexOf(inp.value) !== -1) {
              inp.checked = true;
            }
          });
          // 更新提示
          var minSel = pollObj.minSelect || 1;
          var maxSel = pollObj.maxSelect || 1;
          updateHint(minSel, maxSel, 'vote-opt');
        } catch(e) {}
      }

      // ★ 恢复备注
      var remark = sessionStorage.getItem('pending_vote_remark') || '';
      var remarkEl = document.getElementById('vote-remark');
      if (remarkEl) remarkEl.value = remark;

      // ★ 自动提交（延迟确保渲染完成）
      setTimeout(function() {
        document.getElementById('vote-submit-btn').click();
      }, 800);
    };

    // 开始尝试恢复
    setTimeout(checkAndRestore, 100);
    return;
  }

  var pendingEdit = sessionStorage.getItem('pending_edit_poll');
  if (pendingEdit) {
    alert('验证码已通过，请重新点击"修改投票"按钮提交修改。');
    sessionStorage.removeItem('pending_edit_poll');
    sessionStorage.removeItem('pending_edit_seq');
    sessionStorage.removeItem('pending_edit_body');
    sessionStorage.removeItem('pending_edit_iv');
    sessionStorage.removeItem('pending_edit_enc');
    sessionStorage.removeItem('pending_edit_key');
  }
})();
