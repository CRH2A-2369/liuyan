  <style>

  </style>
</head>
<body>

<div id="login-wall">
  <h2>🔒 请先通过管理员验证</h2>
  <p><a href="/admin">→ 前往管理员登录</a></p>
</div>

<div id="main-content" class="hidden">
  <h2>🔍 聊天审计 
    <a href="/admin" style="font-size:14px;margin-left:10px;color:#666;text-decoration:none;border:1px solid #ccc;padding:3px 10px;border-radius:4px">← 返回管理员主页</a>
    <a href="/admin/vote" style="font-size:14px;margin-left:8px;color:#673AB7;text-decoration:none;border:1px solid #673AB7;padding:3px 10px;border-radius:4px">🗳️ 投票管理</a>
    <a href="/admin/ip" style="font-size:14px;margin-left:10px;color:#009688;text-decoration:none;border:1px solid #009688;padding:3px 10px;border-radius:4px">🌐 IP记录</a>
    <a href="/admin/notice" style="font-size:14px;margin-left:10px;color:#FF57FB;text-decoration:none;border:1px solid #FF57FB;padding:3px 10px;border-radius:4px">📢 公告管理</a>
    <a href="/admin/qun" style="font-size:14px;margin-left:10px;color:#D500FF;text-decoration:none;border:1px solid #FF57FB;padding:3px 10px;border-radius:4px">💬 群聊管理</a>
    <a href="/admin/captcha" style="font-size:14px;margin-left:10px;color:#FC6241;text-decoration:none;border:1px solid #FFDC21;padding:3px 10px;border-radius:4px"> 🤖人机验证</a>
  </h2>
  <div class="filter-row">
    <input type="text" id="filter-hash" placeholder="按公钥哈希筛选（16位hex）" maxlength="16" style="font-family:monospace">
    <button class="btn-blue" onclick="loadMessages()">🔍 搜索</button>
    <button class="btn-gray" onclick="document.getElementById('filter-hash').value='';loadMessages()">清除</button>
  </div>
  <div class="filter-row" style="margin-bottom:16px">
    <label style="font-size:13px">⏱ 自动删除超过</label>

    <label style="font-size:13px">小时的消息（0=不删除）</label>
    <button class="btn-blue" onclick="saveRetention()">保存</button>
    <span id="retention-status" style="font-size:12px;color:#888;margin-left:8px"></span>
  </div>

    <select id="report-filter" onchange="loadReports()" style="font-size:13px;padding:4px;margin-left:10px">
      <option value="">全部</option>
      <option value="pending">待处理</option>
      <option value="reviewed">已回复</option>
      <option value="resolved">已解决</option>
    </select>
    <button class="btn-blue" onclick="loadReports()" style="margin-left:8px">🔄 刷新</button>

      <button class="close-btn" onclick="document.getElementById('detail-modal').style.display='none'">✕</button>
      <h3>消息详情</h3>
      <div id="detail-content"></div>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
// ========== 工具函数 ==========
function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

function bytesToBase64(bytes) {
  var binary = '';
  for (var i = 0; i < bytes.length; i++) { binary += String.fromCharCode(bytes[i]); }
  return btoa(binary);
}
function base64ToBytes(b64) {
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
  return bytes;
}
function bytesToHex(bytes) {
  return Array.from(bytes).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
// ========== 鉴权初始化 ==========
var adminJse = null;
var adminPqcPrivBytes = null;

async function loadAdminKeys() {
    // 1. 优先尝试 KeyManager（SharedWorker）
    if (typeof KeyManager !== 'undefined') {
        try {
            const keys = await KeyManager.init();
            if (keys) {
                adminJse = new JSEncrypt();
                adminJse.setPrivateKey(keys.rsaKey);
                const binary = atob(keys.pqcKey);
                adminPqcPrivBytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    adminPqcPrivBytes[i] = binary.charCodeAt(i);
                }
                // 存入 sessionStorage 备用
                sessionStorage.setItem('admin_priv_key', keys.rsaKey);
                sessionStorage.setItem('admin_pqc_priv_key', keys.pqcKey);
                if (keys.dataKey) {
                    sessionStorage.setItem('admin_data_key', keys.dataKey);
                    adminDataJse = new JSEncrypt();
                    adminDataJse.setPrivateKey(keys.dataKey);
                }
                return true;
            }
        } catch (e) {
            console.warn('KeyManager.init() 失败，尝试从 sessionStorage 恢复', e);
        }
    }

    // 2. 回退：从 sessionStorage 读取明文私钥
    const rsaKey = sessionStorage.getItem('admin_priv_key');
    const pqcKey = sessionStorage.getItem('admin_pqc_priv_key');
    if (rsaKey && pqcKey) {
        try {
            adminJse = new JSEncrypt();
            adminJse.setPrivateKey(rsaKey);
            const binary = atob(pqcKey);
            adminPqcPrivBytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                adminPqcPrivBytes[i] = binary.charCodeAt(i);
            }
            const dataKey = sessionStorage.getItem('admin_data_key');
            if (dataKey) {
                adminDataJse = new JSEncrypt();
                adminDataJse.setPrivateKey(dataKey);
            }
            return true;
        } catch (e) {
            console.error('从 sessionStorage 恢复私钥失败', e);
        }
    }
    return false;
}

var csrfToken = '';
var authFetch = function(url, opts) {
  opts = opts || {};
  var headers = opts.headers || {};
  if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
  return fetch(url, Object.assign({credentials:'same-origin'}, opts, {headers:headers}));
};

async function init() {
  try {
    var csrfRes = await fetch('/api/csrf', {credentials:'same-origin'});
    csrfToken = (await csrfRes.json()).token;
    var statusRes = await fetch('/api/admin/status', {credentials:'same-origin'});
    var status = await statusRes.json();
    if (status.logged_in) {
      var keysLoaded = await loadAdminKeys();
      if (!keysLoaded) {
        await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}});
        sessionStorage.clear();
        window.location.href = '/admin';
        return;
      }
      document.getElementById('login-wall').style.display = 'none';
      document.getElementById('main-content').classList.remove('hidden');
      loadMessages();
      loadRetention();
      loadReports();
      fetch('/api/footer').then(function(r){return r.text();}).then(function(t){
        document.getElementById('footer').textContent = t;
      });
    } else {
      document.getElementById('login-wall').style.display = 'block';
      document.getElementById('main-content').classList.add('hidden');
    }
  } catch(e) {
    console.error('Init:', e);
    document.getElementById('login-wall').innerHTML = '<h2>⚠️ 连接失败</h2><p>请刷新页面重试</p>';
  }
}
init();

// ========== IP 解密显示 ==========
function formatAdminIp(encryptedIp) {
  if (!encryptedIp) return '(无)';
  if (encryptedIp.startsWith('PQC_IP:')) {
    return '<span class="mono" style="color:#9C27B0;cursor:pointer" title="PQC加密，点击详情查看解密">🔮 PQC加密</span>';
  }
  // ★ 新增：处理 RSA: 前缀格式（兼容旧数据或用 encrypt_ip 写入的 IP）
  if (encryptedIp.startsWith('RSA:')) {
    if (adminJse) {
      try {
        var dec = adminJse.decrypt(encryptedIp.substring(4));
        if (dec) return esc(dec);
      } catch(e) {}
    }
    return esc(encryptedIp) + ' <span style="color:#f44336;font-size:10px">(解密失败)</span>';
  }
  if (encryptedIp.startsWith('PLAIN:')) {
    return esc(encryptedIp.substring(6));
  }
  // 纯 base64（chat_send 直接 rsa_encrypt_report 的输出，无前缀）
  if (adminJse) {
    try {
      var dec = adminJse.decrypt(encryptedIp);
      if (dec) return esc(dec);
    } catch(e) {}
  }
  return esc(encryptedIp) + ' <span style="color:#f44336;font-size:10px">(解密失败)</span>';
}

async function decryptAdminIpDetail(encryptedIp) {
  if (!encryptedIp) return '(无)';
  if (encryptedIp.startsWith('PQC_IP:')) {
    if (adminPqcPrivBytes) {
      try {
        var { ml_kem1024 } = await import('@noble/post-quantum/ml-kem');
        var raw = JSON.parse(atob(encryptedIp.substring(7)));
        var shared = ml_kem1024.decapsulate(base64ToBytes(raw.ct), adminPqcPrivBytes);
        // ★ 修复：直接对 Uint8Array 做 SHA256，与 Python hashlib.sha256(raw_bytes) 一致
        var sharedWa = CryptoJS.lib.WordArray.create(shared);
        var key = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(sharedWa).toString().substring(0, 64));
        var plain = CryptoJS.AES.decrypt(raw.enc, key, {
          iv: CryptoJS.enc.Base64.parse(raw.iv),
          mode: CryptoJS.mode.CBC,
          padding: CryptoJS.pad.Pkcs7
        }).toString(CryptoJS.enc.Utf8);
        if (plain) return esc(plain);
      } catch(e) {}
    }
    return esc(encryptedIp) + ' <span style="color:#f44336;font-size:10px">(PQC解密失败)</span>';
  }
  if (encryptedIp.startsWith('RSA:')) {
    if (adminJse) {
      try {
        var dec = adminJse.decrypt(encryptedIp.substring(4));
        if (dec) return esc(dec);
      } catch(e) {}
    }
    return esc(encryptedIp) + ' <span style="color:#f44336;font-size:10px">(解密失败)</span>';
  }
  if (encryptedIp.startsWith('PLAIN:')) return esc(encryptedIp.substring(6));
  if (adminJse) {
    try {
      var dec = adminJse.decrypt(encryptedIp);
      if (dec) return esc(dec);
    } catch(e) {}
  }
  return esc(encryptedIp) + ' <span style="color:#f44336;font-size:10px">(解密失败)</span>';
}
// ========== 消息列表 ==========
function loadMessages(){
  var hash = document.getElementById('filter-hash').value.trim();
  var url = '/api/admin/chat/messages';
  if(hash) url += '?hash=' + encodeURIComponent(hash);

  authFetch(url).then(function(r){ return r.json(); }).then(function(data){
    var container = document.getElementById('table-container');
    if(!data.messages || data.messages.length === 0){
      container.innerHTML = '<p style="color:#888;text-align:center;padding:30px">暂无消息</p>';
      return;
    }
    var html = '<table><thead><tr><th>文件名</th><th>接收方哈希</th><th>发送方公钥</th><th>管理员加密IP</th><th>服务器时间</th><th>加密</th><th>操作</th></tr></thead><tbody>';
    data.messages.forEach(function(m){
      html += '<tr>';
      html += '<td class="mono">'+esc(m.filename)+'</td>';
      html += '<td class="mono">'+esc(m.receiver_hash)+'</td>';
      var isPqc = !!(m.version==='v3' || m.pqc_ciphertext || m.encAESKey || m.wrapped_key === 'PQC_V3');
      var senderDisplay = isPqc ? '🔮 PQC:'+esc((m.sender_pub||'').substring(0,70)) : esc((m.sender_pub||'').substring(0,80)+'...');
      html += '<td class="mono" style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+senderDisplay+'</td>';
      // ★ 给 td 加唯一 ID，方便异步回填
      html += '<td class="mono" id="ip-'+esc(m.filename)+'">'+formatAdminIp(m.admin_ip)+'</td>';
      html += '<td>'+esc(m.server_time)+'</td>';
      html += '<td>' + (isPqc ? '🔮PQC' : '🔐RSA') + '</td>';
      html += '<td>';
      html += '<button class="btn-blue" onclick="viewDetail(\''+esc(m.filename)+'\')">详情</button> ';
      html += '<button class="btn-red" onclick="deleteMsg(\''+esc(m.filename)+'\')">删除</button>';
      html += '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;

    // ★ 异步解密 PQC IP 并回填到表格单元格
    data.messages.forEach(async function(m) {
      if (m.admin_ip && m.admin_ip.startsWith('PQC_IP:')) {
        var dec = await decryptAdminIpDetail(m.admin_ip);
        var td = document.getElementById('ip-' + m.filename);
        if (td) td.innerHTML = dec;
      }
    });
  }).catch(function(e){
    document.getElementById('table-container').innerHTML = '<p style="color:red">加载失败: '+esc(e.message)+'</p>';
  });
}

function viewDetail(filename){
  authFetch('/api/admin/chat/messages?filename=' + encodeURIComponent(filename))
    .then(function(r){ return r.json(); })
    .then(async function(data){
      var msgs = data.messages || [];
      if(msgs.length === 0){ alert('未找到'); return; }
      var m = msgs[0];
      var html = '';

      // ★ PQC (v3) 检测和展示
      var isV3 = !!(m.version==='v3' || m.pqc_ciphertext || m.encAESKey || m.wrapped_key === 'PQC_V3');
      if (isV3) {
        html += '<p><b>加密方式:</b> <span style="color:#9C27B0;font-weight:bold">🔮 PQC (v3)</span></p>';
        html += '<p><b>PQC密文包裹的第一层AES密钥:</b></p><pre class="mono" style="max-height:80px;overflow-y:auto">'+esc(m.pqc_ciphertext||'')+'</pre>';
        html += '<p><b>🔮 发送方PQC公钥:</b></p><pre class="mono" style="max-height:80px;overflow-y:auto;background:#f3e5f5">'+esc(m.sender_pqc_pub||'')+'</pre>';
        html += '<p><b>IV Shared:</b> <span class="mono">'+esc(m.iv_shared||'')+'</span></p>';
        html += '<p><b>第一层AES密钥加密的第二层AES密钥:</b></p><pre class="mono" style="max-height:80px;overflow-y:auto">'+esc(m.encAESKey||'')+'</pre>';
        html += '<p><b>IV Content:</b> <span class="mono">'+esc(m.iv_content||m.iv||'')+'</span></p>';
        html += '<p><b>第二层AES密钥加密的内容:</b></p><pre class="mono" style="max-height:100px;overflow-y:auto">'+esc(m.encContent||m.aes_content||'')+'</pre>';
        html += '<hr>';
      }
      // 原有 v2 字段展示
      html += '<p><b>文件名:</b> <span class="mono">'+esc(m.filename)+'</span></p>';
      html += '<p><b>接收方公钥哈希:</b> <span class="mono">'+esc(m.receiver_hash)+'</span></p>';
      if (!isV3) {
        html += '<p><b>发送方公钥 (RSA):</b></p><pre class="mono" style="max-height:100px;overflow-y:auto">'+esc(m.sender_pub)+'</pre>';
      }
      html += '<p><b>AES IV:</b> <span class="mono">'+esc(m.iv)+'</span></p>';
      html += '<p><b>RSA包裹的AES密钥:</b></p><pre class="mono" style="max-height:80px;overflow-y:auto">'+esc(m.wrapped_key)+'</pre>';
      html += '<p><b>AES密文:</b></p><pre class="mono" style="max-height:100px;overflow-y:auto">'+esc(m.aes_content)+'</pre>';
      var adminIpDisplay = await decryptAdminIpDetail(m.admin_ip);  // ← 异步解密
      html += '<p><b>用户IP:</b> <span class="mono">'+adminIpDisplay+'</span></p>';
      html += '<p><b>服务器时间:</b> '+esc(m.server_time)+'</p>';
      if (m.signature) {
        html += '<p><b>✍️ RSA签名:</b> <span class="mono" style="font-size:10px">'+esc(m.signature.substring(0,80))+'...</span></p>';
        // 尝试验签
        if (m.aes_content && m.iv && m.wrapped_key && adminJse) {
          try {
            var aesKey2 = adminJse.decrypt(m.wrapped_key);
            if (aesKey2) {
              var k32 = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(aesKey2).toString());
              var dec2 = CryptoJS.AES.decrypt(m.aes_content, k32, {iv:CryptoJS.enc.Base64.parse(m.iv),mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7}).toString(CryptoJS.enc.Utf8);
              if (dec2) {
                var parts2 = dec2.split('|');
                if (parts2.length >= 4) {
                  var sigPayload = parts2[0]+'|'+parts2[1]+'|'+parts2.slice(2,parts2.length-1).join('|')+'|'+parts2[parts2.length-1];
                  var jseV = new JSEncrypt();
                  jseV.setPublicKey(m.sender_pub);
                  var valid = jseV.verify(sigPayload, m.signature, CryptoJS.SHA256);
                  html += '<p><b>验签结果:</b> <span style="color:'+(valid?'#4CAF50':'#f44336')+'">'+(valid?'✅ 通过':'❌ 失败')+'</span></p>';
                }
              }
            }
          } catch(e) {}
        }
      }
      document.getElementById('detail-content').innerHTML = html;
      document.getElementById('detail-modal').style.display = 'flex';
    });
}

function deleteMsg(filename){
  if(!confirm('确定删除 '+filename+' 吗？此操作不可恢复。')) return;
  authFetch('/api/admin/chat/delete/' + encodeURIComponent(filename), {method:'POST'})
    .then(function(r){ if(r.ok){ loadMessages(); } else { alert('删除失败'); } });
}

function loadRetention(){
  authFetch('/api/admin/chat/retention').then(function(r){return r.json();}).then(function(d){
    document.getElementById('retention-hours').value = d.hours || 0;
  });
}

function saveRetention(){
  var hours = parseInt(document.getElementById('retention-hours').value) || 0;
  authFetch('/api/admin/chat/retention', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({hours: hours})
  }).then(function(r){return r.json();}).then(function(d){
    document.getElementById('retention-status').textContent = d.ok ? '✅ 已保存' : '❌ 失败';
    setTimeout(function(){ document.getElementById('retention-status').textContent = ''; }, 2000);
  });
}

// ========== 举报管理 ==========
var adminPrivateKey = null;
try {
  var savedKey2 = sessionStorage.getItem('admin_priv_key');
  if (savedKey2) {
    adminPrivateKey = savedKey2;
  }
} catch(e) {}

function loadReports(){
  var status = document.getElementById('report-filter').value;
  var url = '/api/admin/chat/reports';
  if(status) url += '?status=' + encodeURIComponent(status);
  authFetch(url).then(function(r){return r.json();}).then(function(data){
    var container = document.getElementById('reports-container');
    if(!data.reports || data.reports.length === 0){
      container.innerHTML = '<p style="color:#888;text-align:center;padding:20px">暂无举报</p>';
      return;
    }
    var html = '<table><thead><tr><th>举报ID</th><th>消息文件</th><th>举报者哈希</th><th>时间</th><th>状态</th><th>操作</th></tr></thead><tbody>';
    data.reports.forEach(function(r){
      var statusLabel = {'pending':'⚠️ 待处理','reviewed':'✅ 已回复','resolved':'🗑 已解决'}[r.status] || r.status;
      html += '<tr>';
      html += '<td class="mono">'+esc(r.report_id)+'</td>';
      html += '<td class="mono">'+esc(r.filename)+'</td>';
      html += '<td class="mono">'+esc(r.reporter_hash)+'</td>';
      html += '<td>'+esc(r.server_time)+'</td>';
      html += '<td>'+statusLabel+'</td>';
      html += '<td>';
      // ★ 管理员任何时候都应该能解密查看举报
      html += '<button class="btn-blue" onclick="decryptReport(\''+esc(r.report_id)+'\')">🔓 解密查看</button> ';
      html += '<button class="btn-red" onclick="resolveReport(\''+esc(r.report_id)+'\',true)">✔ 标记解决</button> ';
      html += '<button class="btn-red" style="background:#d32f2f" onclick="deleteReportPermanent(\''+esc(r.report_id)+'\')">🗑 删除</button>';
      html += '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  });
}

function decryptReport(reportId){
  if(!adminPrivateKey){
    alert('管理员私钥未加载，请重新登录管理员面板');
    return;
  }
  var jse = new JSEncrypt();
  jse.setPrivateKey(adminPrivateKey);

  authFetch('/api/admin/chat/reports').then(function(r){return r.json();}).then(function(data){
    var report = (data.reports||[]).find(function(r){return r.report_id===reportId;});
    if(!report){ alert('举报未找到'); return; }

    var aesKeyRaw = jse.decrypt(report.aes_key_enc);
    var reason = jse.decrypt(report.reason_enc);

    if(!aesKeyRaw){
      alert('AES密钥解密失败，请检查私钥是否正确');
      return;
    }

    authFetch('/api/admin/chat/message/' + encodeURIComponent(report.filename))
      .then(function(r){return r.json();})
      .then(async function(msg){
        if(msg.error){ alert(msg.error); return; }
      var isV3 = msg.pqc_ciphertext && msg.encAESKey;
      var decryptedContent = '';

      if (isV3) {
        // PQC举报：aesKeyRaw 就是 reporter 用管理员 RSA 公钥加密的 msgKeyB64
        // 直接用它对 encContent 做 AES 解密，无需再做 PQC 解封装
        try {
          var msgKeyHex2 = CryptoJS.enc.Hex.parse(bytesToHex(base64ToBytes(aesKeyRaw)));
          decryptedContent = CryptoJS.AES.decrypt(
            msg.encContent || msg.aes_content,
            msgKeyHex2,
            {iv: CryptoJS.enc.Base64.parse(msg.iv_content || msg.iv), mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7}
          ).toString(CryptoJS.enc.Utf8);
        } catch(ex) { decryptedContent = '<PQC解密异常: '+esc(ex.message)+'>'; }
      } else {
        try {
          var keyBytes = CryptoJS.enc.Hex.parse(CryptoJS.SHA256(aesKeyRaw).toString());
          var ivBytes = CryptoJS.enc.Base64.parse(msg.iv);
          var decrypted = CryptoJS.AES.decrypt(msg.aes_content, keyBytes, {iv:ivBytes, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7});
          decryptedContent = decrypted.toString(CryptoJS.enc.Utf8);
        } catch(ex){
          decryptedContent = '<解密失败: '+esc(ex.message)+'>';
        }
      }

      // ★ HTML 构建（对 v2 和 v3 通用）
      var html = '<div style="position:relative">';
      html += '<h4>📋 举报详情</h4>';
      html += '<p><b>举报ID:</b> '+esc(report.report_id)+'</p>';
      html += '<p><b>消息文件:</b> <span class="mono">'+esc(report.filename)+'</span></p>';
      html += '<p><b>举报时间:</b> '+esc(report.server_time)+'</p>';
      html += '<p><b>举报理由:</b> <span style="color:#f44336">'+esc(reason||'(解密失败)')+'</span></p>';
      html += '<p><b>当前状态:</b> '+esc(report.status)+'</p>';
      html += '<p><b>加密方式:</b> '+(isV3?'🔮 PQC':'🔐 RSA')+'</p>';
      html += '<hr>';
      html += '<p><b>📨 被举报消息内容:</b></p>';
      html += '<pre class="mono" style="background:#fff3e0;padding:12px;border-radius:4px;max-height:200px;overflow-y:auto;white-space:pre-wrap">'+esc(decryptedContent)+'</pre>';
      html += '<p><b>AES密钥:</b> <span class="mono">'+esc(aesKeyRaw||'(PQC封装)')+'</span></p>';
      html += '<p><b>IV:</b> <span class="mono">'+esc(msg.iv||msg.iv_content||'')+'</span></p>';
      if (isV3) {
          html += '<p><b>🔮 PQC密文:</b> <span class="mono" style="font-size:10px">'+esc((msg.pqc_ciphertext||'').substring(0,80))+'...</span></p>';
          html += '<p><b>🔮 加密的AES密钥:</b> <span class="mono" style="font-size:10px">'+esc((msg.encAESKey||'').substring(0,60))+'...</span></p>';
          html += '<p><b>🔮 IV(Shared):</b> <span class="mono">'+esc(msg.iv_shared||'')+'</span></p>';
}
      html += '<hr>';
      html += '<p><b>📝 管理员回复:</b></p>';
      html += '<textarea id="admin-reply-text" style="width:100%;height:80px" placeholder="输入回复内容...">'+esc(report.admin_reply||'')+'</textarea>';
      html += '<br><button class="btn-blue" id="btn-submit-reply">发送回复</button>';
      html += '</div>';

        var detailEl = document.getElementById('detail-content');
        detailEl.innerHTML = html;
        document.getElementById('detail-modal').style.display = 'flex';

        // ★ 清除旧监听器，避免累积
        var oldHandler = detailEl._replyHandler;
        if(oldHandler) detailEl.removeEventListener('click', oldHandler);

        // ★ 绑定新监听器，用闭包捕获当前 report
        var newHandler = function(ev){
          if(ev.target && ev.target.id === 'btn-submit-reply'){
            ev.preventDefault();
            var btn = ev.target;          // ← 先存按钮引用
            var replyEl = document.getElementById('admin-reply-text');
            if(!replyEl){ alert('回复框未找到'); return; }
            var reply = replyEl.value.trim();
            if(!reply){ alert('回复不能为空'); return; }

            btn.disabled = true;
            btn.textContent = '发送中...';

            authFetch('/api/admin/chat/reports/'+encodeURIComponent(report.report_id)+'/reply', {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({reply:reply})
            }).then(function(r){
              if(!r.ok){ return r.json().then(function(d){ throw new Error(d.error||'HTTP '+r.status); }); }
              return r.json();
            }).then(function(d){
              alert('✅ 回复已保存');
              document.getElementById('detail-modal').style.display = 'none';
              loadReports();
            }).catch(function(err){
              alert('❌ 失败: '+err.message);
              btn.disabled = false;       // ← 用 btn，不是 e.target
              btn.textContent = '发送回复';
            });
          }
        };
        detailEl._replyHandler = newHandler;
        detailEl.addEventListener('click', newHandler);
      });
  });
}

function resolveReport(reportId, resolveOnly){
  if(!confirm(resolveOnly ? '标记为已解决？' : '确定删除此举报？')) return;
  authFetch('/api/admin/chat/reports/'+encodeURIComponent(reportId), {
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({resolve_only: resolveOnly})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){ loadReports(); } else { alert('❌ '+ (d.error||'失败')); }
  });
}

function deleteReportPermanent(reportId){
  resolveReport(reportId, false);
}
</script>
