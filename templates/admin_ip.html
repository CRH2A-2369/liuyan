<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>IP 访问记录</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js" integrity="sha512-94ncgEEqkuZ4yNTFmu2dSn1TJ6Ij+ANQqpR7eLVU99kzvYzu6UjBxuVoNHtnd29R+T6nvK+ugCVI698pbyEkvQ==" crossorigin="anonymous"></script>
  <style>
    body{font-family:sans-serif;max-width:1000px;margin:40px auto;padding:20px;color:#333}
    h2{margin-bottom:4px}
    #login-wall{text-align:center;margin-top:60px}
    .hidden{display:none}
    #controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:16px 0;padding:14px;background:#f5f5f5;border-radius:8px}
    #controls input[type="date"]{padding:8px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px}
    #controls button{padding:8px 18px;border:none;border-radius:4px;cursor:pointer;color:#fff;font-size:14px}
    .btn-query{background:#2196F3}
    .btn-quick{background:#9E9E9E;font-size:12px!important;padding:6px 12px!important}
    .btn-quick.active{background:#FF9800}
    table{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px}
    th,td{border:1px solid #ddd;padding:10px 14px;text-align:left}
    th{background:#f5f5f5;position:sticky;top:0;z-index:1}
    tr:nth-child(even){background:#fafafa}
    .stats{display:flex;gap:24px;margin:16px 0;flex-wrap:wrap}
    .stat-card{flex:1;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px;text-align:center}
    .stat-card .num{font-size:32px;font-weight:bold;color:#1976D2}
    .stat-card .label{font-size:13px;color:#888;margin-top:4px}
    .ip-cell{font-family:monospace;font-size:13px}
    .decrypt-fail{color:#f44336;font-style:italic}
    #result-area{max-height:500px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:6px;margin-top:10px}
    a.back-link{font-size:14px;color:#666;text-decoration:none;border:1px solid #ccc;padding:3px 10px;border-radius:4px;margin-left:10px}
    footer{margin-top:30px;text-align:center;color:#888;font-size:12px;border-top:1px solid #eee;padding:15px 0}
    #key-area{margin:10px 0;padding:10px;background:#fff8e1;border-radius:6px;border-left:4px solid #FF9800}
    #key-area textarea{width:100%;min-height:60px;padding:8px;border:1px solid #ccc;border-radius:4px;font-family:monospace;font-size:12px;resize:vertical;box-sizing:border-box}
    #key-area button{background:#FF9800;color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;margin-top:6px;font-size:13px}
  </style>
</head>
<body>

<div id="login-wall">
  <h2>🔒 请先通过管理员验证</h2>
  <p><a href="/admin">→ 前往管理员登录</a></p>
</div>

<div id="main-content" class="hidden">
  <h2>🌐 IP 访问记录
    <a href="/admin" class="back-link">← 返回管理主页</a>
    <a href="/admin/qun" class="back-link">💬 群聊管理</a>
    <a href="/admin/vote" class="back-link">🗳️ 投票管理</a>
    <a href="/admin/notice" class="back-link">📢 公告管理</a>
    <a href="/admin/chat" class="back-link">私聊管理</a>
  </h2>

  <div id="key-area">
    <strong>🔑 RSA 私钥</strong>
    <span style="font-size:11px;color:#888">（用于解密 IP，如未自动加载请粘贴）</span>
    <textarea id="priv-key-input" placeholder="-----BEGIN RSA PRIVATE KEY-----&#10;...&#10;-----END RSA PRIVATE KEY-----"></textarea>
    <button onclick="loadKey()">加载私钥</button>
    <span id="key-status" style="font-size:12px;margin-left:10px"></span>
  </div>

  <div id="controls">
    <label style="font-size:14px;font-weight:bold">📅 日期范围：</label>
    <input type="date" id="start-date">
    <span>至</span>
    <input type="date" id="end-date">
    <button class="btn-query" onclick="queryData()">🔍 查询</button>
    <button class="btn-quick" onclick="setRange(0)">今天</button>
    <button class="btn-quick" onclick="setRange(1)">昨天</button>
    <button class="btn-quick" onclick="setRange(7)">最近7天</button>
    <button class="btn-quick" onclick="setRange(30)">最近30天</button>
  </div>

  <div id="stats-area"></div>
  <div id="result-area"><p style="color:#888;text-align:center;padding:30px">选择日期范围后点击「查询」</p></div>
  <footer id="footer"></footer>
</div>

<script>
var esc = function(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
};

var csrfToken = '';
var adminJse = null;

var authFetch = function(url, opts) {
  opts = opts || {};
  var headers = opts.headers || {};
  if (csrfToken) headers['X-CSRF-Token'] = csrfToken;
  return fetch(url, Object.assign({credentials:'same-origin'}, opts, {headers:headers}));
};

// ── 日期工具 ──
function dateStr(d) {
  var y = d.getFullYear();
  var m = ('0' + (d.getMonth() + 1)).slice(-2);
  var day = ('0' + d.getDate()).slice(-2);
  return y + '-' + m + '-' + day;
}

function setRange(days) {
  var end = new Date();
  var start = new Date();
  if (days === 0) {
    // 今天
    start = end;
  } else if (days === 1) {
    // 昨天
    start.setDate(start.getDate() - 1);
    end = new Date(start);
  } else {
    // 最近 N 天
    start.setDate(start.getDate() - days + 1);
  }
  document.getElementById('start-date').value = dateStr(start);
  document.getElementById('end-date').value = dateStr(end);
  // 高亮快捷按钮
  document.querySelectorAll('.btn-quick').forEach(function(b){ b.classList.remove('active'); });
  if (event && event.target) event.target.classList.add('active');
  queryData();
}

// ── 初始化 ──
async function init() {
  try {
    var csrfRes = await fetch('/api/csrf', {credentials:'same-origin'});
    csrfToken = (await csrfRes.json()).token;

    var statusRes = await fetch('/api/admin/status', {credentials:'same-origin'});
    var status = await statusRes.json();

    if (status.logged_in && sessionStorage.getItem('admin_has_key') === 'true') {
      document.getElementById('login-wall').style.display = 'none';
      document.getElementById('main-content').classList.remove('hidden');

      // 尝试加载私钥
      var savedKey = sessionStorage.getItem('admin_priv_key');
      if (savedKey) {
        adminJse = new JSEncrypt();
        adminJse.setPrivateKey(savedKey);
        document.getElementById('key-status').textContent = '✅ 已加载';
        document.getElementById('key-status').style.color = '#4CAF50';
      } else {
        document.getElementById('key-status').textContent = '⚠️ 未加载';
        document.getElementById('key-status').style.color = '#FF9800';
      }

      // 默认最近 7 天
      var end = new Date();
      var start = new Date();
      start.setDate(start.getDate() - 6);
      document.getElementById('start-date').value = dateStr(start);
      document.getElementById('end-date').value = dateStr(end);

      fetch('/api/footer').then(function(r){return r.text();}).then(function(t){
        document.getElementById('footer').textContent = t;
      });
    } else if (status.logged_in) {
      await fetch('/api/admin/logout', {credentials:'same-origin', method:'POST', headers:{'X-CSRF-Token':csrfToken}});
      sessionStorage.clear(); location.reload();
    } else {
      document.getElementById('login-wall').style.display = 'block';
      document.getElementById('main-content').classList.add('hidden');
    }
  } catch(e) {
    console.error('Init:', e);
  }
}
init();

function loadKey() {
  var key = document.getElementById('priv-key-input').value.trim();
  if (!key) return;
  try {
    adminJse = new JSEncrypt();
    adminJse.setPrivateKey(key);
    document.getElementById('key-status').textContent = '✅ 已加载';
    document.getElementById('key-status').style.color = '#4CAF50';
  } catch(e) {
    document.getElementById('key-status').textContent = '❌ 私钥无效';
    document.getElementById('key-status').style.color = '#f44336';
  }
}

function decryptIP(encrypted) {
  if (!adminJse) return '<span class="decrypt-fail">私钥未加载</span>';
  try {
    var plain = adminJse.decrypt(encrypted);
    if (plain) return '<span class="ip-cell">' + esc(plain) + '</span>';
    return '<span class="decrypt-fail">解密失败</span>';
  } catch(e) {
    return '<span class="decrypt-fail">解密异常</span>';
  }
}

async function queryData() {
  var start = document.getElementById('start-date').value;
  var end = document.getElementById('end-date').value;
  if (!start || !end) { alert('请选择日期范围'); return; }

  var resultArea = document.getElementById('result-area');
  var statsArea = document.getElementById('stats-area');
  resultArea.innerHTML = '<p style="color:#888;text-align:center;padding:30px">⏳ 查询中...</p>';
  statsArea.innerHTML = '';

  try {
    var resp = await authFetch('/api/admin/ip/data?start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end));
    if (!resp.ok) {
      var errText = await resp.text();
      resultArea.innerHTML = '<p style="color:#f44336;text-align:center;padding:30px">❌ ' + esc(errText) + '</p>';
      return;
    }
    var data = await resp.json();

    // 统计卡片
    statsArea.innerHTML =
      '<div class="stats">' +
      '<div class="stat-card"><div class="num">' + data.total_visits + '</div><div class="label">📊 总访问量</div></div>' +
      '<div class="stat-card"><div class="num">' + data.unique_ips + '</div><div class="label">👥 独立 IP 数</div></div>' +
      '<div class="stat-card"><div class="num">' + (data.total_visits_non_wl != null ? data.total_visits_non_wl : data.total_visits) + '</div><div class="label">🚫 除去白名单访问量</div></div>' +
      '</div>';

    if (!data.records.length) {
      resultArea.innerHTML = '<p style="color:#888;text-align:center;padding:30px">📭 该时间段暂无访问记录</p>';
      return;
    }

    var html = '<table><thead><tr>';
    html += '<th style="width:50px">#</th>';
    html += '<th>IP 地址</th>';
    html += '<th style="width:80px">🔑 哈希（SHA512 前12位）</th>';
    html += '<th style="width:100px;text-align:right">访问次数</th>';
    html += '</tr></thead><tbody>';

    data.records.forEach(function(r, idx) {
      html += '<tr' + (r.whitelisted ? ' style="background:#e8f5e9"' : '') + '>';
      html += '<td style="color:#888">' + (idx + 1) + '</td>';
      html += '<td>' + decryptIP(r.encrypted) +
              (r.whitelisted ? ' <span style="background:#4CAF50;color:#fff;padding:1px 6px;border-radius:3px;font-size:11px">白名单</span>' : '') +
              '</td>';
      html += '<td style="font-family:monospace;font-size:11px;color:#999">' + esc(r.hash.substring(0, 12)) + '…</td>';
      html += '<td style="text-align:right;font-weight:bold">' + r.count + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    resultArea.innerHTML = html;

  } catch(e) {
    resultArea.innerHTML = '<p style="color:#f44336;text-align:center;padding:30px">请求失败: ' + esc(e.message) + '</p>';
  }
}
</script>
</body>
</html>
