<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>匿名留言</title>
<style>
  body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px}
  .box{display:flex;flex-direction:column;gap:12px}
  .row{display:flex;gap:10px;align-items:flex-start}
  textarea{flex:1;min-height:80px;resize:vertical}
  button{padding:8px 16px;cursor:pointer;height:36px}
  #modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
  #modal div{background:#fff;padding:24px;border-radius:8px;text-align:center}
</style></head>
<body>
  <h2>留言网站</h2>
  <p style="color:#666;margin:0 0 15px">本留言匿名，但不进行加密</p>
  <form id="form" method="POST" class="box">
    <input name="nickname" placeholder="昵称（≤32字）" maxlength="32" required>
    <div class="row">
      <textarea name="message" placeholder="留言（≤2048字）" maxlength="2048" required></textarea>
      <button type="button" onclick="showModal()">发送</button>
    </div>
  </form>

  <div id="modal"><div>
    <p>提交留言代表你同意我们公开和使用此留言，确认提交此留言吗？</p>
    <button onclick="submit()">确认</button>
    <button onclick="closeModal()" style="margin-left:10px">取消</button>
  </div></div>

<script>
  function showModal(){document.getElementById('modal').style.display='flex'}
  function submit(){document.getElementById('form').submit()}
  function closeModal(){document.getElementById('modal').style.display='none'}
</script>
</body></html>
